Hockcrow_SearchBody_VeryEasy_Description_001=Hockrow Agency \nCase File #MP51643\nLead Investigator: Arken Mallor\n\nCase Summary: \nLooking for an operative to confirm the status of a client. They and their partner missed a scheduled meeting and all attempts to contact them have proven in vain. Last we heard they were undertaking some business in ~mission(System) and fear that they may be the victim of some unfortunate tragedy.\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nBe cautious while conducting your search. If the client did meet harm, it would be unfortunate for you to meet the same fate.\n\n<EM4>Reputation Awarded:</EM4> 100
Hockcrow_SearchBody_Easy_Description_001=Hockrow Agency \nCase File #MP51132\nLead Investigator: Arken Mallor\n\nCase Summary: \nNeed an operative to help us locate the current whereabouts of a client's employee. They were on assignment in ~mission(System) but has failed to report in. Our client is beginning to fear the worst.\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nThis contract has been flagged as <EM4>combat-likely</EM4> so prepare accordingly.\n\n<EM4>Reputation Awarded:</EM4> 100
Hockcrow_SearchBody_Medium_Description_001=Hockrow Agency \nCase File #MP74384\nLead Investigator: Arken Mallor\n\nCase Summary: \nWe had sent in a two-person team to ~mission(System) to investigate a case, but have received no reports from them for several days. At this juncture we are forced to assume that they had run into an unforeseen obstacle and may be in need of rescue, or worse, have been killed.\n\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nConsider the dangerous nature of their investigation, there is a very strong chance there will be hostiles on site.\n\n<EM4>Reputation Awarded:</EM4> 150
Hockcrow_SearchBody_Hard_Description_001=Hockrow Agency \nCase File #MP45648\nLead Investigator: Arken Mallor\n\nCase Summary: \nA client has tasked us with tracking down with one of their family members who has gone missing. After exhibiting erratic behavior, they cut off all communications and left for ~mission(System). We were able to track down their general whereabouts but need an investigator to head there in person to assess the situation.\n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nThere is a high chance that you will encounter hostiles while conducting your search. We recommend considering bringing along backup to support you.\n\n<EM4>Reputation Awarded:</EM4> 200
Hockcrow_SearchBody_VeryHard_Description_001=Hockrow Agency \nCase File #MP12854\nLead Investigator: Arken Mallor\n\nCase Summary:\nWe have been asked to track down two contractors who work for a client of ours after they lost contact with them. They were last known to be traveling together in ~mission(System). Until their exact situation can be assessed, our client is stuck in a waiting pattern. \n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nYou'll be heading into what is regarded as a particularly dangerous spot. Backup is highly recommended for this encounter.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
Hockcrow_SearchBody_Super_Description_001=Hockrow Agency \nCase File #MP65648\nLead Investigator: Arken Mallor\n\nCase Summary: \nA whole crew has gone missing while undertaking a contract in ~mission(System) for a client that I'm unfortunately not allowed to disclose the full details of to you. Lets just say that it wasn't the safest job and the fact the crew is not responding comms is not surprising but it is concerning. It's vital that we ascertain what happened to them. \n\nContract Investigator Actions:\nLocate <EM4>~mission(MissingPersonList)</EM4> at <EM4>~mission(Location|Address)</EM4> and confirm their status. \n\nIf they are deceased, examine the body closely so we can verify their death via your mobiGlas.\n\nAdditional Notes:\nThis investigation has high potential for there to be aggressive and dangerous hostiles on site. Arm yourself accordingly and consider bringing other skilled associates with you.\n\n<EM4>Reputation Awarded:</EM4> 300
