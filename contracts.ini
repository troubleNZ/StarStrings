EckhartSecurity_EliminateAll_storm_shut_H_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Clear Location\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nGot an emergency request from Associated Science & Development for any available operators to report to ~mission(Location) and deal with some hostiles who have overtaken one of their facilities. \n\nOnce on site, you will need to engage and eliminate any hostile elements. ASD has indicated that this facility provides shuttle services to one of their embedded research centers but were very clear that you are not authorized to travel there. Trespassers will be shot and you will be no exception, so stick to the prescribed AO.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 2,000
mg_miles_capturegang_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell,  Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nAn anonymous comm has tipped us off that Les Arlington, child of gang leader Maltrox Arlington, had been spotted picking up a delivery at a Covalex transfer center. We will provide you with the coordinates of where we believe their current whereabouts are.\n\nLes is an experienced pilot who has been flying for almost as long as they’ve been walking and usually serves as the gang’s get-away pilot. It may be worthwhile to bring extra support ships in order to cut off any attempts at escape.\n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 500
mg_miles_capturegang_desc_002=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nWe have received word that Nicks Cantwell, long-time acquaintance and confident of Maltrox Arlington, was spotted trying to purchase a high-density mining laser, the kind frequently used in past ship-jacking attempts to strategically breach hulls. We have provided coordinates for Nicks’ last known location.  \n\nNicks is a highly regarded munitions expert among criminal circles and often leaves a path of destruction in his wake. It is advised to bring an increased level of firepower to this encounter.\n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 500
mg_miles_capturegang_desc_003=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nSam ‘Weepy’ Arlington was flagged by automated security systems at an R&R after being involved in a drunken brawl. Weepy was able to clear the station before response teams arrived, but we have been able to track him down to where we currently think he’s holed up.\n\nWeepy is gang leader Maltrox Arlington’s uncle and main enforcer. His anger issues combined with a long history of substance abuse make him a true wildcard. Expect him to put up significant resistance when cornered by you and your mustered forces.\n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 500
mg_miles_capturegang_desc_004=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nRecently a security terminal was illegally accessed using a unique custom cryptokey that had been utilized in a heist last year by one Oslo Arlington, the younger sibling of gang leader Maltrox Arlington. While we we’re unable to positively confirm if the terminal was hacked by Oslo or not, we feel it is worth investigating.\n\nExtremely intelligent, tech savvy and a renowned strategist, Oslo has proven difficult to capture in the past. If this lead does result in finding Oslo, a well coordinated tactical strike team would be advantageous to a successful engagement. \n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 500
mg_miles_capturegang_desc_005=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nTwo bank guards were reported missing last week. A few hours ago, their bodies turned up in a trash heap in Magnus with their biometrics stolen. Thankfully, a nearby dumpling cart had a security camera that captured the corpses being dropped. Facial recognition was able to ID one Kass Dent, romantic partner to Maltrox Arlington and parent of Les Arlington. Using the vid to construct a timeline, we have provided the coordinates of where Kass is currently believed to be hiding. \n\nKass is suspected of a long list of murders, with these two only being the most recent. We recommend only bringing highly skilled wingman to try and keep the casualty count at a minimum.  \n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 500
mg_miles_capturegang_desc_006=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Group Warrant\nCONTRACTOR STATUS: Independent\nApproval code: = ~mission(Contractor|ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\n*********\n__Background Information__\nA group warrant has been issued for the notorious Arlington ship jacking gang after their recent brazen attempted theft of an Idris from a repair yard. While the heist was stopped, the members of the group have scattered to the black. Eckhart Security has been granted the bounty for the immediate capture of all high-level gang members: Maltrox Arlington, Kass Dent, Nicks Cantwell, Sam ‘Weepy’ Arlington, Oslo Arlington, and Les Arlington.\n*********\n\nMaltrox Arlington has been keeping a low profile recently, but we think he's come out of hiding. A patrol was refueling at a station when one of their ships was boosted. Maltrox is the most likely suspect. While the regtag was temporarily deactivated, we have been able to trace the ship’s quantum signature and have provided you those coordinates.\n\nA third generation criminal, the Arlington gang has been under Maltrox’s leadership for the past six years. Be aware, this is a smart, aggressive, and very dangerous target. The more resources you can bring to bear, the more likely it is that we can bring Maltrox in one and for all. \n\nYou are authorized to use whatever force is necessary to neutralize the target. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 500
EckhartSecurity_RecoverCargo_VeryEasy_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of my clients was in the process of transporting some cargo when they came under fire from a group of outlaws. We haven't been able to contact the crew onboard, but trackers indicate the cargo remains intact.\n\nWe need a contractor to head to <EM4>~mission(Location|Address)</EM4>, recover the cargo, and deliver it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>. A ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> are essential for this. Presently, we're not detecting any hostiles, but that could change by the time you've arrived.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 50
EckhartSecurity_RecoverCargo_Easy_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nClient's cargo was mid-transport when they ran into some ship trouble, and now a group of opportunistic outlaws are looking to cash in on this.\n\nIf you accept, head to <EM4>~mission(Location|Address)</EM4> and deal with the outlaws guarding the cargo. Extract it using a <EM4>heavy-duty tractor beam</EM4>, recover the cargo, load it in to a ship that can transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and deposit it on the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 100
EckhartSecurity_RecoverCargo_Medium_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nLooking for a competent contractor who can salvage a messy situation. A client's trusted pilot apparently wasn't so trustworthy and made off with a shipment. But thankfully our trackers are reporting the shipment's static for the moment, waiting to be picked up. If we play our cards right, there's still time to resolve this.\n\nThe abandoned ship is located at <EM4>~mission(Location|Address)</EM4> and will need a <EM4>heavy-duty tractor beam</EM4> to transport the goods. A ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> is a necessity, and expect contact from whatever outlaws this double-crossing pilot was hoping to sell to. \n\nOnce recovered, deliver the cargo to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 150
EckhartSecurity_RecoverCargo_Hard_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nGot a transport in need of backup over at <EM4>~mission(Location|Address)</EM4>. Signal was patchy, but their comms made it sound like a group of outlaws had gotten wind of what they were hauling and attempted to take it from them.\n\nConsidering the state of things before we lost contact, I'm considering this a recovery mission. Multiple hostiles are expected at the site, so a skilled crew is crucial for the success of this operation. There will be a high volume of cargo to deal with, so a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> will be needed. \n\nUpon successful extraction of cargo, deliver to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 200
EckhartSecurity_RecoverCargo_VeryHard_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nCalling for a skilled contractor to recover a displaced shipment located at <EM4>~mission(Location|Address)</EM4>. Client's hauler was transporting some high value cargo when they decided to respond to a distress beacon and got ambushed by a group of outlaws. The client believes their pilot is gone but their cargo could still be recovered.\n\nThe information we have so far is that you'll need a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, a <EM4>heavy-duty tractor beam</EM4> for shifting the goods, as well as your support ships to help deal with the outlaws at the location. \n\nClient will be expecting the completed delivery to be made to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
EckhartSecurity_RecoverCargo_Super_Description=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Recover Cargo\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nPutting out an immediate call for a highly skilled contractor to reclaim a client's cargo located at <EM4>~mission(Location|Address)</EM4>.\n\nClient hired an expert hauler to transport something discreetly, but it seems some information regarding the shipment was either hacked or leaked. The pilot was attacked and now the shipment is stranded. We need you and any support ships you bring to make it to the site before the cargo is lost for good. \n\nYou will need a <EM4>heavy-duty tractor beam</EM4> and a ship capable of storing <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nAfter assessing the situation and the importance the client has placed on the recovery of the cargo, we have decided to reward a high payout for the successful delivery of the shipment to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Reputation Awarded:</EM4> 300
Eckhart_ShipAmbush_Intro_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe’re looking for contractors with combat experience who are willing to get their hands dirty so to speak. A client of ours was double-crossed by a <EM4>~mission(AmbushTarget)</EM4> and we’ve been waiting for an opportunity to deal with the issue. After tracking them for several weeks, we’ve identified <EM4>~mission(Location|Address)</EM4> as the ideal spot to intercept them. It features an <EM4>emission cloud</EM4> where you can hide and power down your ship while waiting for the <EM4>~mission(AmbushTarget)</EM4>.\n\nIntel suggests that they may travel with an escort. If they do, you’ll have to deal with them too. Since this is your first contract, we will have other contractors in the area who can lend a hand once you strike.\n\nPayment will be issued upon successful completion of contract. There’s a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in this for the main contractor too.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n
Eckhart_ShipAmbush_VE_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of our clients has been the victim of consistent harassment so the time has come to send a clear cease-and-desist message by taking out their prized <EM4>~mission(AmbushTarget)</EM4>.  The lowlife in question follows a fairly predictable routine making them susceptible to an ambush. We’ve identified <EM4>~mission(Location|Address)</EM4> as the ideal spot. It features an <EM4>emission cloud</EM4> where you can hide and power down your ship while waiting. \n\nBy the way, the <EM4>~mission(AmbushTarget)</EM4> often flies alone but is sometimes joined by a friend in a single-seat ship. Neither should give you too much trouble, but we have other contractors in the area who can lend a hand once you strike.\n\nPayment will be issued upon successful completion of contract. There’s a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in this for the main contractor too.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n
Eckhart_ShipAmbush_E_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA client of ours has been receiving anonymous threats in an attempt to blackmail them, and after a bit of leg work on our part, we’ve managed to trace it back to an individual who pilots a particular <EM4>~mission(AmbushTarget)</EM4>. The client wants us to take care of this blackmailer before they have a chance to make good. \n\nBased on our assessment, the target shouldn’t be too difficult to handle. They fly by <EM4>~mission(Location|Address)</EM4> on the regular, which has an <EM4>emission cloud</EM4> that’s an ideal spot to power down your ship and lie in wait. Sometimes the target is alone but they often travel with other single-seat ships as protection. Best be strategic when you launch your ambush or the <EM4>~mission(AmbushTarget)</EM4> could have a chance to get away. We don’t want to lose this one. We’ll alert other contractors in the area of the ambush so they can come help once it pops off.     \n\nPayment will be issued upon successful completion of contract. The client has also added a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n
Eckhart_ShipAmbush_M_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nNeed someone to take out a <EM4>~mission(AmbushTarget)</EM4> and deal with the escort ships protecting it. They’ve already interfered with several of our ongoing operations and have become a real problem across several of Eckhart Security cases. Not sure what their endgame is, but it won’t matter once you deal with them.\n\nWe’ve let slip that we will be working a job over at <EM4>~mission(Location|Address)</EM4> which should serve as bait to draw them out. The spot is ideal for an ambush because of the <EM4>emission cloud</EM4> that’s a perfect place to power down and hide until you’re ready to strike. If you’re available, the <EM4>~mission(AmbushTarget)</EM4> and its escorts should be passing through soon.   \n\nPayment will be issued upon successful completion of contract. The main contractor will also receive a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 150\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Eckhart_ShipAmbush_H_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nLooking for a competent contractor who can recruit a wingman to help execute an ambush. The target is a <EM4>~mission(AmbushTarget)</EM4> which has been involved in several operations against one of our most important clients. By neutralizing it once and for all, it’ll make our client’s life a hell of a lot easier. While the ~mission(AmbushTarget) is our focus, they usually don’t fly anywhere without a sizable escort, including large craft. \n\nWe’ve gotten word that this group will be passing by <EM4>~mission(Location|Address)</EM4> soon. Any chance you could hurry and beat them there? That spot has an <EM4>emission cloud</EM4> that you can power down your ship and hide in. Then when they pass, you should have the upper hand.  \n\nPayment will be issued upon successful completion of contract. The client knows this one will be tough, so they threw in a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> that’ll go to the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 200\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- Slipstream (Powerplant)\n- Eclipse (Powerplant)\n- Lightstrike IV Cannon\n- Lightstrike V Cannon\n- Lightstrike VI Cannon\n\n<EM4>Pool 3</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Eckhart_ShipAmbush_VH_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA high profile client recently lost an important shipment when a pilot double-crossed them and ran off with their product. After weeks of hunting we’ve discovered that they were connected with an outlaw pack, so the client is looking to us to deter similar future issues from arising. The ultimate target is the pilot of a <EM4>~mission(AmbushTarget)</EM4>, who leads the crew responsible. This won’t be easy. They don’t go anywhere without escort fighters and sub-capital ships. That’s why we highly recommend that you find a trusted friend or two who can handle this with you.  \n  \nIntel gathered by our analysts indicates that they frequently fly by an <EM4>emission cloud</EM4> near <EM4>~mission(Location|Address)</EM4> which would provide an excellent area to stage a surprise strike.\n\nPayment will be issued upon successful completion of contract. We’re also adding a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> that’ll go to the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 250\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- Slipstream (Powerplant)\n- Eclipse (Powerplant)\n- Lightstrike IV Cannon\n- Lightstrike V Cannon\n- Lightstrike VI Cannon\n\n<EM4>Pool 3</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Eckhart_ShipAmbush_S_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nRecently, we sent a contractor after a <EM4>~mission(AmbushTarget)</EM4>, who was leading a crew targeting the operations of an extremely important client. Unfortunately, it was a trap and we lost some good people. We can’t let the target get away again, so we’ve decided the best course of action is to give them a dose of their own medicine.  \n\nAmbushing this target seems like the safest course of action, and we’ve identified a good spot for such an attack. There’s an <EM4>emission cloud</EM4> near <EM4>~mission(Location|Address)</EM4> that the target and their crew frequently fly by. You can power down your ship and hide there until you’re ready to strike. This crew is ruthless and extremely skilled. Don’t make the same mistake as the previous contractor and go this alone. It would be best for you to bring a few trusted friends to help handle this crew.    \n\nPayment will be issued upon successful completion of contract. Plus, we’ll throw in a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor for taking care of this.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Reputation Awarded:</EM4> 300\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- Slipstream (Powerplant)\n- Eclipse (Powerplant)\n- Lightstrike IV Cannon\n- Lightstrike V Cannon\n- Lightstrike VI Cannon\n\n<EM4>Pool 3</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Foxwell_bombingrun_VE_desc_001=A bunch of outlaws have been harassing our client and recently things have taken a turn for the worse. They've taken over their property and we've exhausted all other options.\n\nWe need a decent pilot to head to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you can cut off their supplies, you can pave the way for the client to take back their property.\n\nThis shouldn't be a tough one. You might run into a ship or two and maybe a few turrets, but you've been authorized to use lethal force. All we need for you to do is get in there, get the fuel tanks, and get out.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_E_desc_001=We've just received the location of an outlaw outpost where some up-and-coming criminals have been hanging out. Now, our client says there's no reason to engage these folks directly. Instead you will be targeting their supply lines.\n\nFly on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel stores while dealing with any minimal resistance they may put up. It will be your call on how much you engage with the hostile forces, just don't forget that your main objective is ensuring those fuel tanks are out of action.\n\nThis is a yellow level contract so pay will be proportionate.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_M_desc_001=We're in need of a sharp contractor for a hit and run operation. Client says some local thugs have been congregating in concerning numbers and we have been tasked with disrupting their base of operations.\n\nGet on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you're successful we can set these folks plans back a while, and most importantly, without having to deal with them directly.\n\nReports are showing there's a couple of ships buzzing around the area and some defense turrets. Just focus on the fuel tanks and you should be alright.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_H_desc_001=An opportunity has presented itself for a client to take action against a group of criminals who have been harassing their business.\n\nAccording to reports, this group of outlaws are currently laying low at <EM4>~mission(Location|Address)</EM4>. The client thinks this is a good time to catch them off guard and bring them to justice. The job is to take out their fuel tanks and putting an end to their smuggling operations once and for all.\n\nThese folks are not to be underestimated. You better bring some backup and fly low to avoid the turrets. Priority as always is the fuel tanks.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_VH_desc_001=Foxwell have been hired by a client to take part in a multi-stage operation on a known outlaw base at <EM4>~mission(Location|Address)</EM4> and need a strong pilot to play their part in this.\n\nYou, and whatever additional support ships you arrange, will be tasked with taking out the fuel tanks located there to set the stage for the rest of the operation to follow. \n\nUnfortunately, this place is swarming with ships and anti-air turrets. So make sure you and your people are ready, and remember, the fuel tanks are your priority. No need to be a hero.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_S_desc_001=We are looking for a highly competent mercenary team to assist with a challenging demolition for a VIP client.\n\nThe outlaws operating at <EM4>~mission(Location|Address)</EM4> has been identified as a threat of growing concern in the area and to help deal with this situation your team is being tasked with taking out the fuel tanks at the location. \n\nHowever, it won't be as easy as just slipping in and out - expect to deal with multiple hostiles and turrets that will be expecting you. The stronger your crew the better your chances at completing this operation successfully.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_E_desc_001=Foxwell is looking for an available combat pilot to provide immediate assistance to a ~mission(Ship) under attack over by ~mission(Location|Address). We have not identified the perpetrators in the attack, but have been assured it is a small force.\n\nPlease dispatch quickly and clear out all hostiles. We need the client to make it through this as they haven't paid us yet.\n\nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_M_desc_001=Got an orange level contract for any available combat pilots. A ~mission(Ship) is under attack around ~mission(Location|Address) and is in desperate need for assistance. We're not sure how many perpetrators there are, but they seem motivated and dangerous so exercise caution.\n\nOnce on site, engage and destroy any hostiles you encounter and protect the client. Once they've transferred the credits, we'll route you your payment.\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_H_desc_001=An emergency contract just came in about a fight near ~mission(Location|Address). Apparently a group of ships were ambushed by outlaws led by ~mission(TargetName), who's been wanted on multiple planets for murder and ship theft. Foxwell's looking for top tier combat pilots to go and protect the clients against them.\n\nThis one's been flagged as a red level contract so it's really dangerous. If you have people you could bring, you probably should. If you do, you should also let them know about Foxwell's hiring policies. \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_Mercenary_Rehire_desc_001=Due to a corporate restructuring, Foxwell has some new vacancies that need to be filled immediately. Foxwell knows you’ve previously expressed interest in this line of work, and we’re wondering if you would want to take another crack at a contract.\n\nOne of our clients needs support at <EM4>~mission(Location|Address)</EM4> where their security forces are struggling to handle an outlaw incursion. Head there and help the local forces get rid of the problem before it’s too late. \n\nSuccessfully complete this contract, and Foxwell would be happy to send more work your way.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Applicant level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_Allies_desc_001=Got word that outlaws are attempting to overrun <EM4>~mission(Location|Address)</EM4>. There’s local security forces there, but they’re struggling to stop that attack.\n\nNeed a contractor to hustle there and help take care of the aggressors. Bring plenty of gear, and be careful when engaging targets. Don’t want to hear about any security team members getting caught in your crossfire.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Security Trainee level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_NonHostiles_desc_001=We’ve been contracted to take care of a delicate situation. A gang has settled into <EM4>~mission(Location|Address)</EM4> that we need to get cleared out. Only issue is that there’s still some civilians there too. \n\nLooking for someone with the skills and good trigger sense to get rid of those outlaws without harming any innocent people. If that’s you, grab your gear and get over there. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Security Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_desc_001=Looking for someone willing to take out the trash at <EM4>~mission(Location|Address)</EM4>. Guess a gang has settled in without the permission of the owners. So they’ve hired us to get them out whatever way we see fit. \n\nI’d bring plenty of ammo, if I were you. Doubt they’ll want to leave willingly. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Security Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateSpecific_desc_001=Looking to execute a bounty on <EM4>~mission(TargetName)</EM4>. We’ve learned that they’re currently hiding out with some confederates at <EM4>~mission(Location|Address)</EM4>. \n\nI’d be prepared to deal with the lowlifes hanging around <EM4>~mission(TargetName|Last)</EM4>, but our only real concern is that you land the target. \n    \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Security Trainee level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateSpecific_NonHostiles_desc_001=Got a line on a bounty named <EM4>~mission(TargetName)</EM4>. Someone spotted them along with known criminal accomplices at <EM4>~mission(Location|Address)</EM4>. Need you to get there before they get going. \n\n<EM4>~mission(TargetName|Last)</EM4> has a reputation for only showing their face in places with civs. Really need you to take down this bounty without there being any civilian collateral damage. Foxwell can’t afford to be caught in the shitstorm that would erupt over the loss of innocent life. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 1,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Security Trainee level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_E_desc_001=Some folks will do anything for a few creds. There’s a group of upstart outlaws over at <EM4>~mission(Location|Address)</EM4> that have decided to start manufacturing drugs. Turns out they’re not too good at it, or maybe a little too good. The junk they’re pumping out is stronger than the normal stuff and a real danger to anyone who uses it. \n\nWe’ve been hired to knock out their operation and destroy whatever drugs stashes are on site. Armed guards are protecting the place, but they don’t seem too skilled. Our surveillance teams observed one of them almost shoot himself in the foot. Can’t say for certain, but odds are they won’t give a pro like you too many problems.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Security Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_M_desc_001=We’ve been contracted to take care of a problem at <EM4>~mission(Location|Address)</EM4>. There’s been a recent surge of activity in the area tied to the drug trade. It appears to be a well-run operation and there’s a growing concern that it’ll expand wider if not stopped. Any chance you’re available to make sure that doesn’t happen?   \n\nJob is pretty straightforward. Head to the site and destroy their stash of drugs. That way they won’t have the creds to expand their operations any further. I wouldn’t expect them to make this easy on you though. Armed guards are regularly seen around the facility, so be sure you’ve got enough gear to deal with them too. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Security Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_H_desc_001=Reports of a spike in drug overdoses around Stanton has security services worried. Seems like some two-bit crew is juicing their profits by cutting their stuff with toxic chemicals. Shutting down this crew and stopping the distribution of their drugs has become a top priority.\n\nA Foxwell informant has revealed that part of this crew has currently set up shop at <EM4>~mission(Location|Address)</EM4>. Hiring a contractor to hustle over there and destroy whatever drugs they’ve got stashed before they’re spread across the system. Better be careful though, word is this crew is armed to the teeth and determined to profit off that poison no matter what.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Security Contractor level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_PAF_M_desc_001=We’ve been tracking a group of outlaws who’ve been causing trouble for one of our clients. Seems they’ve taken up residence at an old Hathor facility. Don’t know what their plans with that old facility are but our client is eager to have them taken care of.\n\nLooking for someone to go to <EM4>~mission(Location|Address)</EM4> and neutralize these targets.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Applicant level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_OLP_M_desc_001=We’ve been following a group of outlaws on behalf of a client, and it looks like they’ve taken a permanent pit stop on an old orbital platform. \n\nWe’re looking for a contractor who can head over to <EM4>~mission(Location|Address)</EM4> and neutralize the targets. The platform is crawling with a bunch of armed and dangerous thugs, so we’ve designated this a yellow level contract.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Applicant level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
destroyprobelegal_desc=~mission(Contractor|DestroyProbeDescription)\n\n<EM4>Reputation Awarded:</EM4> 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Applicant level variants</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_MultiToSingle_desc_01=Something weird is going on at the old Hathor mining facilities. Both the platform alignment facilities and orbital laser platforms have been abandoned and gathering dust for decades, but outlaws have started using them as a base of operations.\n\nWe’ve been hired by a concerned party who’s recently lost a lot of important cargo to one such gang. Currently, their stuff is stashed at <EM4>~mission(Location1|Address)</EM4> and <EM4>~mission(Location2|Address)</EM4>, but there’s a growing fear that the gang may be offloading their goods soon. That’s why we’ve been hired to hit both of those Hathor facilities, retrieve the cargo from the freight elevators, and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nHere’s the specifics on what to grab from each location. Doesn’t matter in what order you do this, as long as it all gets collected and delivered. Just be sure to bring a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.  It also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n~mission(MultiToSingleToken)\n\nFoxwell hasn’t been able to scout these locations, but if I were you, I’d expect to face some serious armed resistance. Best bring a bunch of gear and some friends.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_AToB_PAF_desc_01=A crew recently raided a distribution center and made off with <EM4>~mission(CargoGradeToken) load of cargo</EM4>. Foxwell has been hired to get all those goods back. We’re getting reports of these outlaws using old Hathor facilities as stash houses and we believe the stolen items are currently at <EM4>~mission(Location|Address)</EM4>.\n\nIf interested, you’ll need a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. Doubt you’ll be able to slip in and out of that PAF without being noticed either, so best be prepared to clear the location. Once safe, grab the goods from the freight elevator and deliver them to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_AToB_OLP_desc_01=Looking for a contractor with the right skills and ship for an important mission. Outlaws ambushed a Hull C carrying a <EM4>~mission(CargoGradeToken)</EM4> load of cargo and took it to <EM4>~mission(Location|Address)</EM4>. We’ve been hired to get it all back.  \n\nThe cargo is being stored somewhere at a defunct Hathor facility. The place is big and crawling with outlaws. Need someone to retrieve the goods from the freight elevator there and deliver it all back to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. Don’t think this will be a walk in the park. Bring lots of ammo and a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_VE_001=There's a small group of criminals that have been marking their territory, striking out any freighters that get close enough. They got a little too greedy though, because now someone's paying us to go deal with them.\n\nOnce you and whoever you're bringing are ready, go to ~mission(Location|Address) and engage with these criminals. Since they like to fly in separate packs, be sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Okay, this might be a bit of stretch to do on your own, so if you got any favors to call in, it could be good to cash those chits now. There's a group of desperados striking delivery ships up and down this sector and we've been tasked with cleaning them up. \n\nOnce your crew is ready, head over to ~mission(Location|Address) and take the hostiles there down. Now, these bastards are a bit clever so they tend to split up into smaller packs. Make sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_M_001=A splinter group of outlaws have broken off from one of the main gangs in the system and have been trying to strike out on their own. With the amount of trouble they've been causing its clear they're looking to establish a name for themselves as quickly as they can. It's going to be up to you and your support crew to put a stop to them.\n\nOnce your crew is ready, head over to ~mission(Location|Address) and engage with the gang. Not all of them will just be waiting there on site. Expect reinforcements to arrive once you begin your assault. Just be sure to stay until every last one of them has been take care of.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=It seems that a couple of different small-time gangs have decided to pool their resources and start doing coordinated attacks. Alone, they weren't much, but all together they're proving to be a serious threat that has to be dealt with.\n\nRecruit some backup you can rely on and the fly over to ~mission(Location|Address). Once you attack the initial gang members you find there, the other groups will arrive to support them. Make sure you wait around to take out all of them.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_VE_desc_001=Care to help us ghost a bad guy? \n\nWe’ve been hired to hunt down an outlaw flying a <EM4>~mission(AmbushTarget)</EM4>. Shouldn’t be too hard since they take the same flightpath each day. That makes them a prime target for an ambush if I ever saw one. I’ve analyzed the route and determined that <EM4>~mission(Location|Address)</EM4> is the ideal spot to strike. There’s an emission cloud there that’ll be perfect to hide your ship’s signature while you wait.   \n\nJob is simple if you’re interested. Head to the location, hide out, power down, and then wait for them to fly by. Sometimes they roll alone but they often have other single-seat ships with them. Shouldn’t be too hard to handle for a pro. Plus, we’ll still have reinforcements nearby and ready to deploy once it pops off.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_E_desc_001=An outlaw who’s been on the run finally returned to the system. Seems like they hoped that disappearing for a bit would make us forget about them. They’re not even trying to hide their identity or vary their routine which means we know exactly where they’re going to be.\n\nLatest intel indicates that they’re flying a <EM4>~mission(AmbushTarget)</EM4> and will be passing by <EM4>~mission(Location|Address)</EM4> soon. I’ve already scoped out an emission cloud that’s a perfect place for you to find cover, power down your ship, and wait. Only real variable is if they’ll be alone or not. We’ve heard they sometimes roll with friends that all fly single-seaters. Landing that first surprise strike will be important as this crew is battle-tested, but we’ll have reinforcements at the ready to provide support if you need them.\n\nGet this done and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_M_desc_001=Foxwell has been tracking a <EM4>~mission(AmbushTarget)</EM4> used by outlaws and discovered a pattern to its movements. The ship should be passing by <EM4>~mission(Location|Address)</EM4> soon.\n\nLooking for a contractor willing to hustle there, hide in the emission cloud, and then spring the trap when the time is right. There’s usually escort ships with the <EM4>~mission(AmbushTarget)</EM4>. Careful not to jump the gun and blow your cover. The element of surprise is crucial from what I’ve read.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_H_desc_001=Recently, a <EM4>~mission(AmbushTarget)</EM4> baited Foxwell forces with a bogus rescue beacon. By the time our forces realized what was happening, a squad of ships unleashed a devastating attack and only one Foxwell contractor survived. Their scan logs identified the bait ship, and we’ve had scouts monitoring them ever since.\n\nOur surveillance has revealed the squad has a regular flight pattern that we think we can exploit. There’s a sizable emission cloud at <EM4>~mission(Location|Address)</EM4> that makes it an ideal spot to post up. Think you have what it takes to handle this for us? \n\nIt’ll be you against the <EM4>~mission(AmbushTarget)</EM4>, other large craft, and a sizable escort. Wish I could be more specific than that but this crew regularly rotates ships in and out of the squad. Would be smart to bring some support, so you don’t get overwhelmed by their numbers.   \n\nComplete the job and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_VH_desc_001=Foxwell got word from an important client that outlaws have put together a squad that’s been stalking the system with sub-capital ships and escort fighters. Our client is concerned that if left unchecked, outlaws will create more of these attack squads and destabilize system security. We’ve been hired to wipe out this group before that happens. \n\nWe need a confident and skilled contractor for this task. Good news is that we have a plan in place. One of the ships used by this squad, a <EM4>~mission(AmbushTarget)</EM4>, was stolen from our client, who’s still able to track its movements. They’ve shared the location data with us and we’ve discovered that this squad often goes by <EM4>~mission(Location|Address)</EM4>. We’ve scouted the location and discovered a large emission cloud makes an ideal spot for an ambush.  \n\nNot going to lie, this isn’t going to be easy. We don’t have any additional forces available to deploy, so it would be good to bring your own support. \n\nYou manage to pull this off, I've arranged for a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_S_desc_001=We’ve received a handful of comms about recent attacks undertaken by an <EM4>~mission(AmbushTarget)</EM4> and its escort ships. After opening a file, we started tracking the ship’s movements and noticed that it frequently passes an emission cloud near <EM4>~mission(Location|Address)</EM4>. We want to use that to our advantage to launch a surprise attack. \n\nOnce on site, you should hide in the emission cloud to cloak your signature enough to allow you to make the first strike. Unfortunately, Foxwell can’t provide additional reinforcements for this operation, so you’ll be responsible for bringing any support forces. You might need the help too. The crew of the ~mission(AmbushTarget) is aggressive and battle hardened.        \n\nYou get this taken care of for us and there's a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in it for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_VE_Desc_001=Calling all pilots – one of our clients is looking for some protection for their <EM4>~mission(Objects)</EM4>, based in <EM4>~mission(Location|Address)</EM4>. From what we’ve gathered, the attackers are a group of wannabe outlaw pests who probably haven’t realized the value of the assets they’re trying to destroy, just wreaking havoc for the sake of it. Still, the client’s property is important, so should be kept as intact as possible.\n\nIf you take care of them to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_E_Desc_001=Any willing pilots in the area? Need some protection around <EM4>~mission(Location|Address)</EM4> for a client. A band of outlaws has been targeting their <EM4>~mission(Objects)</EM4>, and if nothing's done about it they'll do some real damage. Need someone to protect the client’s property as much as possible and deal with the thugs.\n\nFrom the intel we’ve managed to gather, these thugs are small-time but can cause some pain if you’re not careful. So, if you manage to nail this to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_M_Desc_001=I'm hoping that you'll be able to provide protection services at <EM4>~mission(Location|Address)</EM4>. One of our high priority clients is having some real trouble with a band of outlaws targeting their ~mission(Objects). Need to be able to keep the assets as safe and intact as possible. Client’s expecting the service they pay for, so don’t mess this up or we might lose a loyal customer.\n\nFor now, we’re still a little in the dark when it comes to these outlaws, but if you manage to nail this to the Foxwell standards, we’re offering  <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_H_Desc_001=One of our high priority clients is under attack from a criminal gang targeting their <EM4>~mission(Objects)</EM4> in <EM4>~mission(Location|Address)</EM4>. The client’s assets are valuable, so we need to keep those safe at all costs, but I won’t kid – it’ll be a challenge and a half with these thugs determined to do some real damage. \n\nIf it were me, I wouldn’t hesitate to <EM>bring backup</EM4> to deal with them. They’re no joke, so we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor who deals with these guys successfully. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_VH_Desc_001=Urgent ship support needed at <EM4>~mission(Location|Address)</EM4>. A known destructive criminal organization has been testing the waters with one of our clients’ property for months, and has now raised hell by targeting the client’s <EM4>~mission(Objects)</EM4>. These assets are highly valuable, so need to keep those safe at all costs – though we know it’ll be no easy feat.\n\nI cannot stress enough how dangerous these guys are, so I wouldn’t hesitate to <EM>bring backup</EM> to deal with them. If you and the assets make it out intact, we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4>  to the main contractor. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_S_Desc_001=An emergency contract just came through about a gang of violent thugs wreaking havoc on one of our VIP clients’ infrastructures. If available, we need you to rush to <EM4>~mission(Location|Address)</EM4> and defend the client’s extremely valuable <EM4>~mission(Objects)</EM4> at all costs. \n\nFoxwell is extremely aware of this group, so believe me when I say these pilots are not to be taken lightly. I strongly recommend that you arrange a <EM> highly competent backup force</EM> to fly with you to the site.\n\nIf you manage to survive the encounter with the client’s property intact, we’re adding  <EM4>~mission(ScripAmount) MG Scrip</EM4> any main contractor brave enough to take this job on. \n\nStay safe, and good luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_VE_Desc_001=Outlaw ships are harassing anyone attempting to land or leave our client’s operations at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Need someone to fly there to defend the site and protect our client’s ships before the situation gets out of control. Get there, get after those aggressors, and I'll keep you updated on the situation. \n\nHelp take care of this and we'll pass along a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_E_Desc_001=Ships coming and going from <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are being targeted by hostile forces. The folks there have hired us to deal with this problem immediately.\n\nNeed someone to get there pronto and start fighting off these ships. The situation appears to be constantly evolving, so I’ll keep you updated on where you’re needed most. \n\nFor the hustle and effort, we’ll also be paying a bonus of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor for dealing with this.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_M_Desc_001=We’ve got clients reporting outlaw attacks on ships around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. They got locked down tight and anybody heading in or out is a target. Any attempts to solve the issue have just been met with more outlaw reinforcements appearing. \n\nThe client is desperate for a solution, so we’re hiring a contractor to go and restore peace in the area. If any other issues flare up once you're there, I’ll comm you directions on how to help.  \n\nReally need someone on this fast. So to sweeten the pot, the main contractor will also get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_H_Desc_001=The folks at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are under attack and need our support. Their ships in the wider area are being targeted and there’s a growing concern that this is only a precursor to something bigger.  \n\nThe situation is evolving, but I’m being fed constant updates on what’s going on and will keep you informed as the contract progresses. \n\nAre you available to come to their aid? Would be smart to recruit some friends to help. These are important clients and we can’t afford to fail them. The main contractor will earn a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if you get the job done.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_VH_Desc_001=Ship support is needed at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> immediately. Our client’s interests in the area are under fierce attack by outlaw forces. Looking for someone who can grab their gear, a few support ships they can trust, and deploy before it’s too late. Once you arrive, I’ll send any sitrep updates your way.  \n\nDon’t mess this up. These clients are paying for and expecting top tier protection. If anything goes wrong, we could lose this contract. That’s why we’ll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if all goes down without a hitch.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_S_Desc_001=Looking for a consummate professional to handle a high-stakes job. We’ve got VIP clients at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> who are facing extremely aggressive and motivated outlaws targeting ships around their location. Exact details on the attack are still rolling in, but it appears to be a wide ranging, multi-pronged operation. \n\nIf you’re available, I highly recommend that you bring additional combat support ships, plenty of supplies, and your A-game. Get this right, and we’ll reward the main contractor with a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 300 / 16,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_VE_Desc_001=Time to knock out a routine patrol for one of our long-term clients. The route is a series of waypoints that need to be visited and scanned to confirm everything’s as expected. Should be simple enough.  \n\nIf interested, please accept and head to the <EM4>location marker</EM4> on your HUD to start. Pull this off and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_E_Desc_001=Need someone to knock out a security patrol. You’ll need to go to the <EM4>location marker</EM4> on your HUD and then scan several designated waypoints ensuring that they’re safe and secure. \n\nSatellites in that region have been acting up recently. Not exactly sure what’s going on out there, but best be prepared in case there’s any trouble.\n\nComplete this contract and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_M_Desc_001=A client is concerned about activity near some of their interests. We’ve been contracted to patrol the area and run scans at several locations. Interested? If so, head to the <EM4>location marker</EM4> on your HUD to start the patrol.\n\nThe client wasn’t specific about the threats, but they don’t think everything’s on the level out there. Hopefully we’ll be able to bring them some peace of mind.\n\nAdditionally, the client arranged for us to offer a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_H_Desc_001=Several unknown ships have been spotted in areas frequented by haulers delivering goods for our client. They’re worried these ships are monitoring their haulers in preparation for an ambush, so they’ve hired us to patrol the area. \n\nStart by going to the <EM4>location marker</EM4> on your HUD and scan it to ensure it’s clear. After that, we’ll send you to some other areas to scan for potential threats. We recommend that you bring a <EM4>wingman</EM4> and plenty of supplies to be ready to handle whatever might come your way.     \n\nAlso know that successfully completing this contract will earn the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_VH_Desc_001=A client needs our help. Outlaws are roaming certain sectors where they do business and attacking anyone they come across. Our client has already lost several ships and can’t afford to lose anymore. \n\nWe need someone to patrol those areas and draw out any hostile forces. The job begins with you heading to the <EM4>location marker</EM4> on your HUD and scanning. Then we’ll share a handful of other patrol points for you to scan. \n\nFrom the sound of it, these packs of ships feature skilled and aggressive pilots. Best be ready to rumble if you run into any of them. Would be good to have at least <EM4>two trusted pilots</EM4> by your side for this one.\n\nAt the end of a successful patrol, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nStay chilly,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_S_Desc_001=Need a battle-hardened pilot for an important patrol. A prominent client is fed up with outlaws targeting their ships and satellites. We’ve been hired to scan the areas in question and deal with any hostile forces. The patrol begins at the <EM4>location marker</EM4> on your HUD before moving to a number of other locations we’ll expect you to clear.\n\nNot sure what you’ll run into out there, but based on intel shared by the client, they’re frequently seeing fighter groups of five to seven ships roaming the region. Some even have larger ships leading the charge. That means you better be ready for a serious fight. If you can, try to recruit at least <EM4>three friends</EM4> to the cause. Even a seasoned pilot will need all the help they can get against this crew.   \n\nSince this is going to be a tough one, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> at the end of the patrol.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
