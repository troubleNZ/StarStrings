Intersec_DefendShip_Desc_Easy_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ship \nBriefing: Require urgent assistance for an InterSec operative who is currently under fire at <EM4>~mission(Location|Address)</EM4>.\n\nA group of outlaws had previously taken our operative captive with the intention of extracting sensitive information from them, but miraculously they were able to escape. Unfortunately, the pursuing outlaws now have them pinned down.\n\nDue to the number of the ships assaulting them, we're offering additional compensation to accommodate the added danger. <EM4>Recruiting additional ships</EM4> to support you in this mission is highly advised.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Combustion\n
Intersec_DefendShip_Desc_Medium_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: An undercover agent of ours was compromised and is now being pursued by the outlaw pack they had infiltrated. As such, they are in need of immediate extraction at <EM4>~mission(Location|Address)</EM4>. \n\nOnce on site, engage with all hostiles in order to provide cover so our operative can QT away.\n\n<EM4>Bring additional backup</EM4> and don't underestimate these outlaws. They are violent and motivated so they are unlikely to give up anytime soon.\n\nRespectfully,\n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Combustion\n
Intersec_DefendShip_Desc_Hard_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: One of our pilots is under attack at <EM4>~mission(Location|Address)</EM4> and is in need of assistance.\n\nThis operative is carrying key information regarding a coordinated attack on key UEE infrastructure and it is vital that they are able to deliver it to us. You and any <EM4>dependable pilots you can recruit</EM4> are charged with protecting them from the outlaws in pursuit long enough for them to QT away.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Combustion\n
Intersec_DefendShip_Vanduul_Desc_VeryHard_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Vanduul \nEquipment Specs: Combat-rated Ships \nBriefing: We've just lost contact with a pilot who engaged with Vanduul forces at <EM4>~mission(Location|Address)</EM4>.\n\nTravel to their last known location and if they're still alive, defend them long enough to ensure they can escape. Ensuring the safety of the operative is crucial, as is eliminating any Vanduul threats to the UEE.\n\nYou'll most likely need a <EM4>strong group of ships</EM4> to successfully neutralize these Vanduul.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Combustion\n
Intersec_DefendShip_Vanduul_Desc_Super_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ship\nBriefing: An operator working with InterSec is currently being attacked by Vanduul ships at <EM4>~mission(Location|Address)</EM4>. The likelihood of them surviving on their own is low, so we’re looking for a contractor willing to provide combat support.  \n\nContractors accepting this mission should be well supplied and ready to face the Vanduul threat head-on. \n\nRespectfully, \n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Pulse "Rouge" Pistol\n- Testudo Arms Combustion\n- Testudo Core Combustion\n- Testudo Legs Combustion\n- Testudo Helmet Combustion\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Combustion\n
Intersec_KillShip_Desc_Intro_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has been hired to combat the rising number of outlaws using Nyx as a staging ground for their operations, with the intention of attacking neighboring UEE systems.\n\nAs a preventative measure, we require you to travel to <EM4>~mission(Location|Address)</EM4> and eliminate the ringleader <EM4>~mission(TargetName)</EM4> to deter their planned attack on Stanton. They and their crew are highly dangerous and you are <EM4>advised  to bring a wingman</EM4> for support.\n\nContractors who can prove themselves reliable and competent in executing operations will be eligible for future missions with InterSec.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Desc_Easy_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has identified more outlaws who are planning an operation against UEE interests from within Nyx. Your mission will be to neutralize this potential threat before they can enact their plans.\n\nTravel to <EM4>~mission(Location|Address)</EM4> and dispatch the leader of these outlaws, <EM4>~mission(TargetName)</EM4> without hesitation. We have scouted a small number of ships, but our report suggest these are competent pilots - <EM4>bringing back up is advised.</EM4>\n\nRemember that eliminating these outlaws not only serves the people of Nyx, but the UEE too.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Desc_Medium_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: Seemingly unsatisfied with their takings in Nyx, an outlaw group lead by <EM4>~mission(TargetName)</EM4> has been planning a major strike against the UEE. This cannot be allowed to come to pass.\n\nThanks to the work of our Intelligence team, we've been able to track them down to <EM4>~mission(Location|Address)</EM4>.\n\nHead there as soon as you can and engage before they have a chance to leave the system. Based on our strategic analysis, we recommend a <EM4>well-armed and skilled fleet</EM4> will be necessary for the successful completion of this mission.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Desc_Hard_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec requires a skilled contractor to eliminate a highly dangerous group of criminals based in Nyx who are planning a coordinated strike on a prominent member of the UEE Navy.\n\nWe have intercepted a crucial piece of intelligence suggesting a known terrorist by the name of <EM4>~mission(TargetName)</EM4> intends to carry out this assassination along with the help of local criminal elements.\n\nThey are currently located at <EM4>~mission(Location|Address)</EM4>, making this an ideal time for us to strike. Be warned, these outlaws are experienced killers - bringing a <EM4>group of trustworthy allies</EM4> is advised.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Intersec_KillShip_Vanduul_Desc_VeryHard_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec is in need of a highly skilled combat pilot who can locate and neutralize a dangerous Vanduul target.\n\nAn operator of ours has identified a Vanduul ship flying within the vicinity of <EM4>~mission(Location|Address)</EM4>. We've been given strict instructions to eliminate any Vanduul spotted on the fringes of UEE space, for fear of encroachment into the Empire's territory.\n\nBring a <EM4>small fleet of competent pilots</EM4> with you to engage and neutralize the target.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
InterSec_KillShip_Vanduul_Desc_Super_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ship\nBriefing: InterSec requires the services of a skilled pilot who’s prepared to assist in taking down a dangerous Vanduul target that has been involved in numerous attacks.\n\nVanduul incursions have been on the rise recently, posing not only a threat to the system of Nyx, but the UEE as a whole. It is imperative that these sightings are responded to in a swift and efficient manner. \n\nWe require you to fly to the last known sighting of the Vanduul ship at <EM4>~mission(Location|Address)</EM4> and eliminate them immediately.  \n\nVanduul pilots are highly skilled and extremely dangerous. Engage the enemy immediately and do not hesitate – they will not show the same mercy.\n\nCompensation proportionate to the risk of the contract will be awarded.\n\n\nRespectfully,\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
InterSec_SecurityPatrol_H_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has received intelligence that outlaws are planning to launch an attack on a target within the UEE. In an effort to prevent this from happening, we need a contractor to patrol a sector we believe these outlaws are using to prepare for their attack.\n\nOutlaw activity in this sector is higher than normal, so InterSec recommends that you <EM4>bring backup</EM4>. When ready, dispatch to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. Once you've confirmed that the entire sector is clear, the main contractor will receive a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4> \n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Quartz "Lumen" Energy SMG\n- Testudo Arms Nightveil\n- Testudo Core Nightveil\n- Testudo Legs Nightveil\n- Testudo Helmet Nightveil\n- Quartz "Deadfall" Energy SMG\n- Testudo Arms Turfwar\n- Testudo Core Turfwar\n- Testudo Legs Turfwar\n- Testudo Helmet Turfwar\n- Quartz Energy SMG Battery (45 cap)\n- Testudo Backpack Turfwar\n- Testudo Backpack Nightveil\n
InterSec_SecurityPatrol_VH_desc_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws\nEquipment Specs: Combat-rated Ships\nBriefing: InterSec has been tracking increased outlaw activity in certain sectors of the system. This activity in conjunction with other intelligence leads us to believe that outlaws are planning an attack on elements traveling from the UEE. We're aiming to patrol these sectors and disrupt any plans before they can be put into action.\n\nCurrently, we need someone who can help patrol a highly dangerous sector. Once you've accepted the mission, you can proceed to the <EM4>location marker</EM4> on your HUD. From there, we'll send you along a specific route with additional waypoints to scan. Complete the patrol and we'll send the main contractor a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nDue to the high probability of attack and general threat level of local outlaws, we recommend <EM4>recruiting trusted wingmen</EM4> to provide combat support.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Quartz "Lumen" Energy SMG\n- Testudo Arms Nightveil\n- Testudo Core Nightveil\n- Testudo Legs Nightveil\n- Testudo Helmet Nightveil\n- Quartz "Deadfall" Energy SMG\n- Testudo Arms Turfwar\n- Testudo Core Turfwar\n- Testudo Legs Turfwar\n- Testudo Helmet Turfwar\n- Quartz Energy SMG Battery (45 cap)\n- Testudo Backpack Turfwar\n- Testudo Backpack Nightveil\n
InterSec_SecurityPatrol_S_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Vanduul\nEquipment Specs: Combat-rated Ships\nBriefing: There's a growing concern that Vanduul hunting parties are pushing further into Nyx. The first line of defense against this encroachment is increased patrols. InterSec has identified a sector that has seen an uptick in Vanduul activity and are looking for someone to patrol the region and provide an update on it.\n\nYou'll begin your patrol at a <EM4>location marker</EM4> sent to your HUD and then scan a series of waypoints along a designated route. The Vanduul ships in this sector are highly skilled and aggressive, so InterSec highly recommends that you <EM4>bring several combat-ready ships along as backup</EM4>.\n\nInterSec understands the immense danger you'll be under on this patrol, so we'll send a special bonus of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor once the sector is clear.      \n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Quartz "Lumen" Energy SMG\n- Testudo Arms Nightveil\n- Testudo Core Nightveil\n- Testudo Legs Nightveil\n- Testudo Helmet Nightveil\n- Quartz "Deadfall" Energy SMG\n- Testudo Arms Turfwar\n- Testudo Core Turfwar\n- Testudo Legs Turfwar\n- Testudo Helmet Turfwar\n- Quartz Energy SMG Battery (45 cap)\n- Testudo Backpack Turfwar\n- Testudo Backpack Nightveil\n
Kaboos_Intro_Description=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Unknown\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: InterSec has been enlisted by the UEE to gather intel on a group of <EM4>black marketeers dealing in Vanduul parts</EM4>, that have been linked to the illegal Vanduul experiments happening at ASD’s Onyx Facility. The UEE is eager to understand and put an end to their operations.\n\nBased on evidence extracted from the ASD facilities, we’ve potentially managed to track down the location of one of their storage sites.\n\nOnce accepted, head over to the old <EM4>QV Planet Services Logistics station</EM4> and we’ll be in touch.\n\n\nRespectfully, \n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 100
Kaboos_Mission_Description=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: InterSec needs your services once again.\n\nThe intel you previously gathered has been invaluable in identifying several prominent buyers of the illegally-obtained Vanduul parts. However, since then the Shattered Blade have continued their operations and the UEE is requesting that we <EM4>update our intel.</EM4>\n\nWe believe more information can be retrieved from the storage facilities located at the old <EM4>QV Logistics station.</EM4>\n\nThe operation parameters haven’t changed since your last mission: find the <EM4>encrypted data</EM4> and use the <EM4>decryption key</EM4> to decipher and upload the list to us. The Shattered Blade will have reinforced the area since the last time, so expect resistance.\n\nGood luck. We’ll be in touch.\n\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 100\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n<EM4>Pool 1</EM4>\n- Pulse "Blacklist" Pistol\n- Quartz Energy SMG\n- Quartz "Black Op" Energy SMG\n- Testudo Arms\n- Testudo Core\n- Testudo Legs\n- Testudo Helmet\n- Testudo Helmet Clanguard\n- Testudo Core Clanguard\n- Testudo Legs Clanguard\n- Testudo Arms Clanguard\n- Quartz Energy SMG Battery (45 cap)\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack\n\n<EM4>Pool 2</EM4>\n- Attrition-1 Repeater\n- Attrition-2 Repeater\n- Attrition-3 Repeater\n
InterSec_ResourceGathering_Cryopods_Desc=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: <EM4>Cargo Capable Ship</EM4>, Personal Arms, <EM4>Heavy-Duty Tractor Beam</EM4>\nBriefing: \nOur latest intel shows that the Shattered Blade have replenished their stock of Vanduul corpses and will shortly be transferring them from the old <EM4>QV Logistics station</EM4>they're operating from to an interested buyer. The UEE can't have another incident like what happened with ASD so they're eager for us to <EM4>recover the cryopods</EM4> and deliver them to <EM4>the freight elevator at ~mission(Destination|Address)</EM4>.\n\nWhile the Shattered Blade members present at the site might offer resistance, they are not the focus of you mission. Deal with them as needed and get the cryopods. \n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Testudo Arms Earthshake\n- Testudo Core Earthshake\n- Testudo Legs Earthshake\n- Testudo Helmet Earthshake\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Earthshake\n
InterSec_ResourceGathering_Tech_Desc=MISSION SPECS\n\nArea of Operation: Nyx System\nHostile Forces: Outlaws present and armed\nEquipment Specs: Combat-rated Ship, Personal Arms\nBriefing: \nTo prevent the Shattered Blade from flooding the black market with xeno-contraband, the UEE has charged InterSec with <EM4>recovering a stash of Vanduul Plating and Metal.</EM4> from the old <EM4>QV Logistics station</EM4> the gang has been occupying. Once you have the materials in your posession, deliver them to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nFollowing from your previous experience, it would not be surprising if the Shattered Blade offer resistance, but ensure that your focus is on recovering the materials.\n\nRespectfully,\n\nDeacon Tobin\nOperations Manager\nInterSec Defense Solutions\n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Testudo Arms Earthshake\n- Testudo Core Earthshake\n- Testudo Legs Earthshake\n- Testudo Helmet Earthshake\n- Pulse Laser Pistol Battery (60 Cap)\n- Testudo Backpack Earthshake\n
Intersec_ShipWaveAttack_DrawOutBoss_VH_Desc_001=MISSION SPECS\n\nArea of Operation: ~mission(Location|Address)\nHostile Forces: Outlaws\nEquipment Specs: Heavy Gun-Ship\nBriefing: An outlaw fleet lead by <EM4>~mission(TargetName)</EM4> has been planning a major strike against vital UEE infrastructure. InterSec has been tasked with dealing with this threat before their attack can be launched.\n\nGather a suitable amount of support craft and head to the engagement site. There you will have to engage with various squadrons before their leader will deem the situation dire enough to directly lead their forces. It is critical that they be neutralized in order to ensure the attack is stopped.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 250
Intersec_ShipWaveAttack_DrawOutBoss_S_Desc_001=MISSION SPECS\n\nArea of Operation: ~mission(Location|Address)\nHostile Forces: Outlaws\nEquipment Specs: Capital Ship\nBriefing: An outlaw fleet lead by <EM4>~mission(TargetName)</EM4> has been planning a potentially devastating strike against sensitive UEE targets. InterSec has been tasked with dealing with this threat before their attack can be launched.\n\nAfter putting together a fighting force of your own, head to the site and engage with the hostiles there. Their leader will not risk entering into the fray themselve unless they feel their operation is suitably at risk. Stay at the site and take out hostile targets, until you can engage with the groups leader directly and put a stop to this heinous attack once and for all.\n\nRespectfully, \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of a non-binding offer that upon acceptance may be immediately terminated by either party without any given notice. All operations are conducted at the contractor’s own personal risk and must adhere to system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 300
Intersec_TSG_Group_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Shattered Blade\nEquipment Specs: Strike Group\nBriefing: \nWe've received word that a People's Alliance security ship called Tranquility stumbled across  Shattered Blade hiding out in an old QV Extraction station. Details are sketchy but will connect you with local assets once on site. \n\nIntersec is looking for a team to intervene and protect the Tranquility and their personnel. Based on discussions with the Tranquility's captain, you will <EM4>need  ballistic and ordnance to break down the defenses of the station</EM4> and ultimately <EM4>get boots on the ground to save their pilot</EM4>.\n\n<EM4>Recruiting additional ships</EM4> to support you in this mission is absolutely critical. You will <EM4>need a variety of ship types</EM4> to balance multiple combat zones in space and on the ground.\n\nRespectfully,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 300\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- WhiteHot Racing Flight Suit\n- BlackFire Racing Flight Suit\n- BlueFlame Racing Flight Suit\n- WhiteHot Racing Helmet\n- BlackFire Racing Helmet\n- BlueFlame Racing Helmet\n- Novian Crossbow\n- Novian "Nighthunter" Crossbow\n- Novian "Ghostmaker" Crossbow\n- Novian "Wildshot" Crossbow\n- Tailwind Flight Helmet Thunderstruck\n- Tailwind Flight Helmet Frostshock\n- Tailwind Flight Helmet Blue Skies\n- Tailwind Flight Helmet Airwolf\n\n<EM4>Pool 2</EM4>\n- Omnisky III Cannon\n- Omnisky VI Cannon\n- Omnisky IX Cannon\n- Omnisky XII Cannon\n- Omnisky XV Cannon\n- Omnisky XVIII Cannon\n- JS-300 (Powerplant)\n- JS-400 (Powerplant)\n- QuadraCell MX (Powerplant)\n- JS-500 (Powerplant)\n
Intersec_TSG_Assist_Solo_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Vanduul\nEquipment Specs: Combat Ready\nBriefing: \nAn Idris-class People's Alliance security vessel named Tranquility is currently engaged with a <EM>Vanduul capital ship</EM4> near an old <EM4>QV Extraction station</EM4> and Intersec is looking for combat pilots to lend some support.\n\nScramble to the AO and <EM4>engage Vanduul fighters so the Tranquility can focus on the capital ship</EM4>. \n\nGood luck,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 200\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Deadbolt I Cannon\n- Deadbolt II Cannon\n- Deadbolt III Cannon\n- ForceWall (Shield)\n- CoverAll (Shield)\n- FullBlock (Shield)\n\n<EM4>Pool 2</EM4>\n- Tailwind Flight Suit\n- Tailwind Flight Helmet Green Streak\n- Tailwind Flight Helmet Blackbolt\n
Intersec_TSG_BombRun_Solo_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Shattered Blade\nEquipment Specs: Combat Ships w/Ordnance\nBriefing: \nLocal assets have indicated that Shattered Blade elements are attempting to rebuild one of their stations and Intersec is looking for a pilot to make sure that doesn't happen.\n\nThey've managed to get basic turret defenses back online but currently only have <EM4>two power relays activated</EM4>. These will be your targets as they <EM4>cannot be destroyed by energy weapons, you will need to bring ballistic or ordnance to be effective</EM4>. \n\nReactivation of this station will allow the Shattered Blade to try and reclaim a foothold in this system and we can't let that happen.\n\nGood luck,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.\n\n<EM4>Reputation Awarded:</EM4> 200\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Deadbolt IV Cannon\n- Deadbolt V Cannon\n- Deadbolt VI Cannon\n- Polar (Cooler)\n- Permafrost (Cooler)\n- Tempest (Cooler)\n\n<EM4>Pool 2</EM4>\n- Tailwind Flight Suit\n- Tailwind Flight Helmet Big Bite\n- Tailwind Flight Helmet Adrenaline\n
northrock_bounty_fps_UGF_boss_desc_001=Hey, \n\nHave an interesting bounty for you. A high level criminal by the name ~mission(TargetName) has been located at ~mission(Location|Address). \n\nBased on our intel, its highly unlikely that the target’s going to be sitting and waiting out in the open. You most likely will have to infiltrate the facility and draw them out. \n\nSomething like a large firefight should be enough to do the trick. \n\nBest of luck,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n\n<EM4>Reputation Awarded:</EM4> 4,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Applicant level variants</EM4>\n- F55 LMG\n- LH86 Pistol\n- Defiance Arms Tactical\n- Defiance Core Tactical\n- Defiance Legs Tactical\n- Defiance Helmet Tactical\n- Lynx Arms\n- Lynx Legs Base\n- Lynx Core Base\n- Oracle Helmet\n- F55 LMG Magazine (150 cap)\n
northrock_bounty_fps_UGF_boss_nocivs_desc_001=Hey, \n\nGot a contract for you that requires a bit more tactics than usual. A high-level criminal by the name ~mission(TargetName) is hiding with a large contingent of outlaws at ~mission(Location|Address). \n\nOur intel suggests that ~mission(TargetName|Last)’s forces most likely will act as defensive line in order to protect their boss. My best guess is that you will have to deal with them before you gain access to ~mission(TargetName|Last).\n\nThat said, I don’t want you shooting indiscriminately. Sometimes these outlaws keep civilians around and they should be treated like non-combatants.\n\nBest of luck,\n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n\n<EM4>Reputation Awarded:</EM4> 8,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Applicant level variants</EM4>\n- F55 LMG\n- LH86 Pistol\n- Defiance Arms Tactical\n- Defiance Core Tactical\n- Defiance Legs Tactical\n- Defiance Helmet Tactical\n- Lynx Arms\n- Lynx Legs Base\n- Lynx Core Base\n- Oracle Helmet\n- F55 LMG Magazine (150 cap)\n
northrock_boarders_890J_desc_001=An executive client just informed us that their 890 Jump had been intercepted at ~mission(Location) and boarded by outlaws. They would prefer to have this handled privately owing to the sensitive nature of proprietary data that's being stored aboard. \n\nYour first priority will be to clear all outlaws as quickly as possible so that a recovery team can be dispatched to return the ship to the owner. The longer the outlaws have control of the vessel, the higher the chance it will be lost. I recommend you acquire a team for this outing to expedite matters. \n\nNote that thanks to a small contingent of Security Personnel who stayed aboard, all surviving members of the crew were able to flee in an escape craft. The current status of the remaining security is unknown, but just in case, keep an eye out for friendlies when you engage the hostiles.\n\nSecondly, if at all possible, the client is *very* interested in preventing the theft of the aforementioned data. If you are able to stop the theft of their confidential data stores before they are transmitted, a generous bonus will be issued.\n\nNeedless to say, this is a client I would very much like to keep happy. \n\nBraden Corchado\nLogistics Officer - Stanton Branch\nNorthrock Service Group\n\n<EM4>Reputation Awarded:</EM4> 8,000
basesweep_desc=~mission(Contractor|BaseSweepDescription)\n\n<EM4>Reputation Awarded:</EM4> 100
assassin_desc=~mission(Contractor|AssassinationDescription)\n\n<EM4>Reputation Awarded:</EM4> 100
mg_ruto_UGF_destroy_E_desc_001=Seems there’s a new upstart in the sector who hasn’t been paying the right dues to the right people. To teach them a little lesson, my client wants you to go down to ~mission(Location|Address) and destroy all the drugs on site.\n\nThe low-level lugs they got on site will probably make a stink about it and try to stop you. Handle them however you want but getting rid of the product is the most important thing.\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
mg_ruto_UGF_destroy_desc_001=One of my clients has been unhappy to learn that someone's been muscling in on their territory. Now rather than going down the more traditional route of killing some people and starting a whole thing, they’ve opted to send a different kind of message instead.\n\nYou’re gonna go down to ~mission(Location|Address) and destroy all the drugs on site. \n\nOf course, if someone does wanna pick a fight with you, feel free to defend yourself, but getting rid of the product is the most important thing.\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 2,000
mg_ruto_UGF_destroy_H_desc_001=A client of mine‘s trying to negotiate a deal, but isn’t having much luck. The other party feels like they got all the leverage because they’re sitting comfortably on a pile of inventory. To help move the negotiations along, I’m gonna need you to head down to ~mission(Location|Address) and destroy all the drugs on site. \n\nNow, I should probably tell you that the site’s being protected by some very serious people, so getting to the stash is going to be a bit tricky, but I trust you’ll find a way. \n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 4,000
mg_ruto_UGF_eliminateall_desc_001=This is a bit aggressive for my taste, but credits are credits, right?\n\nGot a client who's looking for a highly motivated individual to head over to ~mission(Location|Address) and kill everyone who’s there. \n\nBasically, start shooting and don’t stop. You'll get paid once the site's clear.\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
mg_ruto_UGF_eliminateall_civsonly_desc_001=A client is getting out produced by a new competitor and is looking to throw a wrench into the works.\n\nYou’re going to head to ~mission(Location|Address) and kill all the civies who work there. \n\nDo what you want with the gun-toting goons guarding the workers, but remember that they aren’t the priority.  \n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
mg_ruto_UGF_eliminateall_Lawnocivs_desc_001=Everybody holds grudges, right? I mean, when you get popped pulling a crime, I get that you’re a little sour, but that’s pretty much the game, right?\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 2,000
mg_ruto_UGF_eliminateall_nocivs_desc_001=I know someone who’s looking to start up a new business, but they’re having a hard time hiring the skilled workers they need.\n\nNow the thing is, they found the perfect crew over at ~mission(Location|Address), but the people they work for won’t let them go. Even hired extra armed guards to make sure of it.\n\nWhat I want you to do, is go there and kill all the guards while making sure all the workers remain unharmed. \n\n\n<EM4>Reputation Awarded:</EM4> 100
mg_ruto_clearcrimestat_rep_desc_01=Hey there. I heard you ended up in Klescher which is a real drag. But it might actually be a lucky day for both of us.\n\nLong story short, I had somebody sneaking a datachip out of the prison, but they never got back to me. I know for a fact they haven’t left the facility, so I think something might have happened to them. While tragic, business must carry on. If you can get the chip and finish the job, I can clear your crimestat for you. What do you say?\n\nOf course, I don't know exactly how far they got, but I can tell you that the prison's got a whole network of hidden tunnels my guy was planning on using to make his escape. My guess is his corpse is rotting away somewhere there.\n\nOnce you find the body, I’m hoping the chip will still be on him. When you’ve got it, finish escaping and get the data to me. There’s a spot nearby you can upload the chip’s contents. \n\nOne warning though, you might want to watch out for Hurston Security. They've been a hassle lately, so I wouldn't be surprised if you ran into them.\n\nWhen I've got the data I’ll wipe your crimestat and then, voila, you’ll be free and clear. What you do after that is entirely up to you.\n\n<EM4>Reputation Awarded:</EM4> 100
Foxwell_X2_AttackIdris_Desc=We have a fix on a XenoThreat Idris with fighter support at <EM4>~mission(Location|Address)</EM4>. Their comms discipline's lousy. According to the radio chatter, the Commander's on board the Idris. Can't remember the last time we had such a strong fix on him. This could be a chance to decapitate the whole operation. \n\nWant in?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Scenario Progress Points 120,000 (Split)</EM4>
Foxwell_X2_ShipAmbush_Desc=Been handed some strong intel on a XenoThreat strike wing's flightpath. Looking for contractors who can dust off now and be set up at <EM4>~mission(Location|Address)</EM4> ahead of them. Local conditions will mask your scanner signatures so you can give them the surprise of their lives. Let's turn the hunters into the hunted.\n\nInterested?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Scenario Progress Points 4,000</EM4>
Foxwell_X2_ShipWaves_Desc=Multiple reports are coming in of XenoThreat ships massing at <EM4>~mission(Location|Address)</EM4>\nWe're looking for contractors ready to take the fight to them. \n\nThey want us to believe that they have right on their side. They want us to believe that they have overwhelming force. This is a chance to show them we know better.\n\nI won't lie, this is more than just a simple security contract to me. I really hate those intolerant assholes and everything they stand for.\n\nYou with me?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Scenario Progress Points 3,800</EM4>
Foxwell_X2_ShipDefend_Desc=A distress beacon came in from <EM4>~mission(Location|Address)</EM4> about a ship under attack from XenoThreat. The pilot reports that their shields are failing and they can't outrun the attackers.\n\nThe ship's a <EM4>~mission(Ship)</EM4>, but the pilot's Human, which  according to XenoThreat's twisted way of thinking, makes them a traitor to Humanity and a target for their hate.\n\nWe're looking for operators to head out there and do some good.\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Scenario Progress Points 4,000</EM4>
Foxwell_X2_DrawOutBoss_Desc=We have intercepted a location beacon that puts <EM>~mission(TargetName)</EM4> and their personal attack wing at <EM4>~mission(Location|Address)</EM4>. They have been one of XenoThreat's most brutal enforcers since their founding. \n\n<EM>~mission(TargetName|Last)</EM4>'s not one to back down from a fight so hit their ships hard enough, do enough damage and they won't be able to resist joining in the action. Once they're out in the open, they'll be your main target.\n\nReady to go?\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Scenario Progress Points 8,400</EM4>
blackbox_recover_desc_intro_001=~mission(Contractor|BlackBoxRecoverDescriptionIntro)\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Lumin V SMG\n- Arrowhead Sniper Rifle\n- Aves Arms\n- Aves Core\n- Aves Legs\n- Aves Helmet\n- Aves Shrike Core\n- Aves Shrike Arms\n- Aves Shrike Legs\n- Aves Shrike Helmet\n- Lumin V SMG Battery (45 cap)\n- Arrowhead Sniper Rifle Battery (16 cap)\n
blackbox_recover_desc_H_001=~mission(Contractor|BlackBoxRecoverDescriptionHard)\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Lumin V SMG\n- Arrowhead Sniper Rifle\n- Aves Arms\n- Aves Core\n- Aves Legs\n- Aves Helmet\n- Aves Shrike Core\n- Aves Shrike Arms\n- Aves Shrike Legs\n- Aves Shrike Helmet\n- Lumin V SMG Battery (45 cap)\n- Arrowhead Sniper Rifle Battery (16 cap)\n
recovery_desc=~mission(Contractor|RecoverItemDescription)\n\n<EM4>Reputation Awarded:</EM4> 100\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, Nyx III, nyx</EM4>\n- Custodian SMG\n- Custodian "Midnight" SMG\n- Custodian "Scorched" SMG\n- Arden-SL Arms\n- Arden-SL Core\n- Arden-SL Legs\n- Arden-SL Helmet\n- Custodian SMG Magazine (60 cap)\n\n<EM4>[Regional Variants] example locations: Hurston, ArcCorp, microTech</EM4>\n- Lumin V SMG\n- Inquisitor Core Black\n- Inquisitor Arms Black\n- Inquisitor Legs Black\n- Morningstar Helmet Icefall\n- Inquisitor Core Grey\n- Inquisitor Arms Grey\n- Inquisitor Legs Grey\n- Lumin V SMG Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Nyx II, Nyx I, Nyx System</EM4>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- Monde Arms Delta Camo\n- Monde Legs Delta Camo\n- Monde Core Delta Camo\n- Monde Helmet Delta Camo\n- Monde Helmet Hemlock Camo\n- Monde Legs Hemlock Camo\n- Monde Core Hemlock Camo\n- Monde Arms Hemlock Camo\n- R97 Shotgun Magazine (18 cap)\n
DeadSaints_HaulCargo_AToB_intro_desc=Call me Twitch. I run the Dead Saints. \n\nI doubt this is the first time you've heard of us, but in case you haven't, we do a lot of things, but one of them is transporting goods that need discreet handling. \n\nI got your info from one of my contacts. They say you've got the stuff we like in a hauler, which works for me, because we're looking for one. \n\nHere's my proposal – we're offering creds to the pilot that can transport some special cargo for us. Your ship’s hold will need room for <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and you'll need a <EM4>handheld tractor beam</EM4> for loading and unloading. All you have to do is get everything from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4> without getting security involved. \n \nIf you can pull the job off, the Saints will have more contracts for you down the line. \n\n-Twitch\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
DeadSaints_HaulCargo_SingleToMulti_desc_Drugs_Danger_Timed=We've got a shipment of contraband that needs to be hauled to a couple of different places. If you like creds, head to <EM4>~mission(Location|Address)</EM4>, load everything up, and bring it to these drop points:  \n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nYou're gonna need a <EM4>handheld tractor beam</EM4> to move the boxes and enough room in your cargo hold for size <EM4>~mission(MissionMaxSCUSize)</EM4> containers. \n\nAvoid other ships if you can. Security will bust you if they figure out what you're hauling, and raiders will just take it for themselves. \n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_HaulCargo_MultiToSingle_desc_Drugs_Danger=One of our best distributors got busted in Stanton so we need a replacement. The guy was an incredible salesman, but a shit smuggler. We need someone who won't run face-first into a security patrol or a pack of pirates to pick up some merchandise at these locations:\n\nPICK UP LOCATIONS (ANY ORDER) \n\n~mission(MultiToSingleToken)\n\nAnd bring it all to <EM4>~mission(Destination|Address)</EM4> before security catches on to what's happening. You'll need enough space on your ship for size <EM4>~mission(MissionMaxSCUSize)</EM4> containers, and a <EM4>handheld tractor beam</EM4> should make loading and unloading nice and easy. \n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_HaulCargo_SingleToMulti_desc_Altruciatoxin_Danger_Timed=We're looking for someone discreet to move a new batch of altruciatoxin to a number of buyers . Yeah, it's illegal, but only if you get caught. \n\nThe shipment is at <EM4>~mission(Location|Address)</EM4>. You'll need to take it to these drop points:\n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nBe sure your ship can carry size <EM4>~mission(MissionMaxSCUSize)</EM4> containers, and don't forget to pack a <EM4>handheld tractor beam</EM4>. Not sure how you're planning on moving the boxes, otherwise.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_HaulCargo_AToB_desc_ToGrimHEX_Danger=If you're looking for creds, the Saints need someone with hauling experience to do a supply run from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. \n\nYou're gonna need a ship that can hold size <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>handheld tractor beam</EM4> to move the boxes around. \n\nDon't open the crates but just so you know, most of this stuff is legal but not all of it. Try not to cross paths with anyone who might make that a problem for you. Get me?\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_HaulCargo_SingleToMulti_desc_Stormwal_Danger_Timed=If you've got a fast ship, can discreetly carry size <EM4>~mission(MissionMaxSCUSize)</EM4> containers, and love getting a huge payout, we need you to head to <EM4>~mission(Location|Address)</EM4> immediately and take what you find there to these drop points:\n\nDROP OFF LOCATIONS (ANY ORDER) \n\n~mission(SingleToMultiToken)  \n\nThe buyers are paying a premium to get their hands on fresh stormwal meat. Stay sharp. If security catches you with this, it's your ass on the line. If you're smart, you'll use a <EM4>handheld tractor beam</EM4> to get everything loaded up quick. \n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_HaulCargo_AToB_desc_Cryopods_Danger=Got an interesting one. Some folks who were suckered into life/labor contracts with Hurston Dynamics want to get as far from Lorville as they possibly can. They struck a deal with a people mover and got themselves put on ice. Now they just need someone to pick them up and give them a ride. \n\nIf you're up for some popsicle smuggling, you'll find ~mission(total) cryopods at <EM4>~mission(Location|Address)</EM4> that need to go to <EM4>~mission(Destination|Address)</EM4>. Make sure you have space in your cargo hold for size <EM4>~mission(MissionMaxSCUSize)</EM4> containers. If you use a <EM4>handheld tractor beam</EM4>, you should be able to get everyone loaded up before Hurston security catches on. \n\nHD isn't too keen on anyone slipping out of their contracts, so watch your back. They shoot to kill. \n\nIf you can pull this off, there's a nice paycheck in it for you.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_RecoverCargo_VeryEasy_Description=One of my haulers has run into some trouble over at <EM4>~mission(Location|Address)</EM4> and was forced to ditch their ship. I need someone to go there with <EM4>a heavy-duty tractor beam</EM4> to grab the cargo and finish the job.\n\nThey were carrying a decent supply of gear for me, and the last thing I need is for some do-gooder to come across it and trace it back to us.\n\nIf you do run into anybody, no need to be friendly. Just shoot the asshole and get my gear. Understood?\n\nTake it to the freight elevator over at <EM4>~mission(Destination|Address)</EM4> and I’ll make sure you get a cut of the sale.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 50
DeadSaints_RecoverCargo_Easy_Description=You know when you ask someone a question and you have a feeling they’re lying, but you choose to give them the benefit of the doubt? Yeah. That’s what I’m dealing with right now.\n\nTwo “expert” haulers I hired to transport some gear for me ran into some trouble and ended up ditching my goods over at <EM4>~mission(Location|Address)</EM4>. Needless to say, I’ve ordered a hit on them, but what I need from you is to go recover that cargo. The tracker says the cargo’s still on the ship, so you’ll just need a <EM4>a heavy-duty tractor beam</EM4> and your own ship to recover it.\n\nYou might run into a couple of scavengers lurking around there, but I doubt you’ll have any trouble with them.\n\nWhen you’re done, take the stuff to <EM4>~mission(Destination|Address)</EM4> and I’ll sort you out with a reward.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 100
DeadSaints_RecoverCargo_Medium_Description=You got a ship and <EM4>a heavy-duty tractor beam</EM4>? Good. I’ve got work for you.\n\nDon’t know how they knew we were coming, but one of my haulers got jumped over at <EM4>~mission(Location|Address)</EM4>. The pilot’s gone silent so I assume they’ve been ghosted, but the cargo tracker is stationary for now.\n\nExpect the bastards who took out my pilot to still be around, so bring backup. Get the cargo and get out, don’t need to risk anymore good haulers on this mess.\n\nGet the goods to the freight elevator to <EM4>~mission(Destination|Address)</EM4> and I’ll send your payment.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 150
DeadSaints_RecoverCargo_Hard_Description=Some upstarts hit my hauling crew on their way to do a delivery. Our tracker is telling us that our ship’s still located at <EM4>~mission(Location|Address)</EM4> so I need you to head over there and get the cargo. You’ll need <EM4>a heavy-duty tractor beam</EM4> to lug the goods from the ship.\n\nI’d bet that whoever attacked us is still there waiting. Arm up, bring your crew, and if you can, give them one from me.\n\nOnce you’ve taken back our goods, drop it off at the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 200
DeadSaints_RecoverCargo_VeryHard_Description=We got a situation. Some gang that no one’s heard of are trying to make a name for themselves by targeting our transport ships. They think they can make a big show of how tough they are raiding our haulers and acting like they’re big shots. Amateurs.\n\nProblem is, they got lucky during their last attack. Our pilot barely made it out alive, but their ship is still sitting full of supplies over at <EM4>~mission(Location|Address)</EM4>.\n\nGrab a crew you can trust and your <EM4>heavy-duty tractor beam</EM4> and get your ass over there.\n\nAfter, drop the gear off at the freight elevator in <EM4>~mission(Destination|Address)</EM4>. You do this for me and I’ll give you a good cut of the sale.\n\n-Twitch\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
DeadSaints_RecoverCargo_Super_Description=A rival crew was able to get their hands on our delivery routes and now they have one of my cargo ships pinned down at <EM4>~mission(Location|Address)</EM4>.\n\nNow the ship’s sitting there being guarded by a full crew of these assholes. They must be waiting for someone to show up with a transport ship, but you’re going to get there first.\n\nHead there with a crew of your own and a <EM4>heavy-duty tractor beam</EM4> to take the goods away. Make sure they’re the best people you got. It’d be a mistake to underestimate these bastards.\n\nGhost them and bring my cargo back to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I’ll make sure you’re seriously comp’d for this.\n\n-Twitch\n\n<EM4>Reputation Awarded:</EM4> 300
spacecollect_cargo_title_E_01=~mission(Contractor|RecoverSpaceTitleEasy)\n\n<EM4>Reputation Awarded:</EM4> 100
Headhunters_DefendDestructibleEntites_VE_Desc_001=You don't need all the details, but Headhunters have an interest in what happens over at <EM4>~mission(Location|Address)</EM4> and I just got word they're being harassed by some aggressive upstarts. \n\nThe dumb sods are trying to cripple the place by taking out their <EM>~mission(Objects)</EM4>. I'm not having it.   \n\nGet there and provide some protection before everything gets destroyed. These chumps are lightweights so shouldn't be too much of a problem for you to handle. \n\nClear ‘em all out I’ll throw <EM4>~mission(ScripAmount) Council Scrip</EM4> to whoever accepted this gig as a bonus.\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 100
Headhunters_DefendDestructibleEntites_E_Desc_001=Some morons with some seriously inflated notion of their place in 'verse made the damn foolish choice of attacking the <EM>~mission(Objects)</EM4> at <EM4>~mission(Location|Address)</EM4>. We've got some things in play over there so we can’t let ‘em get away with it.\n\nIf you're interesting in helpin' out, get there and deal with these luggers before they can do too much damage. Don't figure you'll break too much of a sweat dealin' with them.\n\nAlso, I’ll sweeten the pot by giving the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> just to show my appreciation. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 100
Headhunters_DefendDestructibleEntites_M_Desc_001=Our friends at <EM4>~mission(Location|Address)</EM4> have been compromised. A new gang in the area  are threatening them by targeting their <EM4>~mission(Objects)</EM4>.  \n\nIf those get destroyed its going to be seriously bad for business, so I want you over there pronto on protection duty.  \n \nIf you need any extra motivation, I’m adding <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000
Headhunters_DefendDestructibleEntites_H_Desc_001=Got word from some allies of ours over at <EM4>~mission(Location|Address)</EM4> that they're coming under attack. A gang we've had run-ins with before are trying to take them over by first destroying their <EM4>~mission(Objects)</EM4>.\n\nThis crew are mungers through and through, but they mean business and can handle themselves in a fight. It will take a bit of doing to make sure they don't blow up everything. You might even think about <EM>bringing some help</EM> along.\n\nHandle this right and I’ll give the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 200
Headhunters_DefendDestructibleEntites_VH_Desc_001=A band of hired guns has been sent to mess with our interests over at <EM4>~mission(Location|Address)</EM4>. Seems someone has been tipped off that if the <EM>~mission(Objects)</EM4> there are destroyed that it will severely interrupt Headhunter operations in the area. That's a problem I want you to fix.\n\nNot gonna lie, theses mercs are no joke. It'd be foolish to go it alone. That’s why you’ll need to be fully supplied and find <EM>some trustworthy friends</EM> to fly at your wing.\n\nThis op needs to go off without a hitch, so I’m offering the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> for a job well done. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 250
Headhunters_DefendDestructibleEntites_S_Desc_001=Our partners at <EM4>~mission(Location|Address)</EM4> need help. A rival outlaw crew are swarming the area and attacking the <EM4>~mission(Objects)</EM4> there. That’d be bad enough as is, but this site is absolutely critical to our future plans in the area and its damn important that it remains in working order.\n\nWith the scale of this attack and the skill of these pilots, there's no doubt that some <EM>reliable backup</EM> would serve you well. Gather your crew, fly out to the site, and stop these bootlicks before they can do any lasting damage. \n\nTo prove just how serious we are about getting this done right, the main contractor will earn <EM4>~mission(ScripAmount) Council Scrip</EM4> for making sure absolutely nothing goes wrong.\n\n- Stow\n\n<EM4>Reputation Awarded:</EM4> 300
HeadHunters_DefendEntitesAndEscort_VE_Desc=I won't bore you with the nitty gritty, but trust me when I say that <EM4>~mission(Location|Address)</EM4> is important to the Headhunters. So imagine how pissed I am to learn that they're being harassed by some aggressive upstarts who are hellbent on taking out their <EM>~mission(Objects)</EM4>. It won't stand.   \n\nGet there and provide some protection before everything gets destroyed, including <EM4>any friendly ships</EM4> in the area. Nullbrains like these hopefully won't pose too much of a challenge to a rising star like yourself.\n\nClear ‘em all out I’ll throw <EM4>~mission(ScripAmount) Council Scrip</EM4> to whoever accepted this gig.\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 100\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: nyx, Nyx System, Nyx I</EM4>\n- Cryo-Star SL (Cooler)\n- Winter-Star SL (Cooler)\n- Kelvid (Cooler)\n- Cryo-Star (Cooler)\n- Winter-Star (Cooler)\n- BlastChill (Cooler)\n- FlashFreeze (Cooler)\n- Endo (Cooler)\n- Cryo-Star EX (Cooler)\n- Winter-Star EX (Cooler)\n- FullFrost (Cooler)\n- WhiteOut (Cooler)\n- Taiga (Cooler)\n- Cryo-Star XL (Cooler)\n- Winter-Star XL (Cooler)\n- ColdSurge (Cooler)\n- FrostBite (Cooler)\n\n<EM4>[Regional Variants] example locations: RAB-BRAVO, RAB-NOVEMBER, RAB-KILO</EM4>\n- DuraJet (Powerplant)\n- ZapJet (Powerplant)\n- WhiteRose (Powerplant)\n- SparkJet (Powerplant)\n- Lotus (Powerplant)\n- SparkJet Pro (Powerplant)\n- TigerLilly (Powerplant)\n\n<EM4>[Regional Variants] example locations: Ita, Hurston, Arial</EM4>\n- PIN (Shield)\n- 5SA 'Rhada' (Shield)\n- 6SA (Shield)\n- HEX (Shield)\n- WEB (Shield)\n- 5MA 'Chimalli' (Shield)\n- 6MA 'Kozane' (Shield)\n- BLOC (Shield)\n- STOP (Shield)\n- 5CA 'Akura' (Shield)\n- 6CA 'Bila' (Shield)\n- ARMOR (Shield)\n- GUARD (Shield)\n
HeadHunters_DefendEntitesAndEscort_E_Desc=I was having a shite day, and it just got worse. Our interests over at <EM4>~mission(Location|Address)</EM4> comm'd to let me know that their  <EM>~mission(Objects)</EM4> are under attack by these no-name hoods looking to stake a claim.\n\nYou're gonna go there for me and protect the place, including any <EM4>friendly ships</EM4> unfortunate enough to be caught in the crossfire. Don't think putting these wannabees in their place will be too tricky for someone like you. \n\nAlso, I’ll sweeten the pot by giving the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> just to show my appreciation. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 100\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx III, Nyx II, Nyx System</EM4>\n- Cryo-Star SL (Cooler)\n- Winter-Star SL (Cooler)\n- Kelvid (Cooler)\n- Cryo-Star (Cooler)\n- Winter-Star (Cooler)\n- BlastChill (Cooler)\n- FlashFreeze (Cooler)\n- Endo (Cooler)\n- Cryo-Star EX (Cooler)\n- Winter-Star EX (Cooler)\n- FullFrost (Cooler)\n- WhiteOut (Cooler)\n- Taiga (Cooler)\n- Cryo-Star XL (Cooler)\n- Winter-Star XL (Cooler)\n- ColdSurge (Cooler)\n- FrostBite (Cooler)\n\n<EM4>[Regional Variants] example locations: RAB-IGNITION, Checkmate, Pyro I</EM4>\n- DuraJet (Powerplant)\n- ZapJet (Powerplant)\n- WhiteRose (Powerplant)\n- SparkJet (Powerplant)\n- Lotus (Powerplant)\n- SparkJet Pro (Powerplant)\n- TigerLilly (Powerplant)\n\n<EM4>[Regional Variants] example locations: Ita, Arial, Hurston</EM4>\n- PIN (Shield)\n- 5SA 'Rhada' (Shield)\n- 6SA (Shield)\n- HEX (Shield)\n- WEB (Shield)\n- 5MA 'Chimalli' (Shield)\n- 6MA 'Kozane' (Shield)\n- BLOC (Shield)\n- STOP (Shield)\n- 5CA 'Akura' (Shield)\n- 6CA 'Bila' (Shield)\n- ARMOR (Shield)\n- GUARD (Shield)\n
HeadHunters_DefendEntitesAndEscort_M_Desc=A new gang who is proving to be a real pain in the ass for the Headhunters just upped the stakes by attacking the <EM4>~mission(Objects)</EM4> at <EM4>~mission(Location|Address)</EM4>. Never a good thing since we got interest in the welfare of the folks there, but doubly so because if they do too much damage it might royally screw an upcoming operation.\n\nHead over there as soon as you're able and stop the attack before they can do any lasting damage. And if any <EM4>friendly ships</EM4> need a hand, I want you to look out for them too. Don't expect this gang to be pushovers but you should still be able to deal with them if you keep your head on.\n \nIf you need any extra motivation, I’m adding <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx, Nyx III, Nyx System</EM4>\n- Cryo-Star SL (Cooler)\n- Winter-Star SL (Cooler)\n- Kelvid (Cooler)\n- Cryo-Star (Cooler)\n- Winter-Star (Cooler)\n- BlastChill (Cooler)\n- FlashFreeze (Cooler)\n- Endo (Cooler)\n- Cryo-Star EX (Cooler)\n- Winter-Star EX (Cooler)\n- FullFrost (Cooler)\n- WhiteOut (Cooler)\n- Taiga (Cooler)\n- Cryo-Star XL (Cooler)\n- Winter-Star XL (Cooler)\n- ColdSurge (Cooler)\n- FrostBite (Cooler)\n\n<EM4>[Regional Variants] example locations: Monox, Checkmate Clinic, RAB-IGNITION</EM4>\n- DuraJet (Powerplant)\n- ZapJet (Powerplant)\n- WhiteRose (Powerplant)\n- SparkJet (Powerplant)\n- Lotus (Powerplant)\n- SparkJet Pro (Powerplant)\n- TigerLilly (Powerplant)\n\n<EM4>[Regional Variants] example locations: Aberdeen, Hurston, Arial</EM4>\n- PIN (Shield)\n- 5SA 'Rhada' (Shield)\n- 6SA (Shield)\n- HEX (Shield)\n- WEB (Shield)\n- 5MA 'Chimalli' (Shield)\n- 6MA 'Kozane' (Shield)\n- BLOC (Shield)\n- STOP (Shield)\n- 5CA 'Akura' (Shield)\n- 6CA 'Bila' (Shield)\n- ARMOR (Shield)\n- GUARD (Shield)\n
HeadHunters_DefendEntitesAndEscort_H_Desc=There's this small gang that continues to be a thorn in our side, and the bastards have just ambushed some friends over at <EM4>~mission(Location|Address)</EM4>. Seems like they're doing their best to destroy the <EM4>~mission(Objects)</EM4> there.\n\nI need you and whatever <EM4>crew you can muster</EM4> on site stopping these mungers from blowing everything up and protecting any <EM4>friendly ships</EM4> that need a hand.\n\nHandle this right and I’ll give the main contractor  <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 200\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx, Nyx System, Nyx II</EM4>\n- Cryo-Star SL (Cooler)\n- Winter-Star SL (Cooler)\n- Kelvid (Cooler)\n- Cryo-Star (Cooler)\n- Winter-Star (Cooler)\n- BlastChill (Cooler)\n- FlashFreeze (Cooler)\n- Endo (Cooler)\n- Cryo-Star EX (Cooler)\n- Winter-Star EX (Cooler)\n- FullFrost (Cooler)\n- WhiteOut (Cooler)\n- Taiga (Cooler)\n- Cryo-Star XL (Cooler)\n- Winter-Star XL (Cooler)\n- ColdSurge (Cooler)\n- FrostBite (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx System, Nyx II, nyx</EM4>\n- Tarantula GT-870 Mark 1 Cannon\n- Tarantula GT-870 Mark 2 Cannon\n- Tarantula GT-870 Mark 3 Cannon\n- YellowJacket GT-210 Gatling\n- Scorpion GT-215 Gatling\n- Mantis GT-220 Gatling\n- V880 (Radar)\n\n<EM4>[Regional Variants] example locations: Pyro I, Cluster NBD-102, RAB-BRAVO</EM4>\n- DuraJet (Powerplant)\n- ZapJet (Powerplant)\n- WhiteRose (Powerplant)\n- SparkJet (Powerplant)\n- Lotus (Powerplant)\n- SparkJet Pro (Powerplant)\n- TigerLilly (Powerplant)\n\n<EM4>[Regional Variants] example locations: RAB-TUNG, Patch City, Pyro I</EM4>\n- AD4B Ballistic Gatling\n- AD5B Ballistic Gatling\n- AD6B Ballistic Gatling\n- V801-11 (Radar)\n- V801-12 (Radar)\n\n<EM4>[Regional Variants] example locations: Magda, Arial, Hurston</EM4>\n- PIN (Shield)\n- 5SA 'Rhada' (Shield)\n- 6SA (Shield)\n- HEX (Shield)\n- WEB (Shield)\n- 5MA 'Chimalli' (Shield)\n- 6MA 'Kozane' (Shield)\n- BLOC (Shield)\n- STOP (Shield)\n- 5CA 'Akura' (Shield)\n- 6CA 'Bila' (Shield)\n- ARMOR (Shield)\n- GUARD (Shield)\n\n<EM4>[Regional Variants] example locations: Arial, Aberdeen, Hurston</EM4>\n- SW16BR1 “Buzzsaw” Repeater\n- SW16BR2 “Sawbuck” Repeater\n- SW16BR3 “Shredder” Repeater\n- Vigilance (Radar)\n- Devoue (Radar)\n- Tige (Radar)\n
HeadHunters_DefendEntitesAndEscort_VH_Desc=So, I thought we had done a good job of keeping things on the quiet side, but looks like the fact <EM4>~mission(Location|Address)</EM4> has Headhunters ties has gotten out. Now there are some heavy operators causing major problems there, targeting the <EM>~mission(Objects)</EM4> and generally causing me a massive headache.\n\nWith the amount of firepower these interlopers are packing, you're gonna need to bring along a <EM4>crew of your own</EM4> to pull this off. Especially since I need you to be protecting any <EM4>friendly ships</EM4> that need help.\n\nThis op needs to go off without a hitch, so I’m offering the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> for a job well done. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 250\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, nyx, Nyx I</EM4>\n- Cryo-Star SL (Cooler)\n- Winter-Star SL (Cooler)\n- Kelvid (Cooler)\n- Cryo-Star (Cooler)\n- Winter-Star (Cooler)\n- BlastChill (Cooler)\n- FlashFreeze (Cooler)\n- Endo (Cooler)\n- Cryo-Star EX (Cooler)\n- Winter-Star EX (Cooler)\n- FullFrost (Cooler)\n- WhiteOut (Cooler)\n- Taiga (Cooler)\n- Cryo-Star XL (Cooler)\n- Winter-Star XL (Cooler)\n- ColdSurge (Cooler)\n- FrostBite (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx, Nyx System, nyx</EM4>\n- Tarantula GT-870 Mark 1 Cannon\n- Tarantula GT-870 Mark 2 Cannon\n- Tarantula GT-870 Mark 3 Cannon\n- YellowJacket GT-210 Gatling\n- Scorpion GT-215 Gatling\n- Mantis GT-220 Gatling\n- V880 (Radar)\n\n<EM4>[Regional Variants] example locations: RAB-TUNG, RAB-KILO, RAB-NOVEMBER</EM4>\n- DuraJet (Powerplant)\n- ZapJet (Powerplant)\n- WhiteRose (Powerplant)\n- SparkJet (Powerplant)\n- Lotus (Powerplant)\n- SparkJet Pro (Powerplant)\n- TigerLilly (Powerplant)\n\n<EM4>[Regional Variants] example locations: RAB-KILO, RAB-FOXTROT, Patch City Clinic</EM4>\n- AD4B Ballistic Gatling\n- AD5B Ballistic Gatling\n- AD6B Ballistic Gatling\n- V801-11 (Radar)\n- V801-12 (Radar)\n\n<EM4>[Regional Variants] example locations: Hurston, Aberdeen, Ita</EM4>\n- PIN (Shield)\n- 5SA 'Rhada' (Shield)\n- 6SA (Shield)\n- HEX (Shield)\n- WEB (Shield)\n- 5MA 'Chimalli' (Shield)\n- 6MA 'Kozane' (Shield)\n- BLOC (Shield)\n- STOP (Shield)\n- 5CA 'Akura' (Shield)\n- 6CA 'Bila' (Shield)\n- ARMOR (Shield)\n- GUARD (Shield)\n\n<EM4>[Regional Variants] example locations: Ita, Hurston, Magda</EM4>\n- SW16BR1 “Buzzsaw” Repeater\n- SW16BR2 “Sawbuck” Repeater\n- SW16BR3 “Shredder” Repeater\n- Vigilance (Radar)\n- Devoue (Radar)\n- Tige (Radar)\n
HeadHunters_DefendEntitesAndEscort_S_Desc=The maintenance and reliable function of <EM4>~mission(Location|Address)</EM4> is pretty darn important to the Headhunters, but this rival crew seems determined knock it out of contention. They're on site now, targeting <EM4>~mission(Objects)</EM4> there. \n\nProtecting the site, and any <EM4>friendly ships</EM4>, in the area is important enough that I want you to bring some <EM4>reliable backup along</EM4> when you go and terminate these nullbrains. \n\nTo prove just how serious we are about getting this done right, the main contractor will earn <EM4>~mission(ScripAmount) Council Scrip</EM4> for making sure absolutely nothing goes wrong.\n\n- Stow\n\n<EM4>Reputation Awarded:</EM4> 300\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, Nyx, nyx</EM4>\n- Cryo-Star SL (Cooler)\n- Winter-Star SL (Cooler)\n- Kelvid (Cooler)\n- Cryo-Star (Cooler)\n- Winter-Star (Cooler)\n- BlastChill (Cooler)\n- FlashFreeze (Cooler)\n- Endo (Cooler)\n- Cryo-Star EX (Cooler)\n- Winter-Star EX (Cooler)\n- FullFrost (Cooler)\n- WhiteOut (Cooler)\n- Taiga (Cooler)\n- Cryo-Star XL (Cooler)\n- Winter-Star XL (Cooler)\n- ColdSurge (Cooler)\n- FrostBite (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx II, Nyx System, Nyx</EM4>\n- Tarantula GT-870 Mark 1 Cannon\n- Tarantula GT-870 Mark 2 Cannon\n- Tarantula GT-870 Mark 3 Cannon\n- YellowJacket GT-210 Gatling\n- Scorpion GT-215 Gatling\n- Mantis GT-220 Gatling\n- V880 (Radar)\n\n<EM4>[Regional Variants] example locations: Patch City Clinic, RAB-NOVEMBER, RAB-ROTH</EM4>\n- DuraJet (Powerplant)\n- ZapJet (Powerplant)\n- WhiteRose (Powerplant)\n- SparkJet (Powerplant)\n- Lotus (Powerplant)\n- SparkJet Pro (Powerplant)\n- TigerLilly (Powerplant)\n\n<EM4>[Regional Variants] example locations: RAB-IGNITION, Patch City, RAB-BRAVO</EM4>\n- AD4B Ballistic Gatling\n- AD5B Ballistic Gatling\n- AD6B Ballistic Gatling\n- V801-11 (Radar)\n- V801-12 (Radar)\n\n<EM4>[Regional Variants] example locations: Magda, Ita, Hurston</EM4>\n- PIN (Shield)\n- 5SA 'Rhada' (Shield)\n- 6SA (Shield)\n- HEX (Shield)\n- WEB (Shield)\n- 5MA 'Chimalli' (Shield)\n- 6MA 'Kozane' (Shield)\n- BLOC (Shield)\n- STOP (Shield)\n- 5CA 'Akura' (Shield)\n- 6CA 'Bila' (Shield)\n- ARMOR (Shield)\n- GUARD (Shield)\n\n<EM4>[Regional Variants] example locations: Ita, Arial, Magda</EM4>\n- SW16BR1 “Buzzsaw” Repeater\n- SW16BR2 “Sawbuck” Repeater\n- SW16BR3 “Shredder” Repeater\n- Vigilance (Radar)\n- Devoue (Radar)\n- Tige (Radar)\n
headhunters_defendship_VLRT_PA_desc_001=Guess some folks just can’t dogfight. Sent a young prospect out on patrol, and am now being barraged with comms about how they’re barely hanging on. Had them update me with the details about who they’re up against and I damn near fell outta my chair laughing.    \n\nIf this kid can’t handle a People’s Alliance ship, they sure ain’t ready for flight assignments. Appreciate it if you could save their hide anyway.\n\nIf you’re free, could you head over to <EM4>~mission(Location|Address)</EM4> and show ‘em how it’s done?\n\n-Stows\n\n\n<EM4>Reputation Awarded:</EM4> 100
headhunters_defendship_LRT_PA_desc_001=You busy? A promising prospect was doing a special run for me but ran into trouble with the People’s Alliance around <EM4>~mission(Location|Address)</EM4>. This one’s on me. Knew they weren’t the best dogfighter but thought they could do this without running into any other ships. \n\nTold ‘em to hold tight and do everything they can to stay alive until support gets there. Shouldn’t be too much trouble for someone with your skillset.  \n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 100
headhunters_defendship_MRT_PA_desc_001=Some People’s Alliance members with a death wish decided to target one of our ships. Need someone to hustle over to <EM4>~mission(Location|Address)</EM4> and show ‘em what happens when you mess with the Headhunters.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 150
headhunters_defendship_multi_HRT_PA_desc_001=Sent ships to investigate a distress beacon only for it to turn into an ambush by the People’s Alliance. They’ve been fighting like hell to get away but can’t seem to extract themselves.\n\nLet’s get ‘em some help on the double. Think you can go on over to <EM4>~mission(Location|Address)</EM4> to give ‘em some support?\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 200
headhunters_defendship_multi_VHRT_PA_desc_001=One of our Clips is in a tight spot. Just got a comm from ‘em saying their convoy is being swarmed by the People’s Alliance and they need help on the double. Well, they said it in a more colorful way than that. All I’ll say is that I don’t want to hear what they’ll say to me if they don’t survive and are forced to regen. \n\nSituation must be serious if this Clip is freaking out. Really need you to get to <EM4>~mission(Location|Address)</EM4> immediately, and ensure that they make it out alive.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 250
headhunters_defendship_multi_SRT_PA_desc_001=Got ourselves in a real mess here. A Headhunters ship on an important mission got attacked near <EM4>~mission(Location|Address)</EM4>. Can’t get too into the specifics but it’s absolutely vital that they survive. The People’s Alliance know this too because they’re throwing everything they can at ‘em.\n\nNot gonna pull any punches. This is a serious-ass situation that many wouldn’t survive. If you do, I’ll sing your praises and make sure you’re paid well.   \n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 300
headhunters_defendship_LRT_desc_001=Just got word that a Headhunter over near ~mission(Location|Address) got roped into a fight and now they can't see it through. The idiot wants me to save their sorry ass.\n\nGuess I'm a soft touch, because I'm actually going to pay you to do it for me. What do you say? Wanna save a moron's life?\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 150
headhunters_defendship_VLRT_desc_001=Seems we got some upstarts trying to muscle in our operations by hitting a Headhunter ship near ~mission(Location|Address). Not sure how they expected to get away with it.\n\nThey need to learn the hard way that's not how things work in Pyro. You up for heading over there and teaching these bastards a lesson?\n\n- Stows out\n\n<EM4>Reputation Awarded:</EM4> 100
headhunters_defendship_MRT_desc_001=One of my pilots wasn't thinking straight and got themselves mixed up in a heap of trouble over at ~mission(Location|Address). \n\nThe real kicker is the fool has a full hold. Can't really afford to lose the stuff they're carrying, so I'd appreciate it if you could go bail them out for me. \n\n- Stows out\n\n<EM4>Reputation Awarded:</EM4> 200
headhunters_bombingrun_VE_desc_001=Headhunters didn't get to be what it is today by playing nice. We've tracked down the hideout of a bunch of scraggy upstarts that have been making inroads into our territory. Need you to send a message.\n\nHead to <EM4>~mission(Location|Address)</EM4> and blow the crap out of their fuel tanks. They'll think twice about muscling in on our operations when their ships are grounded.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 100
headhunters_bombingrun_E_desc_001=Some competition has taken root at ~mission(Location|Address) and they've really been gumming up the works for our operations in the area.\n\nNow part of me sees some potential in the upstarts so I'm hoping to bring them into fold, but at the same time, I can't really afford to have them flying around causing trouble.\n\nInstead, I want you to go and blow up their fuel tanks. That should keep them grounded long enough for me to talk some sense into their thick heads.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 100
headhunters_bombingrun_M_title_001=Stopping the Competition\n\n<EM4>Reputation Awarded:</EM4> 150
headhunters_bombingrun_H_desc_001=Look, Headhunters don't waste time on petty revenge, but I'm not about to let this nonsense fly either.\n\nSome asshole took out a bunch of my crew and has been bragging all over about it. I've also heard that this nullbrain is stockpiling quantum fuel over at <EM4>~mission(Location|Address)</EM4>. I'd like to see how they deal with some real heat when you fly over there and burn everything they've built to the ground. Oh, and with the amount of firepower they got gathered over there, wouldn't be smart to fly alone on this one, so take a crew with you.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 200
headhunters_bombingrun_VH_desc_001=Got a plan to take care of a rat I've been dealing with and need a hand.\n\nHad a client default on some debts and now they've decided they ain't going to pay up. Got a tip that they're hiding out over at <EM4>~mission(Location|Address)</EM4>. If you can take out their fuel tanks they'll have no choice but to reconsider their crap decisions.\n\nJust be sure you don't underestimate this slimebag. They might be dumb but they're not stupid, if you get me. I've heard this place is swarming with ships and turrets, you'd have to be a total nullbrain not to bring backup.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 250
headhunters_bombingrun_S_desc_001=We've heard news that a new gang are planning an attack on a place over at <EM4>~mission(Location|Address)</EM4>. They figure if they can take out the fuel supplies there then it's theirs for the taking.\n\nBut little do they know that we're gonna send you in first to blow the fuel tanks so we can claim the place before they do. If it all goes to plan, we can clear the location out and stick it to that gang at the same time. Two birds, one stone.\n\nOnly problem is this place is armed to the teeth. Bring a crew and get those fuel tanks out of action. We'll take care of the rest.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 300
headhunters_bombingrun_E_CFP_desc_001=It seems like I can't go a day without waking up to one of my people bitchin' and moanin' about how hard Citizens for Prosperity is making their life. \n\nEventually we're going wipe those do-gooders out of the system, but for now I'll settle for some peace and quiet. \n\nGo to ~mission(Location|Address) and destroy the fuel stores CFP have got there. That should at least keep them out of our business for a bit.\n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100 / 200
headhunters_sabotage_servers_M_CFP_desc_001=Turns out those Citizens for Prosperity bastards have been gathering intel on us. They're going to try to cut us off from several revenue streams and bleed us dry. Can't let that happen. \n\nHead to ~mission(Location|Address) and destroy their data storage. \n\nThat should teach them not to stick their noses where they don't belong.\n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75 / 200
headhunters_bombingrun_M_CFP_desc_001=I'm getting pretty bloody sick of Citizens for Prosperity sticking their noses where they don't belong. \n\nStarted thinking that it might be pretty nice to ground their fleet for a little bit. We blow up their fuel tanks at ~mission(Location|Address) and those little pissheads won't be going nowhere quick.\n\nSound like your kinda thing?\n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100 / 200
headhunters_bombingrun_sabotage_servers_VH_desc_001=When will people learn that they can't just do whatever they feel like on Headhunter turf? These idiots are planning a big job and thought that I'd just let them get away with it? No way in hell.\n\nI want you to fly to ~mission(Location|Address) and destroy their fuel tanks and data servers. Show them what the Headhunters really think of them.\n\nLet's see them try to pull off anything after that.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 3,200
headhunters_sabotage_generators_E_CFP_desc_001=We got big plans about to go down but unfortunately Citizens for Prosperity have people nearby at  ~mission(Location|Address).\n\nSince I can't afford to have those bastards cockin' things up for us, I want you to go there and take out their power generators.\n\nShould keep them sidelined until we're done with our business. \n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75
headhunters_sabotage_servers_H_XT_desc_001=Something just fell into my lap that is way too good to pass up. XenoThreat's intelligence gathering is a bit of legend in the circles I run in and it turns out that they're storing a whole heap of their best intel at ~mission(Location|Address).\n\nWould be a shame if someone, say like you, were to go there and blow it all up, huh? \n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75 / 1,500
headhunters_bombingrun_H_XT_desc_001=It seems that XenoThreat has gotten the same intel we did and are looking to pull off the same job as us. \n\nI want you to knock the competition out of the picture. Go to ~mission(Location|Address) and take out the fuel tanks they got there.\n\nThen my people can finish up without worrying about XenoThreat crashing the party.\n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
headhunters_sabotage_servers_E_CFP_desc_001=Long story, short - a Headhunter messed up real bad and now Citizens for Prosperity has gotten their hands on some data that could really do some damage to us. \n\nThe bastard is going to need some time to heal so that leaves it to you to clean up the mess. Can you go to ~mission(Location|Address) and destroy the servers they got stored there? I wanna make sure there's no chance of this info getting out there.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 75
headhunters_sabotage_servers_VH_XT_desc_001=I'm so mad right now I can barely see straight. A Headhunter who I thought I could trust just went over to the XenoThreat. Yeah, aliens killed your family. Shit sucks, but you don't turn your back on your people. \n\nTo add insult to injury, the bastard gave XenoThreat a bunch of our intel. I have some other folks tracking the traitor down, but I need you to take care of wiping out the stolen data for me. It's being kept on servers at ~mission(Location|Address).\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 3,200
headhunters_bombingrun_VH_XT_desc_001=I won't get into the long and complicated politics of why I'm asking you to do this, but it's enough for you to know that I want it done. \n\nGo to ~mission(Location|Address) and blow up the XenoThreat fuel reserves there. It'll really be helping me out of a tight spot.\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 3,200
headhunters_sabotage_generators_VE_desc_001=This is a fairly straightforward job. We got some assholes at ~mission(Location|Address) who have been thinking they're better than they are. Go and shut off their power to remind them that Headhunters are in charge.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 25
headhunters_bombingrun_killship_M_desc_001=Everyone has been talking about a new player named ~mission(TargetName) who is operating out of ~mission(Location|Address). They've become a real concern for the Headhunters. \n\nIt's time to shut them down. \n\nHead over, take out ~mission(TargetName|Last) and then clear out any fuel stores they have there to convince anyone remaining to leave. \n\nFigure after you pull this off, nobody will even remember their name.\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 200
Headhunters_DefendLocation_VE_Desc_001=Headhunters flying in and out of <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are being harassed by some aggressive upstarts. Need them dealt with before they become a real pain in the ass.   \n\nGet there and I’ll update you on what these pests are doing so you can hunt ‘em down. \n\nClear ‘em all out I’ll throw <EM4>~mission(ScripAmount) Council Scrip</EM4> to whoever accepted this gig as a bonus.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500
Headhunters_DefendLocation_E_Desc_001=Some idiots with a deathwish are attacking our ships around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Can’t let ‘em do that without paying the price. Want to do the honors?\n\nIf so, head out and get after ‘em. The crew there is tracking the attacker’s movements and I’ll pass along situational updates as they come in. \n\nAlso, I’ll sweeten the pot by giving the main contractor a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> just to show my appreciation. \n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
Headhunters_DefendLocation_M_Desc_001=Our airspace around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> has been compromised. Enemy ships are threatening the base and any of our ships in the area. Gotta put a stop to this immediately, so get your shit in order and get over there. Just get going and I’ll update you with any relevant info on where you’re needed. \n \nIf you need any extra motivation, I’m adding a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000
Headhunters_DefendLocation_H_Desc_001=Got word that Headhunters ships heading to <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are coming under attack. Scans have revealed enemy forces in the wider region intent on targeting our ops. \n\nThere’s enough of them that it’s gonna take more than one person to clear away all that trash. If you can grab your gear and a few friends, I could really use you out there.  \n\nThe specific attack areas and targets are evolving. Don’t worry about the details now. Just get there and I’ll let you know where you’re needed.  \n\nHandle this right and I’ll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 200 / 2,000
Headhunters_DefendLocation_VH_Desc_001=Looking for someone who can not only dogfight but recruit others to the Headhunters cause. Our operations center at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>, along with any ships going to and from it, are being targeted by hostile forces. We need support there pronto. \n\nNot gonna lie, but there’s lots of heat around there. That’s why you’ll need to be fully supplied and find some trustworthy friends to fly at your wing. When you get your crew together, head out there and I’ll update you if there’s any flare ups in the area that need your attention.\n\nThis op needs to go off without a hitch, so I’m offering the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> for a job well done. \n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 250 / 8,000
Headhunters_DefendLocation_S_Desc_001=Our crew at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> needs help. Enemy ships are swarming the area and attacking anything and everything they can find. That’d be bad enough as is, but this site has some absolutely crucial gear and personnel that we can’t have destroyed or compromised. \n\nConsidering the size and scale of the attack, you’re gonna need a fully supplied ship and some reliable wingmen. Gather your crew, fly out to the site, and I’ll send you specifics on where you’re needed most.\n\nTo prove just how serious we are about getting this done right, the main contractor will earn a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> for making sure absolutely nothing goes wrong.\n\n- Stow\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 300 / 16,000
headhunters_HaulCargo_RegionLink_desc_001=You been doing good work for us, so I got a favor to ask. I'll still pay you, but it's a favor. Got some cargo that needs to get bounced from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4> and the guy that was supposed to do it found himself on the wrong side of an airlock, but hey, shit still needs to get done.\n\nOnly thing is you'll need a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.  A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nIf you could sort it out for me, that'd be great.\n\n- Stows out\n\n<EM4>Reputation Awarded:</EM4> 200
Headhunters_HaulCargo_MultiToSingle_desc_01=We’ve been using the old Hathor <EM4>~mission(Location1|Address)</EM4> and <EM4>~mission(Location2|Address)</EM4> as stashes, but it turns out some over-eager nullbrains sniffed them out and are trying to boost our shit for their own.\n\nLuckily, the goods are still there - for now. We need someone to visit that PAF and OLP, grab our stuff from the freight elevators, and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> where we should be able to keep it on ice. \n\nHere’s the list of what to grab. Don’t care what order you do ‘em in. Be sure to bring a ship that can store <EM4>~mission(MissionMaxSCUSize)</EM4> at the very least. \n\n~mission(MultiToSingleToken)\n\nMake sure you’re ready to deal with whatever assholes you run across. A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 1,000
Headhunters_HaulCargo_AToB_PAF_Illegal_desc_01=I won’t bore you with the details, all you need to know is: one of our haulers got attacked and now our goods are sitting in a freight elevator at <EM4>~mission(Location|Address)</EM4>. \n\nUp to you how you get the goods out, but if you happen to ghost a few of our rivals in the process, I ain’t complaining. Once you’ve got the stuff take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>, then we can sort your payment. \n\nA <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 1,000
Headhunters_HaulCargo_AToB_OLP_Illegal_desc_01=Need someone to snag some cargo for us. We were using an old Hathor PAF for dead drops, but a local gang has dug in and we can’t get our shit.\n\nIf you feel like kicking some ass, grab the cargo from the freight elevator at <EM4>~mission(Location|Address)</EM4> and deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nFrom what I’ve heard this place is full of all sorts. Won’t be easy getting out stuff back, but that’s what we’re paying you for.\n\nJust make sure you got a ship that can handle a <EM4>~mission(MissionMaxSCUSize)</EM4> load, and try not to get shot in the process. A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 1,000
Headhunters_Salvage_FPS_desc_001=Need a hand taking care of some scrap at ~mission(Location|Address). The team there put it all in one place but can’t be bothered to salvage it. Just clear it out for them to get some RMC and make some easy creds. \n\n- Stows  \n\n\n<EM4>Reputation Awarded:</EM4> 25
Headhunters_SabotageRelays_CFP_001_Desc=CFP think they’re safe over at <EM4>~mission(Location|Address)</EM4> but we got big plans for them. You’re gonna pave the way for us by heading there and shutting down their comm towers.\n\nThere should be a <EM4>control terminal at the top</EM4> that you can use to shut the tower down. You get that sorted and they won’t be able to call for backup. Then we can show those skags who this system belongs to.\n\nMost outposts use the same system, so this’ll come in handy next time you want to make sure reinforcements don’t mess with you.\n\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75
Headhunters_SabotageRelays_XT_001_Desc=We’re making a play to hit some XenoThreat assholes where it hurts but need to be smart about it. That’s why we’re sending you in first to take out their comm towers so they can’t call for backup. You do that and we can be in and out before they know it.\n\nHead to <EM4>~mission(Location|Address)</EM4> and climb the comm towers there. Should be a <EM4>control panel at the top</EM4> you can use to switch them off.\n\nIn fact, same goes for most other outposts. Rather than having to deal with reinforcements, you can just turn off the comm towers. But hey, if you wanna ring the bell to ghost a few more Xenothreat I ain’t complaining.\n\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 75 / 100
headhunters_maintenance_local_E_desc_001=Hey if you’re reading this, we need a hand. An outpost of ours down at <EM4>~mission(Location|Address)</EM4> got hit by a nasty storm and suffered some damage. None of our usual techs are available (or alive) to swing by so we wanna hire someone to go fix some fuses (no idea how many but <EM4>no more than three</EM4> I think). If you can bring a <EM4>salvaging tool</EM4> with <EM4>enough RMC canisters to sort out around three pipes</EM4>, we should be good.\n\nHopefully you know what you're doing, but just in case, the <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50
headhunters_maintenance_M_desc_001=Need somebody handy with tools to pop over to <EM4>~mission(Location|Address)</EM4> and help out with some repairs. Our last repair guy knocked out most of the fixes but there's still some stuff that could use looking at.\n\nI think if you've got <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to patch up around five pipes</EM4>, you should be covered.\n\nHopefully you know what you're doing, but just in case, the <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
headhunters_maintenance_H_desc_001=The storms over at <EM4>~mission(Location|Address)</EM4> are getting to be a real pain in the ass. One of our outposts got absolutely reamed yesterday and needs some serious repairs so we're looking for help.\n\nFigure you'd need to bring <EM4>about six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to deal with at most eight busted pipes</EM4>. We think that’ll cover, but you'll get exact numbers on site.\n\nHell with this place.\n\nHopefully you know what you're doing, but just in case, that <EM4>“Guide to Maintenance”</EM4> in your mobiGlas Journal might be worth a look.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 400
headhunters_searchbody_nodanger_station_desc_001=So, I sent one of our people, a new recruit by the name ~mission(TargetName), to do a hand-off over at ~mission(Location|Address), but now the bastard’s gone missing.\n\nI’m thinking they either ran off with Headhunter credits and they’re good as dead, or they were robbed and now they’re lying there actually good as dead. Either way, I’d like for you to go have a look and see if you can find them.\n\nIf you settle the matter, I’ll give you what their cut would have been.\n\n-Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50
headhunters_searchbody_danger_outpost_desc_001=Some of my people were involved with a raid over at ~mission(Location|Address). Most of them got out clean, but after the dust settled nobody is sure of what happened to ~mission(TargetName).\n\nA lot of other gangs would just leave the poor bastard to rot, but that’s not the way the Headhunters do things. I want to know for sure if ~mission(TargetName|Last) is alive or dead and I’m willing to pay you good credits to find out.\n\nJust be careful when you get there because I bet the assholes who live there are still gunning for a fight.\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 200
hh_missingperson_inv_e_faunacave_desc_01=A few days back I dispatched ~mission(TargetName|Last) to scope out a cave system for potential use as a storehouse. Haven't heard from them since. \n\nMy gut tells me they ran into trouble. The local wildlife isn't known for being friendly, and ~mission(TargetName|Last) isn't exactly known for being cautious. If you're in need of some creds, I'm offering some up for anyone who can get in there and figure out what happened. \n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50 / 200
headhunters_searchbody_danger_station_desc_001=We’re on the market for a new stash house, so I sent ~mission(TargetName) over to ~mission(Location|Address). They were supposed to just have a quick look and report back to me if any of the hangars would work for us, but I haven’t heard from them since.\n\nMy guess is that someone else was already using the hangar, but I’d sleep better knowing for sure.\n\nIf the credits seem right, head over and see if you can find out what happened to ~mission(TargetName|Last). Just be careful. I’d hate to have to hire someone to find your body next.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 200
headhunters_searchbody_nodanger_outpost_desc_001=I know better than to send someone like ~mission(TargetName) out by themselves, but that didn’t stop me from being a fool and doing it. Now the dumb SOB hasn’t returned my comms and nobody has set eyes on them in a few days.\n\nIf you got the time, I could use someone to go over to ~mission(Location|Address) and see if they’re still there. You get paid even if they wind up being dead.\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 50
hh_missingperson_inv_e_criminalbase_desc_01=Sent ~mission(TargetName) out to check out a strange noise in one of our storehouses and haven't heard from them in a while. Turns out they got themselves kidnapped. We've got intel that says they're being held at ~mission(Location|Address), but we're not sure about the source. Need someone to swing by and make sure the info is legit.  \n\nWhether it's good news or bad, there are some creds in it for you. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50
hh_missingperson_inv_chain_h_xenothreat_desc_01=Those XenoThreat assholes ambushed one of our outposts. We eventually kicked their ass out of there but once the cowards knew they'd been beat, they took ~mission(TargetName) hostage as a Human shield. We let 'em go, because we don't betray our own like that, but we're not planning on letting this stand. \n\nWord is that they fled to their base at ~mission(Location|Address). We need someone to break in, find ~mission(TargetName|Last), and relay the info back to me. There's a lot of creds in it for you if you do the job right. \n\nKeep in mind this isn't their only outpost in the system. If they give you the slip, you may need to track them to another sector. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 400
headhunters_missingperson_sabotage_VH_XT_desc_001=You ever get a bad feeling that you just can't shake? I had sent ~mission(TargetName) to take out the some XenoThreat servers at ~mission(Location|Address) and I'm starting think they ran into some serious trouble.\n\nDo me a favor, huh? Go on over and see if you can figure out what happened to them and make sure that those servers are destroyed for good.\n\n-Stows out\n\n<EM4>Reputation Awarded:</EM4> 800
headhunters_missingperson_sabotage_server_H_XT_desc_001=I'm a bit at the end of my rope. I had sent ~mission(TargetName), a pretty dependable Headhunter, out to destroy the XenoThreat data servers at ~mission(Location|Address).\n\nThat was a while ago and I still haven't heard from them and the servers are still sitting there intact. \n\nDo me a favor, huh? Go on over and see if you can figure out what happened to ~mission(TargetName|NickOrFirst) and help finish destroying the servers.\n\n-Stows out\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 400 / 600
headhunters_EliminateAll_Missing_Xenothreat_VH_desc_001=Here's the deal, one of our usual heavy hitters, a cat named ~mission(TargetName), was sent to ~mission(Location|Address) to knock out some XenoThreat who'd been hiding there. We knew it was going to be a tall order, but that's why we called in ~mission(TargetName|Last). Problem is, we ain't heard from them.\n\nAs far as we know XenoThreat are still operating out of that outpost so we gotta assume that ~mission(TargetName|Last) got popped. We need you to go in and finish what they started. Once that's done, if you can find out what happened to ~mission(TargetName|Last), that would be a bonus.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 800
headhunters_EliminateAll_Missing_Xenothreat_H_desc_001=We had this kid named ~mission(TargetName) volunteer to go take out some XenoThreat near ~mission(Location|Address). Everything we knew about the place said it was gonna be too much for ~mission(TargetName|Last) to handle, but they were real keen on boosting their standing with the Headhunters and thought this would do it, so they went alone.\n\nHaven't heard anything but XenoThreat comms coming out of that place since. If you want to go and knock it over, we'll pay you instead. If you can find out what happened to ~mission(TargetName|Last) that would be a bonus.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 600
Headhunters_eliminateall_caves_desc_01=Hey,\n\nSome two-bit thugs are holed up in ~mission(Location|Address). Wouldn’t pay them any mind, except the arrogant skags tried to hit an outpost under our protection.\n\nWe chased 'em off with little trouble, but we can't let that kind of disrespect go unpunished. Our Clips are busy with some bigger fish, so we'd like you to take care of this for us. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
Headhunters_defend_XT_VH_desc_001=XenoThreat are on the warpath right now. They’ve launched simultaneous attacks on several Headhunters sites and stretched our fighters thin. Got word they’re planning to storm ~mission(Location|Address) next, and we can’t get anyone there to defend it. \n\nI’m looking to pay someone to pull together a crew, gather supplies, and mount a strong defense for us. Gonna be honest with you, this is shaping up to be a hell of a fight. Xenos are sending some of their most experienced forces there. Not much else I can say except that they’ll probably stagger the arrival of their forces, wipe them all out and you’ll be paid handsomely. \n\nThink you can rise to the occasion?  \n\n-Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_cfp_M_desc_001=Word came down from the Judge that we're to hit ~mission(Location|Address). It's owned by CFP and security there have been less than hospitable to some of the locals, so they gotta go.\n\nThey may talk a big game about bringing security, but they got guns and are more than happy to use 'em.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_cfp_E_desc_001=Need someone to sweep ~mission(Location|Address). CFP security forces seized the outpost from a group of locals that'd been there for years. Beat the hell out of 'em from what I heard, so they came to Headhunters asking for revenge. \n\nNeed it done fast and clean. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_XT_derelicts_desc_01=One of our Judges caught wind of XenoThreat trying to move in on our territory. Seems like they’re trying to take over ~mission(Location|Address). We don’t want to let those psychos get any more of a foothold in system than they already have, so we’re putting some creds on the line to get ‘em to back off.\n\nWe want you to come down on them hard. Don’t let up till the whole place is a graveyard. We’ll send your payment once the bodies are ready to bury.\n\n- Stows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_EliminateAll_XenoThreat_H_desc_001=One of our people stumbled across a group of XenoThreat hiding out over near ~mission(Location|Address). Not sure if they're dug in or just passing through, but we want to hit them before they move.\n\nMaybe bring some people if you got 'em because XenoThreat don't tend to go down easy. Get there and remind them who the power is in this system.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_eliminateall_base_Generic_E_desc_001=So here's the deal, we got some small time dirtbags who think they're hotshots running out of a base near ~mission(Location|Address). I don't know what toxic shit they're drinking but they thought it'd be a good idea to step to some Headhunter Clips. Killed one, injured three more. So I'm looking to send someone there to blast their ambition right out of their skulls.\n\nHead over and get it done. You'll get a nice bump of creds for it.\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 50\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Cluster JWY-925, RAB-ALPHA, RAB-TUNG</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n\n<EM4>[Regional Variants] example locations: Ruin Clinic, Cluster DLO-486, RAB-MAT</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_eliminateall_outpost_desc_01=Some assholes are refusing to pay us what we’re owed. Problem is, these idiots are bragging about it. Had they kept it quiet, we could’ve taken care of this more surgically, but now we need to send a message.\n\nThe fools are operating from ~mission(Location|Address). We need them all gone. Make it as loud as you can. We’ll send your payment once everyone’s taken care of.\n\n- Stows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_eliminateall_xt_desc_001=It's sad to say but we lost one of our outposts to XenoThreat. Appalling if you ask me, but that's why we're looking for someone who's got the time and ammunition to take it back.\n\nIf that's you, head over to ~mission(Location|Address) and take it back.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_eliminateall_cfp_desc_001=Here's the deal. Some of those mercs that CFP hired as security went and shot up some Headhunters that were just moving through the system. They weren't even doing anything, just flying.\n\nAnyway, we tracked them back to ~mission(Location|Address) and want to dish out some payback. Grab your gear and be our weapon, we'll make it worth your while.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_defend_xt_desc_001=Those XenoThreat punks launched an attack against ~mission(Location|Address) so we're looking for people to go fend them off. \n\nGet out there and waste every XenoThreat you see.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_ChainElimAll_AttackCFP_E_desc_001=Looking for anyone with an itchy trigger finger. We're looking to move against some CFP at  ~mission(Location|Address) and take it for ourselves. You gotta play this smart though. There are a bunch of satellite outposts around the main one and all of 'em got security, so you should take out each of these before you take the main base.\n\nBut hey, if you wanna jump right in the deep end and fight off all the reinforcements, that's on you. As long as you get it done.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 400\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_ChainElimAll_AttackGen_E_desc_001=Looking for some hitters to go drop some violence on some local dipshits who've been pulling jobs in the system against Headhunters. We tried reaching out to explain the error of their ways, but they shot our messenger, so now we go with option B.\n\nYou'll find them holed up near ~mission(Location|Address). Go there and repaint the walls with their blood.\n\nHave fun.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 400\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Elite Contractor level variants</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_ChainElimAll_1C_AttackXT_M_desc_001=Just got clearance from my Judge to start banging back against XenoThreat. Been eyeballing some spots under their control near ~mission(Location|Address).\n\nI'll give you the targets to hit, you kill everyone you find. Hell, I'd love to go myself, sounds like fun.\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_1C_AttackCFP_E_desc_001=Been getting word that CFP security have been getting a little more aggressive and started pushing people out of the homes they've built out of the scrap in the system and they want payback, so they came to us.\n\nHead out to ~mission(Location|Address) and clear out the CFP there. Should be pretty cut and dry with a nice payday.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 75 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_1C_ElimSpec_AttackCFP_M_desc_001=We've been trying to play nice with these Citizens for Prosperity people, but they've made it abundantly clear that we don't have a place in their 'safe system.' Their use of mercs for security have been causing all kinds of unreasonable violence like when this asshole ~mission(TargetName) opened fire on a group of settlers to drive them away from an outpost they'd been eyeing. So now the gloves are coming off.\n\nI need some hard workers to go hit ~mission(Location|Address) and take out ~mission(TargetName|Last). Odds are, they'll stay hidden until you prove you're enough of a threat, so make sure you do some damage.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_2C_ElimSpec_AttackCFP_H_desc_001=Got word from my Judge that we're to take back some of the outposts that CFP have taken over. They're a little pissed that CFP's getting as much of a foothold in the system as they are and think it's making the Headhunters look weak.\n\nFound a couple candidates near ~mission(Location|Address) that could use a sweep. Icing on the cake is that the head of security there is ~mission(TargetName). Not sure if you've heard of 'em, but they shot up a handful of Clips last month, so it's a win-win. Get some territory back and punch out someone who could really stand to get got.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_3C_ElimSpec_AttackCFP_VH_desc_001=Got a big one here. We need a team to head out to ~mission(Location|Address). Word is CFP are dug in at three different clusters in the area. Our judge wants them all cleared out. Seems one of their mercs, a real mean skag named ~mission(TargetName), is holed up at one of them. We want you to go there, clear them all out and take out ~mission(TargetName|Last).\n\nGet yourself a nice little payday in the process.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_2C_ElimSpec_AttackXT_H_desc_001=Need some good soldiers with a taste for violence to hit some XenoThreat hideouts located around ~mission(Location|Address). I'll get you the specifics if you're down, but you'll have to wipe out two separate clusters of hideouts. \n\nWe've also gotten word that ~mission(TargetName) is lurking around down there. If you take out enough XenoThreat dirtbags, they'll pop they're head up. \n\nWhen they do, put a round in it.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_3C_ElimSpec_AttackXT_VH_desc_001=Got a juicy assignment for any big-time enforcers who want to clear a big payday. Over at ~mission(Location|Address) we got some XenoThreat turf run by a real bastard named ~mission(TargetName). Now if you've been in the system long enough, you've probably either heard of ~mission(TargetName|Last) or at least seen their work. Skag has a tendency to leaves bodies wherever they go.\n\nAnyway, Judge wants this area swept clean, that means you gotta hit all three clusters and kill every XenoThreat dirt you find. Kill enough and ~mission(TargetName|Last) won't be able to hide.\n\nTake them all out and have one on us.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 400\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n
headhunters_ChainElimAll_Boss_XenoThreat_VH_desc_001=These XenoThreat assholes are like aloprats. Every time you thing you wipe them out, they just pop back up again. They seem to be back to their usual shit and trying to put together something big. No idea what, but we've been cleared to stop it before it starts.\n\nA group of XenoThreat biggies are supposedly meeting at ~mission(Location|Address) to plan or just rage or whatever it is they do, but we're gonna bust it up. Or you are.\n\nHead over there and wipe out everyone you find. Sure enough I'm sure the biggies will jump into the fight. That's what they always do.\n\nThis'll be a tough one. As much as I hate XenoThreat, they're damn good in a fight, so watch yourself and bring help if you can.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 400\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Elite Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Cluster BGR-560, Patch City, Patch City Clinic</EM4>\n- Atzkav Sniper Rifle\n- Atzkav "Igniter" Sniper Rifle\n- Atzkav "Mirage" Sniper Rifle\n- Calico Arms Tactical\n- Calico Core Tactical\n- Calico Legs Tactical\n- Calico Helmet Tactical\n- Atzkav Sniper Rifle Battery (8 cap)\n\n<EM4>[Regional Variants] example locations: Ignis, RAB-MAT, RAB-ECHO</EM4>\n- Yubarev Pistol\n- Yubarev "Mirage" Pistol\n- Yubarev "Igniter" Pistol\n- DustUp Arms Tactical\n- DustUp Core Tactical\n- DustUp Legs Tactical\n- DustUp Helmet Tactical\n- Yubarev Pistol Battery (10 cap)\n
headhunters_EliminateSpecific_Asteroid_Generic_M_desc_001=Need someone taken care of. They're holed up near ~mission(Location|Address). Not sure if you care who they are, but their name's ~mission(TargetName). Not much to tell, local thug who killed someone who was connected.\n\nThey've been on the run, so they're gonna be skittish. I'd approach with caution.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Ravager-212 Twin Shotgun\n- Ripper "Sunblock" SMG\n- Dust Devil Armor Arms\n- Dust Devil Armor Core\n- Dust Devil Armor Legs\n- Manticore Helmet\n- Ravager-212 Twin Shotgun Magazine (16 cap)\n- Deadrig Shotgun Magazine (8 cap)\n
headhunters_EliminateSpecific_Generic_M_desc_001=Got a crew that's been hitting Headhunter ships lately. Their leader's a real piece of work named ~mission(TargetName). We've tracked them to  ~mission(Location|Address), so we're looking for someone to put them down for good.\n\nThis group likes to fight, but shouldn't be a problem for someone like you. \n\nGet over there and get it done.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_CFP_M_desc_001=Need an available trigger to take down a target in a CFP outpost. They're a real piece of work named ~mission(TargetName). Old school merc filled with lead-pipe cruelty. \n\nHeard they're posted over at ~mission(Location|Address). Swing by and take them out. Try not to cause too much damage. They're the target, not anyone else.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75 / 100\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Checkmate, Rat's Nest Clinic, RAB-TUNG</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n\n<EM4>[Regional Variants] example locations: Gaslight, Cluster FSN-704, RAB-LYNX</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_Generic_VH_desc_001=Word's come down through my bosses that we're settling old debts. I've got an open line on this old-time hitter named ~mission(TargetName) who's racked up a hefty kill list. We caught wind that they were hiding out with some people over at ~mission(Location|Address) who aren't the biggest fans of us, so they probably won't take kindly to you. ~mission(TargetName|Last) is the target here, but you might have to mix it up with them.\n\nAgain, whenever we've tried to take out ~mission(TargetName|Last), they've killed their killer. I feel like you'll fare better, but I'd bring backup if you got it.\n\nGood luck.\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 1,200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_Generic_E_desc_001=Looking for any hitters available for a quick gig. Over at ~mission(Location|Address), they're getting hit by some geniuses led by ~mission(TargetName). We've tussled against ~mission(TargetName|Last) in the past so it's no surprise they haven't wised up. \n\nWe want you to head there and take them down. Kill whoever you like, but ~mission(TargetName|Last) should be your focus.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_Defector_desc_001=This shit saddens me. Not sure if you've ever crossed paths with ~mission(TargetName) in your dealings with us. Thought they were a real good one. Been with the Headhunters for years, but something must have happened because they went running to CFP for protection. Sold out some of our brothers and sisters along the way.\n\nAll the Judges are furious and wants blood. That's where you come in. Go to ~mission(Location|Address), find ~mission(TargetName|Last), and kill them.\n\nDoesn't have to be anything fancy. Just want the result.\n\nDamn shame.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_XenoThreat_desc_001=Got a line on a XenoThreat that's been a pain in the ass. Not sure if you've heard the name, but ~mission(TargetName) is a scumbag even by XenoThreat standards. Vicious, sadistic, and a prick to boot. We want someone to punch their number. You up for it?\n\nLast word was that they were somewhere around ~mission(Location|Address). Head there and take 'em out. Pretty simple.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 400\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_CFP_E_desc_001=My boss is looking for an available hitter. Headhunters are looking to retake ~mission(Location|Address). The CFP Mercs there have been digging in for a long fight. Look, we don't want to kill anyone we don't have to, so we're looking into other options.\n\nSecurity there's being run by ~mission(TargetName) and my Judge thinks that if they're taken out, the rest'll scatter. Shedding a little blood's better than a lot, right?\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 50\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_XenoThreat_VH_desc_001=Here's the deal, we just got word that a XenoThreat power player named ~mission(TargetName) just came out of hiding and was spotted at ~mission(Location|Address). \n\nHeadhunters have been hungry to put this asshole in the ground for months, so we launched an assault against the outpost, but the Judge wants to make sure ~mission(TargetName|Last) doesn't slip away, so they want to use you as insurance.\n\nThis'll be a tough kill in the middle of a warzone, but we'll pay out if you pull it off.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 600\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_XenoThreat_H_desc_001=Headhunters just rallied up a crew to go hit ~mission(Location|Address) and wipe out the XenoThreat there, but I'm looking to add some extra insurance. \n\nSee there's this heavy hitter there named ~mission(TargetName) who's up in the XenoThreat command structure and we want them taken out. Every other one you kill is gravy, but they're your prime target.\n\n-Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n
headhunters_EliminateSpecific_Asteroid_Generic_VE_desc_001=Got word of crew that's been pulling jobs and building a rep for themselves. Since they've said they don't want anything to do with Headhunters, we're looking to break 'em apart before they become a problem. Their leader is some punk named ~mission(TargetName) and we figure if they met the wrong end of a bullet, the rest of them would break apart.\n\nWe're told you can find ~mission(TargetName|Last) around ~mission(Location|Address). Head over and take care of it.\n\nThey shouldn't pose much of a problem to a pro like you.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-ALPHA, Cluster BGR-560, Rat's Nest Clinic</EM4>\n- Scalpel Sniper Rifle\n- Coda Pistol\n- Coda "Nighthawk" Pistol\n- Coda "Big Boss" Pistol\n- Morozov-SH Arms\n- Morozov-SH Core\n- Morozov-SH Legs\n- Morozov-SH Helmet\n- Scalpel Sniper Rifle Magazine (12 cap)\n- Coda Pistol Magazine (6 cap)\n\n<EM4>[Regional Variants] example locations: RAB-MAT, Ignis, Cluster LHB-976</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_EliminateSpecific_CFP_H_desc_001=Headhunters are launching an attack near ~mission(Location|Address). This ex-Marine asshole named ~mission(TargetName) has been sending their mercs to clear out nearby encampments if they don't surrender their weapons.\n\nWhile all the security have been greenlit, ~mission(TargetName|Last) has been singled out. In their last raid, they beat a squatter to death for talking back. Turns out that squatter was the cousin of one of our Clips, so they're paying extra to make sure justice is done.\n\nWatch yourself though, ~mission(TargetName|Last) may be a scumbag who has this coming, they're still ex-military so they won't be easy to take down.\n\n-Stows\n\n<EM4>Reputation Awarded:</EM4> 1,200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Devastator Shotgun\n- Devastator "Warhawk" Shotgun\n- Devastator "Midnight" Shotgun\n- Morozov-SH Core Thule\n- Morozov-SH Arms Thule\n- Morozov-SH Legs Thule\n- Morozov-SH Helmet Thule\n- Devastator Shotgun Battery (12 cap)\n
headhunters_killship_gen_vlrt_rank0_desc_001=You know us. You know what we do. System’s getting a little crowded, so we’re looking for some good soldiers to help keep our place here.\n\nIf you’re up for it and don’t mind getting your hands dirty, we’ve got something to prove you’ve got the stuff we’re looking for.\n\n~mission(TargetName) was a former member who sold us out to XenoThreat and got some of their brothers and sisters killed. Now they think they can just live their life without consequence.\n\nYou take them out. You get boosted in. Sounds like a fair trade.\n\nThey’ve been spotted around ~mission(Location|Address), so get there and take care of it.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n<EM4>[Regional Variants] example locations: Patch City, RAB-ROTH, RAB-IGNITION</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: Rat's Nest, RAB-CHARLIE, Starlight Service Station</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: Adir, Cluster FSN-704, RAB-HELIO</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: RAB-MAT, RAB-COOK, Terminus</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
headhunters_killship_gen_vlrt_desc_001=Got a small fry who thinks they can hit the Headhunters and get away with it. So ~mission(TargetName) tried to knock over one of our stashes and think they can get away with it. \n\nLast we heard they were spotted around ~mission(Location|Address). We need someone to head over and send a very clear message who is the reigning power in the system.\n\nDo it quick and clean.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Cluster NBD-102, RAB-BRAVO, RAB-ROTH</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: Bloom, RAB-CHARLIE, Rat's Nest Clinic</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: Ignis, Vuur, Adir</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: Ruin Clinic, RAB-LYNX, RAB-ION</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
