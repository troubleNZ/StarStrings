Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Desc_001=CONTRACT: Mining Order\nLOCATION: Nyx\n\nDETAILS:\nOne of our prospecting teams recently confirmed that the asteroids which house QV Breaker Stations throughout Nyx's Keeger Belt contain a rare ore type, Sadaryx.\n\nHowever, owing to the difficulty in access these stations and the inherent risks involved, we are seeking external mining crews to handle the extraction.\n\nWe do not have a confirmed location of where the Sadaryx deposits are located within the station, but would recommend starting with the cave sections where minerals naturally form. If you get really lucky, you may even find some crystals in storage that were mined by the old QV work crews.\n\n<EM4>TERMS*:</EM4>\nYour crew will need to gain access to a <EM4>QV Breaker Station</EM4>, collect the required <EM4>Sadaryx ore</EM4>, and deliver it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nThis will require a <EM4>Multi-Tool with a Mining Attachment</EM4> and a basic understanding of hand mining.\n\nOur prospecting teams have reported that these stations may have been infiltrated by outlaws. Caution is advised.\n\n\n<EM4>Reputation Awarded:</EM4> 100
Shubin_Rockcracker_CollectLenses_Desc_001=CONTRACT: Manufacturing Order\nLOCATION: Nyx\n\nDETAILS:\nIf you happen to have any other work bringing you to one of the QV Breaker Stations in the Keeger Belt, Shubin Interstellar would be highly interested in contracting you to obtaining a supply of hard-to-source mining laser focus lenses.\n\n<EM4>TERMS*:</EM4>\nWhile there may be some focus lenses that can be recovered from the QV Breaker Station's storage, you must likely will need to manufacture them using <EM4>Sadaryx crystals</EM4> and the on-site lens fabricator. While the ore is rare, these Breaker Stations typically have sadaryx veins that can be mined directly with a <EM4>Multi-Tool with a Mining Attachment</EM4>.\n\nDeliver the procured lenses to the freight elevator located at <EM4>~mission(Destination|Address)</EM4> for processing.\n\nContractors have reported that these stations may have been infiltrated by outlaws, so caution is advised.\n\n\n<EM4>Reputation Awarded:</EM4> 100
Shubin_Industrial_GroundVehicle_Stanton_E_DiscoverPlanetary_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTERMS*: \nDue to changes in our sourcing pipeline, Shubin Interstellar is currently looking to purchase a variety of materials from independent miners operating in the area. While selling at a trade hub may net you a more competitive price than fulfilling our order, many miners find that strengthening their ties to Shubin to be a wise long-term investment for their career.\n\n~mission(Hint_Location) For a comprehensive list of where to find these minerals, consult <EM4>Mining Fundamentals #2: Where to Mine</EM4> in your mobiGlas Journal. While you're there, feel free to read the first part <EM4>Mining Fundamentals #1: Basic Overview</EM4> if you want a refresher on how to get the materials.\n\nSince this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nOnce you’re ready to sell us the required materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n\n<EM4>Reputation Awarded:</EM4> 100
