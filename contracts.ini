Foxwell_DefendEntitesAndEscort_VH_Desc=Urgent ship aid needed at <EM4>~mission(Location|Address)</EM4>. A band of destructive criminal outlaws that have been trying to make a name for themselves recently has struck hard against one of our high priority clients, <EM4>attacking their ships and targeting the client's ~mission(Objects)</EM4>. It will be your job to keep everyone and everything safe – though it won't be an easy feat.\n\nI cannot stress enough how dangerous these attackers are, so be sure to <EM>bring backup</EM> to deal with them. If you, the crew, and the infrastructures make it out intact, we’re offering a generous sum of <EM4>~mission(ScripAmount)  MG Scrip</EM4> to the main contractor. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 250\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, Nyx I, Nyx III</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx, Nyx I, Nyx System</EM4>\n- CF-117 Bulldog Repeater\n- CF-227 Badger Repeater\n- CF-337 Panther Repeater\n- CF-447 Rhino Repeater\n- CF-557 Galdereen Repeater\n- CF-667 Mammoth Repeater\n- V60-26 (Radar)\n\n<EM4>[Regional Variants] example locations: Checkmate Clinic, Patch City Clinic, RAB-KILO</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBl