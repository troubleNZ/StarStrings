Shubin_Industrial_ShipMining_VH_Org_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTERMS*: \nShubin Interstellar is currently looking to fulfil another purchase order for a variety of refined materials. This purchase order is more complex than typical, requiring multiple mining methods, but since you've proven your skill thus far, we think you and your team are up for the challenge.\n\nReminder, <EM4>materials must be refined before delivery</EM4>, and since this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nOnce you’re ready to sell us the required materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Arclight "Stormfall" Pistol\n- Arclight Pistol\n- Venture Arms Base\n- Venture Core Base\n- Venture Legs Base\n- Horizon Helmet Base\n- Arclight Pistol Battery (30 cap)\n\n<EM4>Pool 2</EM4>\n- Arclight "Nightstalker" Pistol\n- Aril Arms\n- Aril Core\n- Aril Legs\n- Aril Helmet\n- Arclight "Warhawk" Pistol\n- Arclight Pistol Battery (30 cap)\n\n<EM4>Pool 3</EM4>\n- Arbor MHV Mining Laser (Mining Laser)\n- S00 Hofstede (Mining Laser)\n- Lawson Mining Laser (Mining Laser)\n- S0 Helix (Mining Laser)\n- Surveyor-Go (Radar)\n- Surveyor-Lite (Radar)\n- Surveyor (Radar)\n- Surveyor-Max (Radar)\n\n<EM4>Pool 4</EM4>\n- Pitman Mining Laser (Mining Laser)\n- Hofstede-S1 Mining Laser (Mining Laser)\n- Klein-S1 Mining Laser (Mining Laser)\n- Helix I Mining Laser (Mining Laser)\n- Impact I Mining Laser (Mining Laser)\n- Arbor MH1 Mining Laser (Mining Laser)\n- Lancet MH1 Mining Laser (Mining Laser)\n- BroadSpec-Go (Radar)\n- BroadSpec (Radar)\n- BroadSpec-Max (Radar)\n\n<EM4>Pool 5</EM4>\n- Arbor MH2 Mining Laser (Mining Laser)\n- Lancet MH2 Mining Laser (Mining Laser)\n- Hofstede-S2 Mining Laser (Mining Laser)\n- Klein-S2 Mining Laser (Mining Laser)\n- He