Foxwell_DefendEntitesAndEscort_S_Desc=An emergency SOS just came through from a maintenance crew under the employ of one of Foxwell's VIP clients. If available, we urge you to get to <EM4>~mission(Location|Address)</EM4> as soon as possible. While engaging with the attackers, you'll be expected to protect the client’s  <EM4>~mission(Objects) and of their ships that may need assistance</EM4>. \n\nThis is far from the first we've seen from these particular outlaws, so believe me when I say these pilots are not to be taken lightly. I strongly recommend that you arrange a <EM>highly competent backup force</EM> to fly with you to the site.\n\nIf you manage to successfully defend the client's interests, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> as compensation to the main contractor brave enough to take this job on. \n\nStay safe, and good luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 300\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx II, Nyx System, nyx</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx I, Nyx System, Nyx II</EM4>\n- CF-117 Bulldog Repeater\n- CF-227 Badger Repeater\n- CF-337 Panther Repeater\n- CF-447 Rhino Repeater\n- CF-557 Galdereen Repeater\n- CF-667 Mammoth Repeater\n- V60-26 (Radar)\n\n<EM4>[Regional Variants] example locations: RAB-KILO, Patch City 