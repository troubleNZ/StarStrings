Foxwell_DefendEntitesAndEscort_H_Desc=Crew managing one of our client's operations at <EM4>~mission(Location|Address)</EM4> have reported that they're under attack from a criminal gang targeting the <EM4>~mission(Objects) and ships</EM4> in the area. It will be your job to keep both safe at all costs. I don't have all the facts yet, but I reckon this will be a tough mission – these outlaws seem determined to do some real carnage. \n\nIf it were me, I would <EM>bring backup</EM4> to deal with them. And if you manage to protect everyone, we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor who deals with these lowlife's successfully. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, Nyx II, Nyx I</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx System, Nyx I, Nyx II</EM4>\n- CF-117 Bulldog Repeater\n- CF-227 Badger Repeater\n- CF-337 Panther Repeater\n- CF-447 Rhino Repeater\n- CF-557 Galdereen Repeater\n- CF-667 Mammoth Repeater\n- V60-26 (Radar)\n\n<EM4>[Regional Variants] example locations: Cluster NBD-102, Patch City Clinic, RAB-KILO</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBlossom (Powerplant)\n- MagnaBloom (Powerplant)\n- FullForce (Powerplant)\n- IonSurge (Powerplant)\n- DayBreak (Powerplant)\n- Radiance (Powerplant)\n- FullForce Pro (Powerplant)\n- IonSurge Pro (Powerplant)\n- Celestial (Powerplant)\n- NewDawn (Powerplant)\n\n<EM4>[Regional Variants] example locations: RAB-NOVEMBER, RAB-IGNITION, Pyro I</EM4>\n- Glacier (Cooler)\n- Avalanche (Cooler)\n- Blizzard (Cooler)\n- DR Model-XJ1 Repeater\n- DR Model-XJ2 Repeater\n- DR Model-XJ3 Repeater\n\n<EM4>[Regional Variants] example locations: Aberdeen, Hurston, Ita</EM4>\n- 7SA (Shield)\n- INK (Shield)\n- 7MA 'Lorica' (Shield)\n- RPEL (Shield)\n- 7CA 'Nargun' (Shield)\n- HAVEN (Shield)\n\n<EM4>[Regional Variants] example locations: Hurston, Aberdeen, Arial</EM4>\n- Attrition-4 Repeater\n- Attrition-5 Repeater\n- Attrition-6 Repeater\n- FR-86 (Shield)\n- Sens (Radar)\n- Tige (Radar)\n
Foxwell_DefendEntitesAndEscort_VH_Desc=Urgent ship aid needed at <EM4>~mission(Location|Address)</EM4>. A band of destructive criminal outlaws that have been trying to make a name for themselves recently has struck hard against one of our high priority clients, <EM4>attacking their ships and targeting the client's ~mission(Objects)</EM4>. It will be your job to keep everyone and everything safe – though it won't be an easy feat.\n\nI cannot stress enough how dangerous these attackers are, so be sure to <EM>bring backup</EM> to deal with them. If you, the crew, and the infrastructures make it out intact, we’re offering a generous sum of <EM4>~mission(ScripAmount)  MG Scrip</EM4> to the main contractor. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx II, nyx, Nyx III</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx I, nyx, Nyx II</EM4>\n- CF-117 Bulldog Repeater\n- CF-227 Badger Repeater\n- CF-337 Panther Repeater\n- CF-447 Rhino Repeater\n- CF-557 Galdereen Repeater\n- CF-667 Mammoth Repeater\n- V60-26 (Radar)\n\n<EM4>[Regional Variants] example locations: RAB-FOXTROT, Patch City, RAB-TUNG</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBlossom (Powerplant)\n- MagnaBloom (Powerplant)\n- FullForce (Powerplant)\n- IonSurge (Powerplant)\n- DayBreak (Powerplant)\n- Radiance (Powerplant)\n- FullForce Pro (Powerplant)\n- IonSurge Pro (Powerplant)\n- Celestial (Powerplant)\n- NewDawn (Powerplant)\n\n<EM4>[Regional Variants] example locations: RAB-FOXTROT, RAB-TUNG, RAB-ROTH</EM4>\n- Glacier (Cooler)\n- Avalanche (Cooler)\n- Blizzard (Cooler)\n- DR Model-XJ1 Repeater\n- DR Model-XJ2 Repeater\n- DR Model-XJ3 Repeater\n\n<EM4>[Regional Variants] example locations: Magda, Ita, Aberdeen</EM4>\n- 7SA (Shield)\n- INK (Shield)\n- 7MA 'Lorica' (Shield)\n- RPEL (Shield)\n- 7CA 'Nargun' (Shield)\n- HAVEN (Shield)\n\n<EM4>[Regional Variants] example locations: Ita, Aberdeen, Magda</EM4>\n- Attrition-4 Repeater\n- Attrition-5 Repeater\n- Attrition-6 Repeater\n- FR-86 (Shield)\n- Sens (Radar)\n- Tige (Radar)\n
Foxwell_DefendEntitesAndEscort_S_Desc=An emergency SOS just came through from a maintenance crew under the employ of one of Foxwell's VIP clients. If available, we urge you to get to <EM4>~mission(Location|Address)</EM4> as soon as possible. While engaging with the attackers, you'll be expected to protect the client’s  <EM4>~mission(Objects) and of their ships that may need assistance</EM4>. \n\nThis is far from the first we've seen from these particular outlaws, so believe me when I say these pilots are not to be taken lightly. I strongly recommend that you arrange a <EM>highly competent backup force</EM> to fly with you to the site.\n\nIf you manage to successfully defend the client's interests, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> as compensation to the main contractor brave enough to take this job on. \n\nStay safe, and good luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, nyx, Nyx II</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx I, Nyx III, Nyx II</EM4>\n- CF-117 Bulldog Repeater\n- CF-227 Badger Repeater\n- CF-337 Panther Repeater\n- CF-447 Rhino Repeater\n- CF-557 Galdereen Repeater\n- CF-667 Mammoth Repeater\n- V60-26 (Radar)\n\n<EM4>[Regional Variants] example locations: Cluster NBD-102, RAB-NOVEMBER, RAB-FOXTROT</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBlossom (Powerplant)\n- MagnaBloom (Powerplant)\n- FullForce (Powerplant)\n- IonSurge (Powerplant)\n- DayBreak (Powerplant)\n- Radiance (Powerplant)\n- FullForce Pro (Powerplant)\n- IonSurge Pro (Powerplant)\n- Celestial (Powerplant)\n- NewDawn (Powerplant)\n\n<EM4>[Regional Variants] example locations: Checkmate, Checkmate Clinic, RAB-NOVEMBER</EM4>\n- Glacier (Cooler)\n- Avalanche (Cooler)\n- Blizzard (Cooler)\n- DR Model-XJ1 Repeater\n- DR Model-XJ2 Repeater\n- DR Model-XJ3 Repeater\n\n<EM4>[Regional Variants] example locations: Aberdeen, Arial, Magda</EM4>\n- 7SA (Shield)\n- INK (Shield)\n- 7MA 'Lorica' (Shield)\n- RPEL (Shield)\n- 7CA 'Nargun' (Shield)\n- HAVEN (Shield)\n\n<EM4>[Regional Variants] example locations: Aberdeen, Arial, Magda</EM4>\n- Attrition-4 Repeater\n- Attrition-5 Repeater\n- Attrition-6 Repeater\n- FR-86 (Shield)\n- Sens (Radar)\n- Tige (Radar)\n
Hockrow_FacilityDelve_P3M1_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nAll your digging around Onyx has paid off. I’ve been able to confirm that Jorrit has been operating an off-the-record lab in the facility’s Site-B in order to conduct an experiment he calls “Project Hyperion.” I’ll send his <EM4>lab notes to your mobiGlas journal</EM4> once you’re underway, but the long and short of it is the bastard is trying to make Humans evolve or some nonsense like that.\n\nThe client wants the experimental data, so you’re going back to Onyx and do everything needed to get Project Hyperion up and running. \n\nContract Investigator Actions:\nPrep the experiment by collecting a <EM4>Reagent code from the Engineering wing</EM4> and a <EM4>Catalyst code from the Research wing</EM4>.\n\nOnce you have those, head down to the <EM4>Lab in Site-B</EM4> and <EM4>run the experiment</EM4> so you can <EM4>upload the results</EM4>.\n\nAdditional Notes:\nSince this is an active lab, there might be ASD security on-site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n<EM4>Multiple Blueprint Pools (Repeat Only)</EM4>\n<EM4>Pool 1</EM4>\n- Zenith "Darkwave" Laser Sniper Rifle\n- Fresnel "Molten" Energy LMG\n- Geist Armor Arms ASD Edition\n- Geist Armor Core ASD Edition\n- Geist Armor Legs ASD Edition\n- Geist Armor Helmet ASD Edition\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n\n<EM4>Pool 2</EM4>\n- DynaFlux (Powerplant)\n- Bolide (Powerplant)\n- Fulgur (Powerplant)\n
Hockrow_FacilityDelve_P2M1_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nIt would be helpful to have the most recent energy anomaly data so that we can compare it to what you delivered last time. Any difference between the two data sets could prove useful.\n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>retrieve the Energy Anomaly data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- Geist Armor Arms Forest\n- Geist Armor Core Forest\n- Geist Armor Legs Forest\n- Geist Armor Helmet Forest\n- Corbel Arms Mire\n- Corbel Core Mire\n- Corbel Legs Mire\n- Corbel Helmet Mire\n- Fresnel Energy LMG Battery (165 Cap)\n- Novikov Backpack Mire\n\n<EM4>Pool 2</EM4>\n- Fresnel "Icebox" Energy LMG\n- Geist Armor Arms Rogue\n- Geist Armor Core Rogue\n- Geist Armor Legs Rogue\n- Geist Armor Helmet Rogue\n- Geist Armor Arms Whiteout\n- Geist Armor Core Whiteout\n- Geist Armor Legs Whiteout\n- Geist Armor Helmet Whiteout\n- Corbel Arms Smolder\n- Corbel Core Smolder\n- Corbel Legs Smolder\n- Corbel Helmet Smolder\n- Fresnel Energy LMG Battery (165 Cap)\n- Novikov Backpack Smolder\n
Hockrow_FacilityDelve_P2M2_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOut of an over-abundance of caution, it would be good to see if the security systems have picked up anything new since the last batch of data you delivered. That way we can make sure we’re up-to-date on what’s been happening down there.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Security data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- Geist Armor Arms\n- Geist Armor Core\n- Geist Armor Legs\n- Geist Armor Helmet\n- Corbel Arms Patina\n- Corbel Core Patina\n- Corbel Legs Patina\n- Corbel Helmet Patina\n- Fresnel Energy LMG Battery (165 Cap)\n- Novikov Backpack Patina\n
Hockrow_FacilityDelve_P2M3_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOne of the biggest issue when it comes to ongoing investigations is intel growing stale. To help alleviate that, I’m going to have you head back into Onyx and grab the latest seismic sensor data. Would be good to see what the latest readings say.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Seismic data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- Geist Armor Helmet Desert\n- Geist Armor Arms Desert\n- Geist Armor Core Desert\n- Geist Armor Legs Desert\n- Geist Armor Arms Whiteout\n- Geist Armor Core Whiteout\n- Geist Armor Legs Whiteout\n- Geist Armor Helmet Whiteout\n- Corbel Arms Halcyon\n- Corbel Core Halcyon\n- Corbel Legs Halcyon\n- Corbel Helmet Halcyon\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n- Novikov Backpack Halcyon\n
