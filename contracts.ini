Adagio_Industrial_Component_Salvage_Universal_M_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent order,we are seeking contractors to help source Recycled Material Composite (RMC), unrefined Construction Materials (Rubble, Pieces, or Salvage), and components by stripping and fracturing abandoned ships; removing the requested parts by hand with a <EM4>tractor beam</EM4>. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Potential Blueprints</EM4>\n- Trawler Scraper Module (Salvage Mod)\n- Abrade Scraper Module (Salvage Mod)\n- Cinch Scraper Module (Salvage Mod)\n
