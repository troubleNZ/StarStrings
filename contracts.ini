BHG_Certification_VeryEasy_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: Very Low\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: Based on an assessment of your abilities, the Bounty Hunters Guild would like to offer you the chance to earn your Tracker Training Permit.\n\nThis permit would signify that you are qualified to track and apprehend Very Low-Risk Targets (VLRT). These criminals traditionally fly smaller ships and rarely have more than one escort. Ideal for Bounty Hunters who are just starting out.\n\nTo successfully complete this certification process, you must apprehend a VLRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
BHG_Certification_Easy_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: Low\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: Based on an assessment of your developing abilities, the Bounty Hunters Guild would like to offer you the chance to earn your Tracker Beginner's Permit.\n\nThis permit would signify that you are qualified to track and apprehend Low-Risk Targets (LRT). These criminals traditionally fly smaller ships but typically have a few escorts which makes them more challenging.\n\nTo successfully complete this certification process, you must apprehend a LRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
BHG_Certification_Medium_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: Moderate\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: With the progress you have made in developing your skills, the Bounty Hunters Guild would like to offer you the chance to earn your full Tracker License.\n\nThis license would signify that you are qualified to track and apprehend Moderate-Risk Targets (MRT). These criminals traditionally fly medium-sized ships with several escorts. This class of outlaws make up a bulk of the contracts that typical bounty hunters will encounter.\n\nTo successfully complete this certification process, you must apprehend a MRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
BHG_Certification_Hard_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System) \nRISK ASSESSMENT: High\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: As your standing in the community continues to grow, the Bounty Hunters Guild would like to offer you the chance to earn a Journeyman Tracker License.\n\nThis license would signify that you are qualified to track and apprehend High-Risk Targets (HRT). These criminals can travel in larger multicrew ships with several escorts. The additional offensive and defensive capabilities make them difficult targets for all but the most skilled guild members.\n\nTo successfully complete this certification process, you must apprehend a HRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
BHG_Certification_VeryHard_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System) \nRISK ASSESSMENT: Very High\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: With your proven track record, the Bounty Hunters Guild would like to offer you the chance to earn an Advanced Tracker License.\n\nThis license would signify that you are qualified to track and apprehend Very High-Risk Targets (VHRT). These criminals can travel in larger multicrew ships with heavy escorts. With multiple hostiles to deal with, encounters with these targets can often be lethal.\n\nTo successfully complete this certification process, you must apprehend a VHRT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
BHG_Certification_Super_Desc=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System) \nRISK ASSESSMENT: Extreme\nLAST KNOWN LOCATION: ~mission(Location)\nKNOWN AFFILIATIONS: <None>\nNOTES: As acknowledgment of your expertise in the craft, the Bounty Hunters Guild would like to offer you the chance to earn a Master Tracker License.\n\nThis license would signify that you are qualified to track and apprehend Extreme-Risk Targets (ERT). These are criminals who travel in sub-capital ships with heavy escorts. This class of bounty only gets assigned to the most experienced of trackers.\n\nTo successfully complete this certification process, you must apprehend an ERT ranked criminal by the name of <EM4>~mission(TargetName)</EM4> last seen at <EM4>~mission(Location|Address)</EM4>.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
bhg_bounty_desc_gen_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: ~mission(Danger)\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: They have several known associates with criminal records so they may not be alone so arm up and exercise caution when engaging.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 500 / 1,000 / 2,000 / 8,000 / 16,000
bhg_bounty_desc_HeadHunters_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: ~mission(Danger)\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: HeadHunters\nNOTES: Headhunters are a reputed criminal organization who have a long history of clashes with law enforcement. There is a good chance that they might have other gang members when confronted so exercise caution when engaging.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 8,000
bhg_bounty_desc_XT_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: ~mission(System)\nRISK ASSESSMENT: ~mission(Danger)\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: XenoThreat\nNOTES: Xenothreat has consistently displayed unprovoked aggression against any law enforcement or security personnel. There is a good chance that they might have other gang members when confronted so exercise caution when engaging.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 16,000
BHG_ShipWaveAttack_DrawOutBoss_H_Desc_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nRISK ASSESSMENT: High\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Unknown\nNOTES: This particular target has proven very difficult to capture. They tend to remain hidden unless there is a big enough threat to demand their attention. That's why you and your support crew will need to take out enough of their underlings to catch their ire. Just stay put, take out any hostiles that show up, and the target should eventually show themselves.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 200
BHG_ShipWaveAttack_DrawOutBoss_VH_Desc_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nRISK ASSESSMENT: Very High\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Unknown\nNOTES: This particular target has proven very difficult to capture. They are seldom seen unless they are required to deal with a large enough threat personally. That's why you and your support crew will need to take out enough of their underlings to ensure they come to engage you. Just stay put, take out any hostiles that show up, and the target should eventually show themselves.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 250
BHG_ShipWaveAttack_DrawOutBoss_S_Desc_001=--------------------------------------------------------\n-------------- BOUNTY CONTRACT ---------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nRISK ASSESSMENT: Extreme\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Unknown\nNOTES: This particular target has proven very difficult to capture. They tend to remain hidden unless there is a big enough threat to demand their attention. That's why you and your most trusted support fleet will need to take out enough of their underlings to force them to confront you. Just stay put, take out any hostiles that show up, and the target will eventually arrive in their capital ship.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 300
CFP_Delivery_Outpost_desc_001=Hey,\n\nWe’ve got an opportunity for any haulers interested in lending a hand or two to Citizens for Prosperity.\n\nThere’s a box that needs to be moved from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Shouldn’t take long, if you’re around the outpost and available. \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 50
CFP_Delivery_Outpost_Multi_desc_001=Hi,\n\nCitizens for Prosperity needs help moving supplies around one of our outposts. The boxes need to be picked up from <EM4>~mission(Location|Address)</EM4> and taken to <EM4>~mission(Destination|Address)</EM4>. \n\nDoesn’t sound too difficult, does it? Just make sure you’re wearing a comfy pair of shoes. Also, to make your life easier, I'd bring a <EM4>handheld tractor beam</EM4> with you. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 200 / 400 / 800
cfp_defendship_Intro_Desc_001=Citizens for Prosperity is in need of pilots with dogfighting experience. If you’re looking to put your skills to the test, I have a mission here for you to try. \n\nA civilian ship has requested combat support near <EM4>~mission(Location|Address)</EM4>. Head there and show us that you have the skills to excel in these types of missions and we’ll put you to good use.  \n\nPlease be aware. This mission is not a training exercise. This is a real encounter, so please do your best to save the ship in distress. \n\nGood Luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity \n\n\n<EM4>Reputation Awarded:</EM4> 50
cfp_defendship_VLRT_desc_001=It seems one of the routes that we had thought relatively safe has proven otherwise. Outlaws have attacked one of our pilots over at ~mission(Location|Address) and they won't make it much longer without support. \n\nI'd appreciate it if you could fly there as quickly as possible and help them deal with these attackers.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_LRT_desc_001=One of our pilots had just picked up a shipment of supplies near ~mission(Location|Address) when they were attacked by some vicious shipjackers. \n\nWe just received their distress beacon and I'm hoping you can go provide them combat support.\n\nAny assistance you could give would make all the difference.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 150\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_MRT_desc_001=A Citizens for Prosperity affiliated ship was attempting to deliver some supplies to ~mission(Location|Address) when they were attacked by the recipients who didn't want to pay for their purchase and chose violence instead.\n\nI'll instruct our traders to be more careful about who they deal with in the future, but for now, I would really appreciate you lending them a hand in fighting off these attackers. \n\nAppreciated,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 200\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_HRT_desc_001=We just received word that a convoy of Citizen for Prosperity affiliated ships have been targeted by outlaws and that our people are in dire need of assistance. \n\nIf you are available, we need combat ready pilots at ~mission(Location|Address) to defend our people. Note that at this dire time, we cannot afford even a single lost ship and expect with your assistance for all of our people make it out alive.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_VHRT_desc_001=A Citizens for Prosperity convoy on a resupply run dropped a distress beacon near <EM4>~mission(Location|Address)</EM4>. They’re not answering any comms, so I assume the situation is serious. That convoy has some skilled pilots, so if they’re not responding then they definitely need the help.\n\nWe’ll compensate you to support that convoy.  \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 250\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_SRT_desc_001=I’m getting reports that a Citizens for Prosperity convoy carrying vital supplies is currently under attack at <EM4>~mission(Location|Address)</EM4>. It’d be a big blow to our operations if we lost that cargo. \n\nIf you’ve got the combat skills to go up against highly aggressive hostiles, we’re more than willing to pay for your help. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_MRT_bombingrun_desc_001=One of our people is currently under attack at ~mission(Location|Address). They have attempted to elude their attackers to get to safely, but the outlaws have proven too skilled for them to break away. \n\nWe need you to fly there, engage with the attackers, and then destroy the nearby fuel reserves. The hope is that this display of destruction will dissuade them from continuing pursuit.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 200
cfp_sabotage_servers_M_HH_desc_001=The Headhunters recently attacked one of our transports and were sadly able to get their hands on some secure data. Although the encryption on it is strong, its only a matter of time before they'll be able to access it.\n\nBefore that happens, we need you to go to ~mission(Location|Address) and destroy all traces of the information from their servers.\n\nYou'd really be helping Citizens for Prosperity out if you can pull this off.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75 / 150\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-TUNG, RAB-WHISKEY, Pyro I</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: RAB-OVER, RAB-ECHO, RAB-LAMDA</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_generators_M_desc_001=We have gotten word that the outlaws at ~mission(Location|Address) have begun recruiting with the hopes of launching a raid against Citizens for Prosperity. \n\nIn order to deescalate the situation before it gets out of hand, we would like you to disable their power generators and halt their expansion. \n\nPull this off and it could save a lot of lives.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_VH_desc_001=Citizens for Prosperity have been monitoring a very dangerous outlaw group at ~mission(Location|Address) and we believe that they are in midst of planning a major attack which could throw the whole system into upheaval.\n\nIn order to protect all the progress we've made here, we would like you to raid their compound and destroy all the servers housing their plans. \n\nThis should at least provide us with enough of a reprieve for them to reconsider their offensive.\n\nThank you,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_servers_H_XT_desc_001=We got a bit of a problem that I'm hoping you can solve for me. One of our informers has revealed that XenoThreat has been amassing data on Citizens for Prosperity operations throughout the system. \n\nThis information, if used correctly, could put our people at serious risk. The best solution is for you to completely destroy the servers where the data is being stored at ~mission(Location|Address).\n\nWith their trove of information wiped out, it should give our people a fighting chance.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Cluster JWY-925, RAB-ULTRA, RAB-BRAVO</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Cluster MNK-833, Cluster EMM-567, Cluster HJS-232</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_generators_VE_desc_001=Following a series of raids against Citizens for Prosperity aligned settlements, we believe we have traced those responsible back to ~mission(Location|Address).\n\nAttacking them directly will pose too great of a risk and most likely encourage aggressive reprisals. Instead, we believe that if their power generators were to be disable it could force them to settle somewhere else.\n\nDo you think you could handle it for us?\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-YORK, Starlight Clinic, RAB-KILO</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Vuur, RAB-LAMDA, Vatra</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_bombingrun_E_desc_001=We've been having escalating issues with the outlaws at ~mission(Location|Address) and can no longer stand by and watch as their aggressive actions hurt our community. \n\nWe are wary of launching a full scale assault, but believe that if their fuel stores are wiped out, it would deter them from further hostile actions. \n\nIf you're able, I'd appreciate you handling the destruction of the fuel personally. A ship capable of launching missiles would probably make the most sense, but I leave that up to you.\n\nThanks,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Starlight Service Station, Bloom, RAB-CHARLIE</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Pyro V, Cluster MNK-833, Fairo</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_servers_VH_XT_desc_001=One of the Citizens for Prosperity members who have been serving as a XenoThreat informer has let us know that the data servers located at ~mission(Location|Address) our housing a trove of information vital to the gang's operation. \n\nIf you were able to destroy these servers on our behalf it would be a huge win for the security of the entire system.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_server_elimiatespecific_HH_desc_001=We're just putting the full picture together now, but so far we've learned that a Headhunter by the name of ~mission(TargetName) recently stole some sensitive data that if exposed will be detrimental to Citizens for Prosperity's cause. \n\nWe need to ensure that all traces of the stolen data are eradicated. This means taking out all the Headhunter servers at ~mission(Location|Address) as well as tracking down ~mission(TargetName|Last) to stop them from further disseminating the information.\n\nYour help is much appreciated,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 1,500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_hauling_intro_desc_001=Welcome to the system, not sure if you're familiar with our organization but Citizens for Prosperity are a non-profit organization dedicated to bringing security and civilization to unclaimed systems.\n\nIf you're looking for work in the system and would like to help achieve our goal, we need a package picked up from <EM4>~mission(Location|Address)</EM4> and taken to <EM4>~mission(Destination|Address)</EM4>.\n\nOnce complete, we can offer you a variety of new job opportunities in this system and beyond.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50
cfp_HaulCargo_RegionLink_desc_001=Hi, we need to move some cargo across the system and were wondering if you could help. I know this is outside your usual purview, but I'm low on options. This would also be a great way to show your committed to Citizens for Prosperity's greater mission here.\n\nIf you head to <EM4>~mission(Location|Address)</EM4>, there should be some cargo accessible via a freight elevator that we'll need you to take to another freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nOnly thing to call out is that your ship must be able to handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. To make your life easier, be sure you have a <EM4>handheld tractor beam</EM4> with you. Otherwise, it should be a simple run. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
CFP_Salvage_FPS_desc_001=Hi,\n\nA repair crew has been making some much needed changes and upgrades to our outposts. After finishing some work at ~mission(Location|Address), they've set aside some scrap they didn’t have time to deal with. \n\nLooking to hire someone to go there and salvage it so it’s out of the way. Should be a quick clean up if you’re interested. Any RMC is yours to keep.\n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 25
CFP_SabotageRelays_HH_001_Desc=Violence is never our first choice, but sometimes it must be used as a preventative measure.\n\nWe’re planning a strike on a Headhunter controlled outpost and need your help.\n\nWe need to make sure that if something goes wrong they won’t be able to call for backup and escalate the situation. That’s where you come in. We need you to head over to <EM4>~mission(Location|Address)</EM4> and disable the communication towers. There should be a <EM4>control panel located at the top</EM4> of each tower that you can use to deactivate them.\n\nIf you’re able to do this, Citizens for Prosperity will be able to gain some vital ground in Pyro.\n\nIt’s also worth keeping in mind for future contracts that you can choose to take out the comms towers instead of risking a fight with reinforcement dropships.\n\nStay alert and stay safe.\n\nThank you,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75
CFP_SabotageRelays_XT_001_Desc=Citizens for Prosperity are eager to help the people of Pyro, and it starts with freeing them from the grasp of XenoThreat.\n\nWe’re preparing a team to infiltrate one of their outposts, but we need someone to go in ahead to take out their communication towers first. Once those towers are offline, they won’t be able to call for reinforcements and we can proceed with our plan.\n\nHead to <EM4>~mission(Location|Address)</EM4> and find the towers. At the <EM4>top is a control panel</EM4> that can be used to disable them.\n\nAlso, it’s worth noting that most outposts use a similar system, so you’ll know how to disable the comms towers rather than risk fighting reinforcement dropships when you’re doing other jobs.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 75 / 100
cfp_maintenance_E_desc_001=Hi,\n\nOne of our outposts at <EM4>~mission(Location|Address)</EM4> is in need of some light repairs. The folks onsite have estimated that you’ll need <EM4>three fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to fix up to three or so pipes.</EM4>\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\nThanks again for your help,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50
cfp_maintenance_M_desc_001=Hello,\n\nWe've received word that a devastating storm hit <EM4>~mission(Location|Address)</EM4> which caused some damage to the structures. Our technician on site is still trying to figure out what they can fix but they can’t get everything. If you bring <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to repair around five pipes</EM4>, we should be able to handle any remaining repairs.\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 100
cfp_maintenance_H_desc_001=We need some help. The CFP facility at <EM4>~mission(Location|Address)</EM4> suffered severe damage during a recent electrical storm and we're looking for anyone who can help with repairs.\n\nSurveying the site, you'll have to bring <EM4>six fuses</EM4>, a <EM4>salvaging tool</EM4>, and <EM4>enough RMC canisters to take care of eight or so pipes</EM4>. That should be enough to repair the damage and get the outpost back in operation.\n\nIf you need more information on maintenance work, see <EM4>“Cornerstone Developments' Guide to Maintenance”</EM4> entry in your mobiGlas Journal.\n\nDo you think you can help?\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 400
cfp_EliminateSpecific_Generic_E_desc_001=Reports indicate that ~mission(Location|Address) has come under attack from a group of armed individuals led by a notorious outlaw named ~mission(TargetName). There have been multiple reported deaths and injuries, so Citizens for Prosperity has been looking for qualified combat operatives to provide some support. \n\nThough we don't advocate conflict resolution through violence, we believe that the group will disperse if ~mission(TargetName|Last) is not there to lead them.\n\nHead over as soon as you can. Lives are on the line.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75
cfp_defend_cave_Generic_desc_001=We received a distress call from ~mission(Location|Address) saying that they're being robbed by a small group of outlaws. ~mission(Location|CaveSize) Though remote, this outpost is a crucial piece of CFP's infrastructure in the area so we need to take it back.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-criminals_desc_001=We learned that ~mission(Location|Address) is under threat of attack by outlaws and has asked for assistance. We need someone to protect them and drive away the outlaws. \n\nMake sure you stay close after their initial attack. Too often, outlaws win fights just by sending more bodies than anyone can reasonably defend against, so make sure you fight off any reinforcements before leaving the area. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 75 / 200\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Cluster JWY-925, RAB-ULTRA, RAB-BRAVO</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n\n<EM4>outpost_regionab</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend_regionshift_desc_001=We've received a distress call from ~mission(Location|Address). A group of unknown assailants have launched an attack. There have been multiple deaths reported and we need to reclaim the outpost.\n\nI know this is far from your current position, but we're desperate to secure the area and get the outpost back and running again.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: RAB-COOK, RAB-MAT, Cluster HJS-232</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: Rat's Nest, Orbituary Clinic, RAB-ALPHA</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: RAB-VICTORY, Pyro V, Gaslight Clinic</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_hh_E_desc_001=Citizens for Prosperity is looking for security personnel to take a former CFP outpost that's currently serving as a hideout for Headhunters to launch attacks throughout the system. \n\nLocated near ~mission(Location|Address), reclaiming this outpost will allow CFP to provide greater support to local efforts to build stability.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_XT_E_desc_001=Despite our efforts to promote non-violence, local outlaw groups continue to attack our organization. XenoThreat recently assaulted ~mission(Location|Address) and chased out our volunteers that had been working there.\n\nWe're looking to enlist combat personnel to retake the outpost. Ideally we could work something out to encourage them to move on, but XenoThreat quickly resorts to violence to solve all their issues so there will undoubtedly be a fight.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_hh_M_desc_001=We received an emergency comm from ~mission(Location|Address) reporting that they are currently under attack by a group of Headhunters. We know our presence in the system has upset the Headhunters, but it hardly excuses this unprovoked attack.\n\nIf available, please gather your gear and head out. Just understand that Headhunters are experienced fighters and will not back down easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100 / 200\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Gaslight, RAB-ECHO, RAB-POINT</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: Ruin Clinic, Cluster MNK-833, RAB-MAT</EM4>\n- Karna "Rager" Rifle\n- Artimex Core Wildwood\n- Artimex Arms Wildwood\n- Artimex Legs Wildwood\n- Artimex Helmet Wildwood\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_XT_M_desc_001=XenoThreat forces launched an unprovoked attack near ~mission(Location|Address). We're looking for any available combat operators to go and provide support. \n\nIf you haven't dealt with them before, it's important to know that XenoThreat are trained fighters so this will not be an easy fight, but it's a necessary one.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200 / 400\n\n<EM4>Potential Blueprints (Pyro IV/V Area Only)</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_Gen_E_desc_001=Citizens for Prosperity is looking for any available combat operators to ~mission(Location|Address). A group of outlaws have launched an unprovoked attack and our security personnel are desperately in need of support.\n\nPlease dispatch to ~mission(Location) with all urgency and good luck.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_defend_headhunters_H_desc_001=A distress call just came in from ~mission(Location|Address) claiming that a large Headhunter force has just attacked our outpost there. There have been multiple deaths and injuries from those who managed to flee the scene. We're looking for any available security personnel to head there and retake the outpost.\n\nWitness accounts identified the attackers as elite Headhunter enforcers, so watch yourself out there and bring help if you can. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend_headhunters_M_desc_001=Headhunters have launched an unprovoked attack against ~mission(Location|Address). Although we don't support the use of violence, Citizens for Prosperity won't let innocent people die. We need qualified security personnel to retake the outpost.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_003=Urgent!\n\nXenoThreat is mobilizing for a massive incursion to wipe ~mission(Location|Address) off the map. You’re their only hope of enduring this assault and protecting them from XenoThreat’s cruelty.\n\nI know I’m asking you to put yourself in the line of fire, but this system won’t change unless people like you are brave enough to take on these dangers. No amount of credits could measure up to how much good you’d be doing by stepping in.\n\nIf you’re willing and able to take on this mission, make sure to take some allies with you. XenoThreat will certainly send in stronger reinforcements once they realize they’re taking losses.\n\nWe believe in you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_002=Urgent!\n\nXenoThreat is targeting ~mission(Location|Address) to send a message to other settlers about what happens if they accept our support. \n\nIf you’re able to fend off the attackers, I’m sure they’ll send additional forces, so you’ll need to dig in for multiple assaults. Since XenoThreat has a lot of resources at their disposal, you should think about recruiting others to help you keep everyone safe.\n\nWe’re all counting on you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_HHAttack_M_desc_001=We just received a frantic comm from ~mission(Location|Address) and are looking for any available combat specialists to help repel a Headhunter attack. There are still hostiles on site and there are reports of several casualties so we need this handled quickly.\n\nI will provide all relevant data upon acceptance. Thank you for your assistance.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_001=We’ve learned that XenoThreat is about to launch an attack on ~mission(Location|Address). If they are successful, the number of casualties is expected to be high. I’m hoping that with your aid in defending them, we can make sure that doesn’t happen.\n \nWe know from past encounters that XenoThreat sends several raiding parties to carry out their attacks, so make sure you don’t leave the outpost until you’ve fought off all the reinforcements. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=We need any available security personnel to report to ~mission(Location|Address). A group of armed individuals have attacked one of our outpost clusters and we're in desperate need of help. Although the group seems to be unaffiliated with any of the known gangs, we've received word that their leader is ~mission(TargetName), a local outlaw with a vicious reputation.\n\nPlease head out as soon as you can and secure the area by taking out the outlaws and ~mission(TargetName|Last).\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Several CFP clusters near ~mission(Location|Address) just got hit by a group of outlaws led by ~mission(TargetName). We're looking for any available combat specialists to help retake the outposts.\n\nI can provide the locations upon acceptance but we need to clear out the main outpost and satellite installations from all hostile forces and take out ~mission(TargetName|Last) as it's unlikely that they will not cease their hostilities if they escape.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=The outlaw presence here has become much bolder of late and a lot of people are getting hurt. We've recently lost several clusters around ~mission(Location|Address). While we don't like to have to resort to violence, the board has acknowledged that these locations are crucial to establishing stability in the system and authorized the use of a security detail to retake them.\n\nWe're also aware that the embedded hostiles are being led by ~mission(TargetName) who's had a history of attacking CFP interests. The board would like ~mission(TargetName|Last) dealt with to prevent future attacks.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=We are currently looking for any qualified and available security operatives to head out to ~mission(Location|Address) and reclaim a CFP installation that had been taken by Headhunters. \n\nThe group that's currently occupying the outpost is being led by ~mission(TargetName), a Headhunter of some note who's had a history of aggression against locals and CFP volunteers.\n\nWe need all Headhunters secured and ~mission(TargetName|Last) taken out.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=Citizens for Prosperity is looking for any available security operatives to retake several former CFP installations near ~mission(Location|Address) from Headhunter control. These clusters were violently taken from us by ~mission(TargetName) and resulted in the deaths of many volunteers.\n\nBringing these outposts back under our control will help provide more stability to the system. Reports indicate that ~mission(TargetName|Last) tends to hide behind their rank and file, so they will likely appear once you've cleared out most of the hostiles.\n\nXenoThreat are trained and motivated so they will not give up easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=Citizens for Prosperity's board just authorized funds to hire security personnel to retake several clusters near ~mission(Location|Address) that have since fallen into the hands of the Headhunters. While we tried to just accept the loss, it's become apparent that they are crucial to our ongoing operations in the system.\n\nYou'll need to clear out each of the locations that will be provided but more importantly, you'll also need to take out ~mission(TargetName), who's in charge of the hostiles on site.\n\nThese Headhunters are heavily embedded and have a history of violence, so you should prepare accordingly. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Looking for any available security personnel to reclaim several clusters previously lost to XenoThreat aggressors. Located near ~mission(Location|Address), they had been seized in brutal attacks led by ~mission(TargetName), a notorious XenoThreat lieutenant.\n\nWe're looking to take these clusters back so we can reestablish operations and continue our good work. You'll need to clear all the hostiles still on-site as well as ~mission(TargetName|Last).\n\nJust a reminder, that XenoThreat are highly trained and quick to fight, so prepare accordingly.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 400\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Although Citizens for Prosperity is committed to change through non-violent means, it's become apparent that exceptions might have to be made. CFP safe zones near ~mission(Location|Address) were recently and violently taken by XenoThreat forces under the command of ~mission(TargetName).\n\nWe're looking for any available combat operatives to help take these outposts back. This will undoubtedly be a difficult endeavor as XenoThreat are highly trained and eager to fight, so you should prepare accordingly.\n\nAside from clearing each cluster of XenoThreat forces, you will need to take out ~mission(TargetName|Last), who's loss will certainly make the system safer.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 400\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_defend_boss_Generic_desc_001=We just received reports of a massive attack against ~mission(Location) by a large group of armed individuals led by ~mission(TargetName), a notorious outlaw who has been threatening Citizens for Prosperity personnel for months. Details are still yet to be confirmed but we know there have been multiple casualties.\n\nCitizens for Prosperity is looking for any qualified security personnel to go and retake the outposts from these hostile elements. Our understanding is that ~mission(TargetName|Last) tends to hide behind their soldiers, but will emerge if you take enough of the rank-and-file out.\n\nWhile we don't like to resort to violence, management can see no other way of resolving this situation and continuing our good work in the system.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 800\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_bounty_desc_HeadHunters_001=This is a general warning. We have learned that the Headhunters are transporting a large amount of weapons into the system with the intent of launching attacks against CFP-owned settlements.\n\nWhile we believe that change can only come to this system through nonviolence. The presence of these weapons will undoubtedly cause considerably more bloodshed and devastation so we want to remove them from the equation.\n\nAny of our supporters with appropriate combat training are asked to undertake this dangerous assignment out near ~mission(Location|Address). We will compensate you for the tremendous risk you are taking.\n\nThank you and be safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 200
cfp_missingperson_inv_e_regionlink_desc_01=Citizens for Pyro is concerned about one of our local contractors, ~mission(TargetName). They finished up a trade at ~mission(Location|Address) and haven’t been seen since. We’re hearing reports that outlaws have been frequenting the area, so I suspect that the worst might have happened.\n\nEither way, ~mission(TargetName|Last) has done good work for us in the past and I’d hate for them to wind up as just another one of the system's missing. If you’re willing to find them for me, I’ll see that you get a reward.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
cfp_searchbody_nodanger_outpost_desc_001=One of our people, ~mission(TargetName), was supposed to be doing some preliminary scouting work over at ~mission(Location|Address), but they never reported in. We’re hoping that they just ran into some bad luck, but too often out here even the smallest misstep can prove fatal.\n\nI’d appreciate someone heading that way and seeing if they can be located. It’d be great if you find them alive, but if not, some closure is the least we can do for their family.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50 / 100 / 150
cfp_searchbody_danger_outpost_desc_001=Unfortunately, one of our community partners, ~mission(TargetName), has been missing for a few days. Their family contacted Citizens for Prosperity for help and I told them we would do what we could. That said, with so much time passed, I’m not too hopeful.\n\nWhatever their current state is, we're looking for someone to be our eyes on the ground for this one. There’s a strong chance that they were headed to ~mission(Location|Address), an area known to be very dangerous.\n\nIf you can track them down and confirm their status, one way or another, I’ll see that you’re properly compensated.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100 / 200 / 400
cfp_searchbody_nodanger_cave_desc_001=~mission(TargetName) is a local who only has done a few jobs for Citizen for Prosperity, but they had promise. That is, until they went missing while exploring ~mission(Location|Address) last week. Unfortunately, we didn’t hear about it until today. Chances of survival at this point are pretty slim, but we still think its worth confirming what happened to them.\n \nCFP could use help on this if anyone is interested. And besides being a good deed, the payment should make it worth the effort. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50 / 100
cfp_missingperson_inv_e_faunacave_desc_01=Junior surveyor ~mission(TargetName) fell out of contact with their team while identifying potentially viable mineral seams in a cave near ~mission(Location|Address). Wild animals have been known to frequent this location, which has led Citizens for Prosperity to believe that the surveyor may have been attacked while on the job and is currently stranded. \n\nWe need someone to find them and render aid if at all possible. If it's too late and they're beyond help, it will at least comfort the rest of the team to know what happened to their friend. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50
cfp_searchbody_danger_cave_desc_001=We’ve been trying to get in contact with community member ~mission(TargetName), but haven’t heard from them in a few days. From what Citizens for Prosperity has been able to find out, they were scouting out near ~mission(Location|Address) which is a known outlaw hotspot.\n\nWe need someone to go there for us and try to locate them, or worst case scenario, their remains. \n\nIf you are able to find them, there’s a reward on offer.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
cfp_searchbody_nodanger_station_desc_001=Two locals we work with were out salvaging at ~mission(Location|Address) when they had some issues with faulty equipment. One managed to escape, but their partner, ~mission(TargetName) was unfortunately left behind.\n\nWith the state they were last reported to be in, I’m guessing they didn’t make it, but I’d like to know for sure. If you’re willing, I could use your help in finding their remains.\n\nIf you can track them down, I’ll see that you’re properly compensated for the effort.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
cfp_missingperson_inv_m_headhunters_desc_01=We've received disturbing news: ~mission(TargetName), the scout that was reported missing last week has been seen in Headhunter custody. According to the witness, they were spotted being loaded into a transport headed to ~mission(Location|Address) this time yesterday. \n\nIf anyone out there can confirm their whereabouts, there's a reward in store. Citizens for Prosperity maintains hope that they are alive and well. If not, their families deserve to know their fates either way. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
cfp_missingperson_inv_m_headhunters_xs_desc_01=Last night, the homesteader ~mission(TargetName) was abducted by Headhunters for unknown reasons. Citizens for Prosperity has not received a ransom note, nor has the victim's family. However, we have just received word from an informant that the abducted party was most likely taken to ~mission(Location|Address). \n\nWe need someone to determine the validity of this information, and to report back to CFP. A reward will be provided whether your findings are good or bad. \n\nYou may need to utilize a ground vehicle to help you search the area. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
cfp_missingperson_inv_h_xenothreat_desc_01=During what should have been a routine cargo run, hauler and long-time friend of Citizens for Prosperity ~mission(TargetName) was ambushed and abducted by XenoThreat. The coded distress signal we received from the victim just before their comms went dark gave us just enough information to pinpoint their most likely location: ~mission(Location|Address).\n\nCFP needs someone to slip into the outpost, confirm the whereabouts of ~mission(TargetName|Last), and relay this information back to us so we know exactly where to send our rescue team. Or, in the worst possible scenario, deliver news to the hauler's family that their loved one didn't survive. \n\nWe understand how dangerous it is to approach a XenoThreat stronghold, and are prepared to offer a sizeable reward for putting yourself at risk.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 400
CFP_MissingPerson_RetrieveStolenGoods_XT_H_desc_001=Hey, \n\nOne of our veteran haulers got sick and backed out of a run that we desperately needed. ~mission(TargetName) stepped up and offered to do it. I was hesitant to give it to ‘em because it’s riskier than the routes they normally do. Seems like my concern was warranted. Last update we got from ‘em was near ~mission(Location|Address), which is XenoThreat territory.\n\nCan’t have this hanging over my head much longer. Any chance you’d be willing to head to their last known location and see if you can find out what happened? It’d mean a lot to me and others. Not only to know the status of ~mission(TargetName) but also the cargo, which is really needed at ~mission(Destination|Address). If you find it and complete the delivery, it would be a huge help to the CFP members there.   \n\nFly safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 3,200
cfp_missingperson_multiple_sabotage_servers_H_XT_desc_001=A small group of Citizens for Prosperity members were supposed to be delivering sensitive data back to our headquarters in Stanton, but they never arrived. \n\nWe now believe that they were captured by XenoThreat before they could leave the system. I'd like you to investigate ~mission(Location|Address) to discover what happened to the missing crew and then destroy any servers they could be using to store the stolen data.\n\nYour help is very appreciated,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 1,500
cfp_missingperson_inv_chain_m_desc_01=Two of our volunteers vanished while on a recent foraging expedition. It has been over two standard days since their disappearance, and their families have begun to fear the worst and are willing to offer a reward if someone can help trace their whereabouts.\n\nThey were last seen in the vicinity of ~mission(Location|Address). It is possible that they may have been injured and sought shelter in an abandoned building or a cave. The area is full of potential hiding spots, so your search will need to be thorough. \n\nThank you for taking this on. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 800
cfp_missingperson_sabotage_servers_VH_XT_desc_001=One of our most trusted datarunners, ~mission(TargetName), has found themselves the victim of a XenoThreat assault. Now both they and the data they were ferrying have been captured and taken to ~mission(Location|Address). \n\nI am charging you with heading there to ascertain what happened to ~mission(TargetName|First) and to destroy data servers which may be housing the stolen information.\n\nEven if the worst has happened, I think they would want us to make sure they data they were charged with protecting isn't used for nefarious gains.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 1,500
cfp_missingperson_sabotage_servers_H_XT_desc_001=The family of ~mission(TargetName), a Citizens for Prosperity courier, has been in contact with me with the terrible news that they never arrived back home. We learned that ~mission(TargetName|First) was captured by XenoThreat while transporting some critical data. \n\nWe need you to search ~mission(Location|Address) and see if you can learn what has become of ~mission(TargetName|First) and then destroy any XenoThreat servers that may contain stolen data.\n\nThank you,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 1,500
cfp_missingperson_sabotage_servers_H_HH_desc_001=I just have received confirmation that ~mission(TargetName), a Citizens for Prosperity courier, was captured by the Headhunters while transporting some critical data. \n\nWe need you to investigate ~mission(Location|Address) to discover what happened to ~mission(TargetName|First) and then destroy any Headhunter servers that may contain stolen data.\n\nWe're counting on you,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 1,500
CFP_MissingPerson_Theft_Outpost_XT_VH_desc_001=Hey,\n\nWondering if you can help me. I’ve lost touch with a dedicated CFP volunteer named ~mission(TargetName) who was tracking down supplies taken by XenoThreat. Their last comm said they believed our stuff was being held at ~mission(Location|Address). I told them to be careful, but haven’t heard anything since.\n\nAny chance you can head out and try to locate ~mission(TargetName|First)? While there, if you spot the supplies, please bring them to ~mission(Destination|Address). I’ll give you the same warning I gave ~mission(TargetName|First), that spot is a known Xeno stronghold. Better be prepared. Would hate for you to disappear too after visiting that spot. \n\nBe Safe, \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,500
CFP_MissingPerson_Theft_XSOutpost_XT_H_desc_001=Hi,\n\nGot a tough assignment here. There’s a small, satellite outpost near ~mission(Location|Address) that needs to be investigated. I received intel that it’s housing some of our stolen supplies and sent ~mission(TargetName) to retrieve them. Haven’t heard anything from them in a while and am worried they ran into trouble.\n\nXenoThreat controls that location, but I hoped ~mission(TargetName|First) could slip in and out without getting noticed. Seems like that spot might be more heavily guarded than expected. Looking for someone to take a look and see what happened to ~mission(TargetName|First). Also, if any of our supplies are found there, I need them taken to ~mission(Destination|Address). \n\nDo you think you can give it a shot? I’m guessing that the Xenos are entrenched there. Prepare accordingly and don’t expect them to make this easy on you.  \n\nThanks, \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 800
CFP_MissingPerson_Theft_Outpost_HH_H_desc_001=Hey,\n\nI’ve been tracking Headhunters activity at ~mission(Location|Address). Recently, they stocked it with supplies we believe were stolen from one of our cargo convoys. ~mission(TargetName) offered to go get our goods back but hasn’t checked in since. Really need to know what happened to them and if our supplies are there.\n\nThink this is something you could handle? You’ll probably have to deal with Headhunters forces to get to the bottom of this. Also, any goods you grab should go to ~mission(Destination|Address) once you’re out of there.\n\nThanks, \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 800
cfp_missingperson_inv_e_criminalbase_desc_01=~mission(TargetName), a member of the Citizens for Prosperity family, vanished two standard days ago while attempting to find a buyer for some old farming equipment. CFP regrets to report that we have just discovered the wreckage of a vehicle registered under the name of the missing person in an area known to be frequented by pirates. \n\nWe found evidence at the crash site that the victim survived and is most likely being held at ~mission(Location|Address). We are offering a reward to anyone who can track down ~mission(TargetName|First) on our behalf. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100
cfp_missingperson_inv_m_criminalbase_desc_01=~mission(TargetName), a mechanic who has performed countless services for our community, was abducted by a group of outlaws three standard days ago. CFP has received a ransom comm, but we refuse to negotiate with the types of people who actively work to destroy the peace in this system. If we open that door even once, we will never be safe. \n\nThe outlaws known to have abducted ~mission(TargetName|Last)  were last seen entering ~mission(Location|Address). CFP needs someone to infiltrate the base and confirm our missing person's whereabouts.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
hh_missingperson_inv_m_criminalbase_desc_01=Last night, some no-name drifters threw down with our enforcers and ran when things got too hot. Didn't find out 'til they were long gone, but they made off with one of our Prospects when they split. Goes by the name of ~mission(TargetName). \n\nLast we saw, they were headed in the direction ~mission(Location|Address). We need someone to head there and track down our missing Prospect. \n\nIf you take any of them down while you're at it, all the better.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
cfp_missingperson_inv_chain_h_xenothreat_desc_01=An upstanding member of the Citizens for Prosperity community, Doctor ~mission(TargetName), was recently abducted by XenoThreat while distributing vital medical supplies to one of our settlements.\n\nThe kidnappers were last seen entering their base at ~mission(Location|Address), but we are uncertain whether they will remain there for long. XenoThreat maintains multiple outposts throughout this system and has been known to swap locations at a moment's notice. \n\nConsidering the danger and the distance you may have to travel, CFP is prepared to offer a substantial reward for determining what happened to Dr. ~mission(TargetName|Last).\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 400
CFP_SecurityPatrol_VE_Desc_001=We need someone with combat experience to patrol a travel lane for us. Over the years, we’ve found that it's good to get out there and make ourselves visible. Sometimes a pilot like yourself traveling through an area is enough to deter any potential outlaws. But in case you run into any that are feeling a bit more ambitious, a ship ready for combat is recommended.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD. After you’ve scanned all the waypoints and ensured that the route is secure, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 100
CFP_SecurityPatrol_E_Desc_001=We’ve noted an increase in traffic along one of the travel lanes we monitor. Chances are that we won’t be the only ones paying attention. I’d like you to head out there in a combat-ready ship and make sure there are no outlaws attempting to take advantage of this sense of security.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 100
CFP_SecurityPatrol_M_Desc_001=Outlaws have been increasing their activity along one of the more popular routes in the system and we’re hoping to provide a deterrent before the problem gets out of hand. As such, we’d like you to head out there in a combat-ready ship and deal with any hostiles you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 150
CFP_SecurityPatrol_H_Desc_001=We’ve identified a sector that’s been plagued by outlaw attacks recently and hopefully, with your help, we can change that. We’d suggest <EM4>bringing some backup</EM4> in combat-ready ships to confront any hostile forces you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 200
CFP_SecurityPatrol_VH_Desc_001=We’ve identified a sector that’s been increasingly riddled with outlaw attacks and we think that if we begin to actively patrol the area we can turn things around. We’d recommend gathering at least <EM4>two wingmen</EM4> to head out there in combat-ready ships and confront any hostile forces you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 250
CFP_SecurityPatrol_S_Desc_001=After weeks of seeing crime rates increase, we’ve been able to identify a sector that we believe to be the source of the outlaw activity that has been leeching into the surrounding areas. While it would be too much to expect to eradicate all threats, we believe that by sending combat patrols into the area we might be able to start reversing this worrisome trend. Our in-house combat analysts recommend bringing around <EM4>three wingmen</EM4> in combat-ready ships to confront any hostile forces you might encounter.\n\nOnce you’ve accepted this contract, make your way to the <EM4>location marker</EM4> on your HUD and scan the waypoints along the route. After all of them have been secured, the main contractor will get a bonus of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Reputation Awarded:</EM4> 300
CFP_RecoverCargo_Easy_Description=Life is tough on the frontier, and every delivery to our settlers is important. We really can't afford to lose any more this year.\n\nOne of our key suppliers has been hit by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and gone silent on us. I fear the worst, but if we can still recover the supplies they were transporting, it could make a huge difference.\n\nChances are the outlaws who attacked them are still lurking around there so be on your guard. Once you've dealt with them, grab the cargo and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. Make sure you're flying a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and bring a <EM4>heavy-duty tractor beam</EM4> too.\n\nFly safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Medium_Description=A Citizens for Prosperity ship has been ambushed by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and we need a skilled pilot to help them out.\n\nWe lost contact with them mid comms, but it sounded like they were taking heavy fire. It may be too late for them, but the vital supplies they were carrying could still be put to good use. Fly over there, take out any hostiles, and recover the shipment. You'll need a ship that can support <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to transport the supplies onto your ship.\n\nTake them to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll guarantee they'll be put to good use.\n\nBe safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Hard_Description=We were in the process of delivering an urgent shipment to the folks over at <EM4>~mission(Destination|Address)</EM4> when our pilot ran into a group of outlaws. They tried to run, but it was already too late.\n\nThere is silver lining though. The trackers are showing the cargo is still intact, located at <EM4>~mission(Location|Address)</EM4>. There's a good chance the outlaws are guarding it while they locate a ship big enough to transport everything. While I don't want to risk losing another pilot, the need of the cargo aboard is desperate enough that it justifies the decision to send someone to recover it.\n\nThis won't be easy, these outlaws showed our pilot no mercy. You'll need to take them out first before getting the cargo back. Bring a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> for the moving. Deliver it to the freight elevator at <EM4>~mission(Destination)</EM4>  and let's make this right.\n\nFly safe,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_VeryHard_Description=More and more CFP ships are being targeted lately, and despite our best efforts to keep our trading routes quiet, we're still losing haulers to outlaw attacks.\n\nOur pilot over at <EM4>~mission(Location|Address)</EM4> is the latest casualty. It pains me to think about how much we've lost, but as long as there are people who need our help, we have to keep on fighting.\n\nIf you have a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>, we need you to head to the above location and recover that cargo.\n\nThis won't be easy, the pilot was one of our best and wouldn't go down without a fight. Let's not underestimate these outlaws, bring a trustworthy crew and watch each other's backs.\n\nOnce you've got the cargo, deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll get it processed.\n\nGood luck and take care,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Super_Description=I wouldn't normally ask someone to do something so risky, but these are exceptional circumstances.\n\nOur pilot was transporting some vital cargo when they were targeted by a group of outlaws. Under no circumstances can we allow them to get their hands on the cargo.\n\nWith the size of the hostile force who attacked, you won't be able to do this on your own, you'll need to bring a skilled crew with you to  <EM4>~mission(Location|Address)</EM4> in order to  take out these outlaws and get the cargo back. Make sure at least one of you has a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>.\n\nIf by some miracle you can get that cargo back, take it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nIt's a lot to ask, but if you can pull this off you'll have my and the whole organizations appreciation.\n\nBest of luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 300\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RetrieveCargo_Lagrange_E_desc_001=Hi,\n\nIt appears an electrical issue caused us to lose track of a ~mission(Ship) carrying medical supplies. Thankfully, I received word that the ship was found at ~mission(Location|Address). We really need someone to get out there and recover the supplies onboard before someone else does. Those provisions are desperately needed at ~mission(Destination|Address). Any chance you could grab them and complete the delivery? \n\nMakes me nervous seeing that the ship is at a lagrange point. Lots of folks scour them for stuff like this. Would be smart to come prepared to defend yourself if someone else comes looking to steal it.\n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you.    \n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 100
CFP_RetrieveCargo_Lagrange_M_desc_001=Hey,\n\nI’m concerned a ~mission(Ship) moving medical supplies for us might’ve come under attack. The signal was lost around ~mission(Location|Address), which has seen a spike in outlaw activity recently. Losing that ship alone would be bad enough, but it’ll be even worse if those supplies don’t make it to ~mission(Destination). \n\nWe would need you to search for the ship at its last known position, recover the supplies, and then take them to ~mission(Destination|Address). Your help would make a bad situation better. \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 150
CFP_RetrieveCargo_CrimBase_M_desc_001=Hey,\n\nOutlaws used a fake distress beacon to lure one of our cargo ships into a trap and steal the supplies onboard. Thankfully, we placed trackers in the cargo containers, because the stuff is valuable mining and construction materials needed at ~mission(Destination). \n\nLooks like the goods ended up at ~mission(Location|Address). Need someone to head there, reclaim the supplies, and take them to ~mission(Destination|Address). Doubt they’ll make it easy for you, but if it helps, they didn’t show any mercy to our ship crew. Reclaiming those supplies will not only help the CFP but ensure that our crew didn’t die in vain.   \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 150
CFP_RetrieveCargo_AsteroidBase_VE_desc_001=Hi,\n\nSomeone knocked out one of our supply ships and towed it to ~mission(Location|Address). We really need the cargo onboard. You available to head over there and recover that cargo? \n\nOnce you’ve got the goods, we need them taken to their original destination at ~mission(Destination|Address). Did a little digging into this group, and let’s just say, they don’t come off as very professional. Shouldn’t give you too much resistance, but still best to show up ready to throw down.\n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nFly Safe, \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 100
CFP_RetrieveCargo_CrimBase_H_desc_001=Hey,\n\nOutlaws in the system have been getting aggressive lately, targeting more of our convoys. They recently ambushed one of our cargo ships and stole supplies desperately needed by our operations. If we don’t get it back, we’re worried that the locals will start losing faith. They need to know that Citizens for Prosperity can’t just be bullied out of operation.\n\nWe managed to track the outlaws to ~mission(Location|Address). Now we need someone who isn’t afraid of crossing these criminals to recover the shipment and deliver it to ~mission(Destination|Address). \n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nSo, do you think you could make the run for us?\n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,200
CFP_RetrieveCargo_CrimBase_XT_VH_desc_001=Hey,\n\nOne of our supply ships fell prey to a XenoThreat ambush. I’ll spare you the grisly details, but all that really remains is the cargo our people were carrying to ~mission(Destination|Address). Trackers hidden within the cargo shows that XenoThreat collected the goods and then took them to a few locations spread out across ~mission(Location|Address).\n \nWe can’t let the XenoThreat get away with what they did to our crew and keep all those goods too. That’s why we want to strike back on both fronts. We need someone who can raid that location, retrieve the stolen cargo, and teach the Xenos that there will be consequences for their horrendous actions. Can you help us fight back?\n\nAlso, to make your life easier, I'd make sure you have a <EM4>handheld tractor beam</EM4> with you. \n\nThanks,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity \n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 2,400
CFP_ShipWaveAttack_ClearHostiles_Desc_VE_001=Recently we've had incident reports of numerous Citizens for Prosperity contractors in the system having run-ins with an outlaw hunting party operating out of ~mission(Location|Address). \n\nTo help re-establish safer routes through that sector, you will be dispatched to head there and engage with these outlaws. The group is known to travel in smaller packs, so its important that you and whatever backup you bring wait in the area to deal with all of them or else there's a chance the threat will remain. \n\nThank you for helping us,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 100
CFP_ShipWaveAttack_ClearHostiles_Desc_E_001=To help protect our pilots, Citizens for Prosperity will often recommend the use of less traditional routes through the system. However, it seems that a gang of outlaws has gotten word and has begun to stage repeated ambushes along one such flightpath. Rather than just go around the problem and risk it persisting along the new route, we feel it we be prudent to meet these outlaws head on.\n\nYou and whatever support ships you enlist will head to ~mission(Location|Address) and neutralize any hostiles you find laying in wait there. They have been known to operate in smaller packs, so it's vital that you wait until all of the hostiles have been dealt with.\n\nYour assistance is much appreciated,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 100
CFP_ShipWaveAttack_ClearHostiles_Desc_M_001=It feels that whenever we start to make real progress in the system, the outlaws are there to push one step back. We had recently cleared out ~mission(Location|Address) only to learn that a new outlaw gang has taken root there, using it as a launching point for various criminal enterprises. \n\nSince we can't afford to let this rot spread, you and a few support ships are being charged with heading there to clear out all the gang's packs. After you deal with one pack, be sure to wait until all of the hostile packs have been dealt with.\n\nKnow that you are helping to make a real difference,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 150
CFP_ShipWaveAttack_ClearHostiles_Desc_H_001=A criminal fleet has taken up root in a sector that Citizens For Prosperity is trying to develop and all forward progress has stopped thanks to their violent actions. It is imperative to a long term goals that we find a way to neutralize this fleet before that cause any further damage.\n\nYou and your most trusted support ships will head to ~mission(Location|Address) and neutralize any hostiles you find laying in wait there. They have been known to operate in smaller packs, so it's vital that you wait until all of the hostiles have been dealt with.\n\nYour assistance is much appreciated,\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Reputation Awarded:</EM4> 200
