Foxwell_DefendEntitesAndEscort_H_Desc=Crew managing one of our client's operations at <EM4>~mission(Location|Address)</EM4> have reported that they're under attack from a criminal gang targeting the <EM4>~mission(Objects) and ships</EM4> in the area. It will be your job to keep both safe at all costs. I don't have all the facts yet, but I reckon this will be a tough mission – these outlaws seem determined to do some real carnage. \n\nIf it were me, I would <EM>bring backup</EM4> to deal with them. And if you manage to protect everyone, we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor who deals with these lowlife's successfully. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Reputation Awarded:</EM4> 200\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx III, Nyx I, Nyx System</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: Nyx III, Nyx II, Nyx</EM4>\n- CF-117 Bulldog Repeater\n- CF-227 Badger Repeater\n- CF-337 Panther Repeater\n- CF-447 Rhino Repeater\n- CF-557 Galdereen Repeater\n- CF-667 Mammoth Repeater\n- V60-26 (Radar)\n\n<EM4>[Regional Variants] example locations: RAB-BRAVO, RAB-TUNG, Pyro I</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBlossom (Powerplant)\n- MagnaBloom (Powerplant)\n- F