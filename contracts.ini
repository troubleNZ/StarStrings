headhunters_killship_cfp_hrt_desc_001=Need another CFP ship taken out. It belongs to ~mission(TargetName), who's been  driving locals out of their homes if they don't accept Citizens for Prosperity help. They're a real piece of work and we've been given the go-ahead to take them down.\n\nTheir ship was spotted around ~mission(Location|Address), so head out there and do the deed.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 600\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Checkmate, RAB-ALPHA, RAB-KILO</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: Rat's Nest, Orbituary Clinic, RAB-GULF</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: Pyro IV, Cluster WDH-387, Ignis</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: RAB-MAT, Ruin Station, RAB-LYNX</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
headhunters_killship_cfp_vhrt_desc_001=Got a platinum target that needs to get taken down. ~mission(TargetName) is a heavy hitter who's one of the people running security for Citizens for Prosperity. Although ~mission(TargetName|Last) might have forgotten, the Headhunters remember their work with a merc company a few years ago that lead to the deaths of five brothers and sisters. We want blood for blood.\n\nThey've been spotted poking around ~mission(Location|Address), so you should still be able to find them there.\n\nThey're a mean bastard, so bring some friends but make sure they end up dead.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 1,200\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Head Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: RAB-ROTH, Patch City, RAB-NOVEMBER</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: Starlight Clinic, RAB-BRAVO, RAB-ULTRA</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: RAB-OVER, RAB-QUAGMIRE, Ignis</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: Cluster EMM-567, RAB-LYNX, Terminus</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
headhunters_killship_xenothreat_ert_desc_001=Need you to move quick on this one. There's a XenoThreat lieutenant named ~mission(TargetName) who's popped up for air. Judge thinks this is a big chance to mess with XenoThreat's command by taking them out. I heard ~mission(TargetName|Last) was spotted flying around ~mission(Location|Address), so get there quick before they disappear again.\n\nI'd bring some support, I doubt they'll go down without a fight. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 3,200\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Elite Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Checkmate, RAB-FOXTROT, Monox</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: RAB-YORK, RAB-GULF, Bloom</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: Pyro V, RAB-QUAGMIRE, Adir</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: RAB-ULTRA, Terminus, Cluster EMM-567</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
headhunters_killship_asteroid_rank0_desc_001=So here's the deal, Headhunters are looking to expand their talent pool and have a few openings for anyone who's got the stones.\n\nThere's a real piece of work named ~mission(TargetName) who thinks they've been really clever pinching cargo off of haulers moving through the system. We asked for a cut of their profits as a licensing tax to continue operating. When ~mission(TargetName|Last) responded, they were very disrespectful.\n\nWe've tracked their ship to ~mission(Location|Address) and need them taken out. You should know, they're being smart and sticking close to some allies so they won't be alone.\n\nDo this and we'll consider you for future Headhunter work.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n<EM4>[Regional Variants] example locations: Checkmate, RAB-NOVEMBER, Cluster NBD-102</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: RAB-WHISKEY, Starlight Service Station, Cluster CAJ-445</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: Ignis, RAB-ZETA, Cluster FSN-704</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: RAB-ULTRA, Cluster HJS-232, RAB-LYNX</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
headhunters_killship_asteroid_rank1_desc_001=There's a nest that needs to be taken out around ~mission(Location|Address) that has been taken over by some squatters. We don't care about most of them, but word's gotten back to us that they're sheltering ~mission(TargetName) who has a long history of stealing Headhunter loot. Time's come to take them out.\n\nWord is that ~mission(TargetName|Last) is in a ship, but may rely on the base's defenses to protect them, so be careful. You kill 'em, you get paid. \n\nYou know, the usual.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: Patch City Clinic, RAB-BRAVO, RAB-ROTH</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: Cluster CAJ-445, Orbituary, RAB-ULTRA</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: RAB-VICTORY, Cluster YKA-011, Cluster FSN-704</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: RAB-LYNX, Ruin Clinic, Cluster MNK-833</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
headhunters_multikillship_base_Generic_M_desc_001=A lotta wannabe gangs have stepped to the Headhunters over the years thinking that they could force their way into the system. We're still here. They aren't. But it seems the survivors of these groups have decided to band together and try again. Guess some people never learn.\n\nLatest group hit a couple of our convoys while on supply runs. Shouldn't be a surprise that the Judge wants to stomp them out quick. We've learned they're out near ~mission(Location|Address) and likely rearming for another attack. \n\nWe want you to go there and make them wish they died with their old gang.\n\nStows out\n\n<EM4>Reputation Awarded:</EM4> 300\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Veteran Contractor level variants</EM4>\n<EM4>[Regional Variants] example locations: RAB-FOXTROT, Pyro I, RAB-NOVEMBER</EM4>\n- 9-Series Longsword Cannon\n- 10-Series Greatsword Cannon\n- 11-Series Broadsword Cannon\n- Sledge I Mass Driver Cannon\n- Strife Mass Driver Cannon\n- Sledge II Mass Driver Cannon\n- Sledge III Mass Driver Cannon\n\n<EM4>[Regional Variants] example locations: RAB-BRAVO, Bloom, Cluster JWY-925</EM4>\n- HeatSafe (Cooler)\n- HeatSink (Cooler)\n- Dominance-1 Scattergun\n- Dominance-2 Scattergun\n- Dominance-3 Scattergun\n\n<EM4>[Regional Variants] example locations: Adir, RAB-QUAGMIRE, RAB-SIERRA</EM4>\n- VaporBlock (Cooler)\n- IceBox (Cooler)\n- NN-13 Cannon\n- NN-14 Cannon\n- NN-15 Cannon\n\n<EM4>[Regional Variants] example locations: Terminus, Cluster HJS-232, Cluster EMM-567</EM4>\n- SnowBlind (Cooler)\n- NightFall (Cooler)\n- M6A Cannon\n- M7A Cannon\n- M8A Cannon\n- Singe Cannon (S1)\n- Singe Cannon (S2)\n- Singe Cannon (S3)\n
Headhunters_SecurityPatrol_VE_Desc_001=Headhunters want some intel on what’s happening around territory. We’ve already set up some monitoring satellites, but nothing beats a good ol’ patrol. You up for it?\n\nIf so, get on over to the <EM4>location marker</EM4> on your HUD. Start by scanning that region and then we’ll guide you to a few more spots that we want info on. \n\nAnd if you needed some extra motivation, there's a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor at the end of the job. \n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500
Headhunters_SecurityPatrol_E_Desc_001=Headhunters have been expanding, but still need help getting a lay of our new territory. I’ve got a run to check spots we want scanned ready to go. \n\nThis one kicks off at the <EM4>location marker</EM4> on your HUD and will look at a few more locations after that, but I’ll update you as we clear them out. Not expecting you to run into any trouble but no guarantees. Trouble seems to follow us.\n\nGet this done and I'll toss the main contractor <EM4>~mission(ScripAmount) Council Scrip</EM4> as a thanks.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
Headhunters_SecurityPatrol_M_Desc_001=The local Clip wants current intel on several of our sectors. Not sure what they’re looking for but I’m not about to ask. My job is to find someone willing to swing through and scan these locations. You available? \n\nAll you need to do is head to the <EM4>location marker</EM4> on your HUD, run a scan, and if it’s clear, move to the next spot. If you run into any issues, take care of it. \n\nAin’t sound too tough now does it? Plus, I'll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> as thanks. \n\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000
Headhunters_SecurityPatrol_H_Desc_001=I’ve noticed an uptick in attacks on Headhunter ships and it's got me feelin' jumpy. Got an important resupply shipment that we can’t afford to lose, and need help determining what route to send it. I’ve strung together a few potential spots that I’d set up in if I was gonna hit ‘em. Any chance you could visit and clear out any lowlifes that may be hiding there? \n\nThe route starts at the <EM4>location marker</EM4> on your HUD. After you scan it and clear whatever’s there, I’ll send you to a few other areas that could work. I’ve been hearing people have been rolling through these spots, so would be smart to <EM4>bring a friend</EM4> to watch your back.\n\nYou make it to the end and I'll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> as thanks. \n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 200 / 2,000
Headhunters_SecurityPatrol_VH_Desc_001=We’re getting pushback from folks who don’t seem happy that we’re here. Folks have gotten keen to our haunts and started sending out squads to hit our ships. You down to visit a few of those spots to show that we won’t be scared off? \n\nIf so, start by seeing what’s around the <EM4>location marker</EM4> on your HUD. From there I’ll guide you to a few other hotspots that we need checked. Better get your shit in order before heading out. I'd recommend loading up on ammo and convincing <EM4>two friends</EM4> to join the patrol.\n\nYou do this for the Headhunters and I'll see to it that the main contractor gets a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4>. \n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 250 / 8,000
Headhunters_SecurityPatrol_S_Desc_001=Got some asshole’s trying to push us out of the system. You up for pushing back?\n\nSee, there are some folks who really don’t want us here, and have started sending out hunting parties of five to seven ships, often with a bigger gun ship, to places where we’re building up our presence. Time for us to show that we’re here to stay.  \n\nI’ve strung together a few spots starting at the <EM4>location marker</EM4> on your HUD where we’re seeing the most hostile encounters. Need you to visit each one and scan to see if we can bait them into a fight.\n\nKnow this is going to be a hard one, so don't be cocky and try to go it alone. If I were you, I'd bring at least <EM4>three friends</EM4> onboard for support. To make it worth your while, I'm promising a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> to the main contractor that pulls it off. \n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 300 / 16,000
HeadHunters_RecoverCargo_VeryEasy_Description=Just got word of an abandoned ship with a fat stack of cargo ripe for the pluckin’. If you’re interested, you’ll need to head to <EM4>~mission(Location|Address)</EM4>. Word might have gotten around, so there’s probably some skags hanging around, but just ghost them and get the stash.\n\nBring the cargo to the freight elevator at ~mission(Destination|Address) and I’ll get you your creds.\n\nMake sure you got a <EM4>heavy-duty tractor beam</EM4> on you too, no idea how big or small that cargo is.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50
HeadHunters_RecoverCargo_Easy_Description=Managed to intercept a ship carrying some goods over at <EM4>~mission(Location|Address)</EM4> but we hit a snag - our guys didn’t have enough space in their ships to store it. You wanna make some quick creds? Head over there and grab the stuff. Could be a few scavs there by now so be on your guard.\n\nJust don’t forget to bring a <EM4>heavy-duty tractor beam</EM4> as that shit’s heavy.\n\nWhen you’re done, drop it off at the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we’ll take care of the rest.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 100
HeadHunters_RecoverCargo_Medium_Description=One of our pilots was supposed to bring a shipment back to us, but seems like he got into some trouble over at <EM4>~mission(Location|Address)</EM4>. Either he got his brains blasted all over the cockpit, or freaked out and ditched his ship. For his sake, I hope it’s the first one so I don’t have the hunt this asshole down. What’s important right now is that our cargo’s just sitting out there.\n\nIf you’ve got a <EM4>heavy-duty tractor beam</EM4> and a decent ship, can you head over there and get our stuff? Chances are the assholes who attacked my pilot are still there, and I’m betting they’re pretty tough.\n\nIf you get out alive, take the cargo to the freight elevator at ~mission(Destination|Address) and I’ll get you paid.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 150
HeadHunters_RecoverCargo_Hard_Description=Looking for a hauler to pick up some cargo for me. Thing is, there’s a catch.\n\nThe cargo’s in the back of an abandoned ship located at <EM4>~mission(Location|Address)</EM4>. As you may have figured, this ain’t our cargo, but it sure as hell doesn’t deserve to go to anyone else. I’ll be damned if those CFP assholes get their hands on it before we do.\n\nBe lucky as hell if we were the first to know about this, but I’d wager there’s gonna be more ships swarming around there than flies on a kopion carcass. If you got some pals you can trust, bring them along and ghost those assholes. And don’t forget your <EM4>heavy-duty tractor beam</EM4> of course.\n\nYou manage to get that cargo and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>, I can get you a nice cut of the sale.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 200
HeadHunters_RecoverCargo_VeryHard_Description=Here’s the thing, I got a situation over at <EM4>~mission(Location|Address)</EM4> and need someone with a brain between their ears to sort it out for me. Former pilot of mine thought he could cut a deal with another gang and unsurprisingly it didn’t work out for him. Now my cargo is sitting idle and being guarded by a whole bunch of nullbrains waiting for their hauler to come pick it up.\n\nNeed you to head there with a <EM4>heavy-duty tractor beam</EM4> and a strong crew to get my shit back before its gone for good.\n\nTake it all to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I’ll give you a generous cut of the takings.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
HeadHunters_RecoverCargo_Super_Description=This’ll be a fun one for you. We just got word that a transport ship has broken down at <EM4>~mission(Location|Address)</EM4>. Only problem is, every skag and their mother seems to know about it. Place is crawling with all kinds of outlaws trying to get their hands on the cargo onboard. That’s where you come in.\n\nIf you can get your best pilots together and <EM4>a heavy-duty tractor beam</EM4> you can take out the competition and snag the cargo. It ain’t gonna be easy though. One of my scouts said the assholes guarding this ship have got some serious tech on them.  \n\nI’ve already got a buyer waiting, you just need to take the cargo to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I’ll send you the creds.\n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 300
Headhunters_RetrieveCargo_Intro_desc_001=Heahunters are on the lookout for motivated and competent contractors who can be trusted to do a wide range of work supporting our operations. If you think you have what it takes, I’ve got a mission here that’ll test your skills in several ways. \n\nA ~mission(Ship) transporting cargo for us is currently under attack at ~mission(Location|Address). Don’t think it’s looking good for our ship, but that cargo is too important to let fall into someone else’s hands. Need you to head to the location and deal with the attackers before they get away, then collect our cargo and take it to ~mission(Destination|Address). \n\nIf you can handle this, then there'll be lots more work I can send your way.  \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 25
Headhunters_RetrieveCargo_RegionLink_E_desc_001=Not sure what happened, but a ship moving some important supplies across the system disappeared around ~mission(Location|Address). Our crew at ~mission(Destination|Address) really needs that cargo for an upcoming operation. Any chance you could go looking for the ship and help complete the delivery?\n\nHave no idea what happened, but my bet’s that they got ghosted. Maybe it’s just me, but I’d rather be a prepared pessimist and an ill-equipped optimist. \n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 150
Headhunters_RetrieveCargo_Lagrange_E_desc_001=Someone with a death wish attacked one of our ships hauling some primo product. Our crew on the scene is outta commission, so we need someone to get there fast and recover the stash before those bozos make off with it. Any chance you can handle this for us?  \n  \nLooks like the attack went down at ~mission(Location|Address). Head over there and deal with the attackers before they get away. Then grab the goods from the ~mission(Ship) and take ‘em to ~mission(Destination|Address). Oh, and don’t be an idiot and get high on that supply, unless you want me to send someone after you next. \n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 25
Headhunters_RetrieveCargo_Lagrange_E_desc_002=Just lost contact with a ~mission(Ship) on an important run. Before they went dark, the crew was convinced someone was following them, so I’d put money on them being under attack. \n\nLooking for someone to get their ass over to ~mission(Location|Address) to search for the ship and retrieve the goods. If I’m right, there will be some uninvited guests hanging around that will need to be dealt with too. Once you’ve secured the stuff, it needs to go to ~mission(Destination|Address).   \n\nYou down to crack a few skulls and lug some cargo. Sounds simple enough, right? \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 150
Headhunters_RetrieveCargo_CrimBase_E_desc_001=Just got a frantic comm from a ~mission(Ship) that cut out quite dramatically. Seems like they were dumb enough to get lured into a trap, even though I made it damn clear that getting those goods to ~mission(Destination|Address) was all they should worry about.   \n \nWell, it looks like they failed. Trackers hidden in the cargo now show it at ~mission(Location|Address). Time to send in backup to reclaim our goods and teach a lesson to those who took it. You interested in delivering that message then delivering the goods?\n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 150
Headhunters_RetrieveCargo_CrimBase_H_desc_001=Need someone to raid a base at ~mission(Location|Address) for us. Not sure exactly who’s dug in there, but they attacked one of our ships and took the drugs they were hauling. Really need that shit back. That batch is full of high potency stuff that’s worth a premium. \n\nDoubt they’ll want to give it back to you, so plan to take it by force. Then bring the goods to ~mission(Destination|Address). And don’t act like an idiot and get any ideas of what you could do with that stuff. Trust me, you don’t wanna get on my bad side. \n\n- Stows\n\n<EM4>Reputation Awarded:</EM4> 1,200
Headhunters_RetrieveCargo_CrimBase_XT_VH_desc_001=An informant passed along some interesting news. XenoThreat are about to do a massive ammo resupply run for their forces, and in preparation, they’ve brought all that cargo to ~mission(Location|Address). Seems like a prime time to strike. You interested in killing a bunch of Xenos and then stealing their ammo for us?    \n\nIf so, get your shit in order and then clear that base. Once done, grab all the ammo and bring it to ~mission(Destination|Address). You’ll get paid well, and I’m sure we’ll find something fun to do with all that ammo. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 2,400
HeadHunters_ShipAmbush_Intro_desc_001=Got an opportunity for someone eager to show off their flying skills. Headhunters have been running afoul of this numbrain flying a<EM4>~mission(AmbushTarget)</EM4> and we’re gonna put a stop to it once and for all.\n\nYou’re gonna help us set a trap for them. See, there’s an <EM4>emission cloud</EM4> near <EM4>~mission(Location|Address)</EM4> that they fly by frequently. \n\nHead there, hide inside the cloud by powering down your ship, and attack the asshole as soon as you see ‘em and other single-seaters dumb enough to fly with them. It’ll be all you for that first hit, but we’ll put some support ships nearby to help finish the job. \n\nAnd in honor of this being your first surprise attack for us, there's a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor at the end of the job. \n\nStows out.\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500
HeadHunters_ShipAmbush_VE_desc_001=Some numskull flying a <EM4>~mission(AmbushTarget)</EM4> was caught spying on our ops. We ran ‘em off with a warning only to spot ‘em doing the same shit someplace else. Since they didn’t get the message, seems we gotta send a stronger one.    \n\nThere’s an emission cloud near <EM4>~mission(Location|Address)</EM4> that they fly by frequently. Primo place to power down, hide, and launch a surprise attack. Sometimes they fly solo, sometimes there’s other single-seaters with them. It’ll be all you for that first hit, but we’ll put some support ships nearby to help finish the job. \n\nAnd if you needed some extra motivation, there's a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor at the end of the job. \n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500
HeadHunters_ShipAmbush_E_desc_001=Any interest in taking out a <EM4>~mission(AmbushTarget)</EM4> for us? \n\nShouldn’t be too much trouble. We’ve already done the legwork and figured out that they're scheduled to pass by <EM4>~mission(Location|Address)</EM4> soon. Just go dark in the nearby emission cloud and you’ll get a good jump on ‘em.  \n\nThey might roll through solo or with some friends. All would be single-seaters but they can hold their own in a dogfight. We’ll drop some forces in the region who can provide support once the fun starts.\n\nYou pull this off and I'll toss <EM4>~mission(ScripAmount) Council Scrip</EM4> to the main contractor for a job well done.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
HeadHunters_ShipAmbush_M_desc_001=One of our Clips put out a kill order on a <EM4>~mission(AmbushTarget)</EM4>. Feel like making ‘em happy by taking it out?\n\nHere’s what you need to know. The target and their escort are scheduled to pass by <EM4>~mission(Location|Address)</EM4>. Looks like there’s an emission cloud nearby that can hide your ship’s sig. Wait there until you’re ready to strike. \n\nThe Clip only cares about wiping out the target. Anything of value you find floating in the wreckage is all yours. \n\nAnd on top of that, I'll give the main contractor a bonus <EM4>~mission(ScripAmount)</EM4> Council Scrip to sweeten the pot. \n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000
HeadHunters_ShipAmbush_H_desc_001=A squad of ships recently shanked one of our convoys, and ten credits says they’re gonna try and do it again. Looking for someone to launch a reprisal attack before that can happen.  \n\nWe’ve ID’d the idiots as consisting of several large craft and a sizable escort. We believe the leader is flying a <EM4>~mission(AmbushTarget)</EM4> and set that ship as the primary target. Since it’s a sizable and aggressive squad, a surprise attack seems like a smart play. They often pass by <EM4>~mission(Location|Address)</EM4>, which has an emission cloud to hide in. Be smart and patient then strike when the time is right. \n\nUnless you fancy yourself a real ace, it’s probably best to bring some friends. Maybe you can entice folks by letting them know they can pick through the wreckage for valuables once the deed is done.\n\nAnd on top of that, I'll give the main contractor a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4> to sweeten the pot.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 200 / 2,000
HeadHunters_ShipAmbush_VH_desc_001=Some folks don’t seem happy with us. Got word that several sub-capital ships and a number of escorts are targeting our ops. Figured the best way to keep ‘em from causing us trouble is to hit them before they hit us. \n\nWe got eyes on a <EM4>~mission(AmbushTarget)</EM4> that’s part of this squad, and it looks like they regularly pass by <EM4>~mission(Location|Address)</EM4>, a spot tailor made for a surprise attack. A nearby emission cloud can hide you and anyone you bring along for muscle.\n\nNo sugarcoating it. This ain’t gonna be easy. But the payoff should make it worth your while. Finish the job and the main contractor gets a bonus <EM4>~mission(ScripAmount) Council Scrip</EM4>. \n\nPlus, who knows what kinda good stuff you’ll find floating in all that wreckage.\n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 250 / 8,000
HeadHunters_ShipAmbush_S_desc_001=Headhunters are looking for someone with the skills and crew to execute an elite op. A military frigate and escort ships are stalking one of our Clips around the system. Don’t know their intentions but it can’t be good. Figure while they’ve got their eyes focused on their prize, we get someone to gather a crew to hit ‘em.  \n\nAlready got a spot picked out. If you get to <EM4>~mission(Location|Address)</EM4> there’s an emission cloud that’s exactly what we need. Head there with friends, power down your ships, and wait for the <EM4>~mission(AmbushTarget)</EM4> and its escorts to pass by. \n\nWith a bonus of <EM4>~mission(ScripAmount) Council Scrip</EM4> for the main contractor, payment alone should make this worth your while, but you can also keep anything you scrounge from the wreckage.\n\n- Stows\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 300 / 16,000
Headhunters_Delivery_Outpost_desc_001=Got a box sitting at <EM4>~mission(Location|Address)</EM4> that needs to make its way over to <EM4>~mission(Destination|Address)</EM4>. Any chance you can knock this out real quick?\n\nMight be the easiest gig I’ve ever assigned out. Only real threat would be tripping over your own feet. A <EM4>handheld tractor beam</EM4> would also be smart to bring along. \n\nStows out.\n\n<EM4>Reputation Awarded:</EM4> 50
Headhunters_Delivery_Outpost_Multi_desc_001=Got a bunch of boxes sitting at <EM4>~mission(Location|Address)</EM4> that have to be moved to <EM4>~mission(Destination|Address)</EM4>. Seems easy enough, right? Well, guess it ain’t. \n\nThe idiot who was supposed to move these things threw out his back trying to carry all of ‘em at once. So, you know, maybe bring a <EM4> handheld tractor beam</EM4> and try taking ‘em one at a time like a normal person. But, hey, don’t let me tell you how to do your job. Just get it done. \n\nStows out.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 200 / 400 / 800
vaughn_assassination_VE_desc_intro=Firstly, allow me to introduce myself. To put it rather dramatically, I deal in lives. \n\nPeople hire me when some soul needs to be extinguished, and I in return employ the perfect person to serve as the extinguishant. This provides security to all parties involved as none know the identity of the other. An ideal situation as far as these things go.\n\nI was recently made aware that you may possess skills that would make you of service to me and decided that it would be worthwhile to pursue the validity of this claim. \n \nIf you have any interest in forging a working relationship, I will need a demonstration of said skills. \n\nSeek out and discreetly kill ~mission(TargetName) over at ~mission(Location|Address).\n\nDo so successfully and you will be rewarded. Not only that, but you will have proven yourself worthy of further consideration.\n\nSincerely,\nVaughn\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500
vaughn_assassination_VE_desc_rehire=It is not often in life that we get another chance to make a first impression, but I am going to provide to you with just that.\n\nTo say I was disappointed in how things last transpired on your last assassination attempt would be a severe understatement. However, here is your chance to prove yourself capable of more. \n\nKill ~mission(TargetName) over at ~mission(Location|Address) and I will consider the slate wiped clean. \n\nSincerely,\nVaughn\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 500
vaughn_assassination_description_VE=~mission(Contractor|BountyDescriptionVeryEasy)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 500
vaughn_assassination_description_E=~mission(Contractor|BountyDescriptionEasy)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 1,000
vaughn_assassination_description_M=~mission(Contractor|BountyDescriptionMedium)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 150 / 2,000
vaughn_assassination_description_H=~mission(Contractor|BountyDescriptionHard)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 200 / 4,000
vaughn_assassination_description_VH=~mission(Contractor|BountyDescriptionVeryHard)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200 / 8,000
vaughn_assassination_description_S=~mission(Contractor|BountyDescriptionSuper)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 300 / 16,000
vaughn_assassination_FPS_UGF_legal_desc_001=A security officer by the name of ~mission(TargetName) is in desperate need of an early retirement. They are currently stationed at ~mission(Location|Address) along with a host of other eager types in uniforms. \n\nFeel free to indulge your violent whims, but it is only the death of ~mission(TargetName) which will earn you my credit and thanks.\n\nEarnestly,\nVaughn\n\n\n<EM4>Reputation Awarded:</EM4> 500
vaughn_assassination_FPS_UGF_illegal_desc_001=They say there is no honor among thieves. Today, it seems, you're targeting one of your own. \n\nPlease head to ~mission(Location|Address) and kill ~mission(TargetName). What you do with the others there is entirely up to you.\n\nEarnestly,\nVaughn\n\n\n<EM4>Reputation Awarded:</EM4> 1,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Low Level Assassin level variants</EM4>\n- Killshot Rifle\n- Deadrig Shotgun\n- Overlord Arms Supernova\n- Overlord Core Supernova\n- Overlord Legs Supernova\n- Overlord Helmet Supernova\n- Piecemeal Armor Arms\n- Piecemeal Armor Core\n- Piecemeal Armor Legs\n- Badami Helmet\n- Killshot Rifle Magazine (45 Cap)\n- Deadrig Shotgun Magazine (8 cap)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Power_desc_001=A request has made its way to my desk regarding the untimely end of one ~mission(TargetName), a member of the Claw Salamander who is currently scuttling around an old QV Breaker Station. \n\nIt is highly likely that you will find them at ~mission(Location|Address).  Be mindful though that with a station this large it may take a bit of searching to track them down. \n\nHope you enjoy your time in Nyx,\nVaughn\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Maintenance_desc_001=I've been having a hard time tracking this target down. They're part of a gang known as the Claw Salamanders who tend to be quite itinerate. However, it seems the group has been trying to get an old QV Breaker Station operational again and I think this just may be the chance to take out ~mission(TargetName) once and for all. \n\nStart your search at ~mission(Location|Address).  These stations can apparently be quiet cavernous at  times so it may take a bit of effort to locate the target once you're on site.\n\nHowever, I have all the confidence in your abilities,\nVaughn\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Vaughn_EliminateSpecific_FPS_Rockcracker_Warehouse_desc_001=There is a member of the Nyx gang the Claw Salamanders, ~mission(TargetName), who has made it on to my naughty list. They had been on the run for quite awhile, but just recently popped back up at an old mining station in the Keeger Belt. Our lucky day shall be their last.  \n\nWord is that you can find them at ~mission(Location|Address).  Unfortunately, there is a strong chance you may have to do some repairs to the station itself before you can gain access to that particular area.\n\nBut I'm sure you're more than up to the challenge.\n\nSincerely,\nVaughn\n\n<EM4>Reputation Awarded:</EM4> 150\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
vaughn_assassination_FPS_UGF_legal_boss_desc_001=A senior security official by the name of ~mission(TargetName) is about to have their long career come to a very violent and sudden end. While they are currently at ~mission(Location|Address), they will not be easy to get to. I fear that a bit of work will be required to draw them out.  \n\nI recommend killing enough of their underlings that they will be forced to face you personally. Of course, once they do decide to finally show their face, it should be a rather straightforward matter. \n\nEarnestly,\nVaughn\n\n\n<EM4>Reputation Awarded:</EM4> 4,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from High Value Assassin level variants</EM4>\n- Pulverizer LMG\n- Tripledown Pistol\n- Citadel Arms Base\n- Citadel Legs Base\n- Citadel Core Base\n- Fortifier Helmet Base\n- Carnifex Armor Core\n- Carnifex Armor Legs\n- Pulverizer LMG Magazine (120 Cap)\n- Tripledown Pistol Magazine (12 Cap)\n
vaughn_assassination_FPS_UGF_illegal_boss_desc_001=I am not sure if you’re acquainted with ~mission(Location|Address), but ~mission(TargetName) is the one who calls the shots there. I need them eliminated.\n\nThat is easier said then done, I'm afraid. They are notoriously reluctant to see to matters personally, preferring their underlings to handle the dirty work. That said, eliminate enough of the underlings and they will have no choice but to deal with you themselves.\n\nEarnestly,\nVaughn\n\n\n<EM4>Reputation Awarded:</EM4> 8,000\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Elite Assassin level variants</EM4>\n- Pulverizer LMG\n- Tripledown Pistol\n- Citadel Arms Base\n- Citadel Legs Base\n- Citadel Core Base\n- Fortifier Helmet Base\n- Carnifex Armor Core\n- Carnifex Armor Legs\n- Pulverizer LMG Magazine (120 Cap)\n- Tripledown Pistol Magazine (12 Cap)\n
SalvageContractor_Difficulty_Hard=Be aware that due to the size of the Claim, a <EM4>Large Salvage Ship is recommended</EM4>.\n\n<EM4>Reputation Awarded:</EM4> 200
Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About us <\nAs the leading procurer and distributor of salvage rights, Adagio Holdings are now looking to expand into the acquisition and distribution of salvageable materials to both small and large-scale businesses.\n\n> About the job <\nAs a part of this initiative, we need keen-eyed contractors capable of identifying salvageable materials, efficiently stripping them, and delivering the Recycle Material Composite (RMC) and salvaged components to us.\n\nThis introductory contract will require you to head to <EM4>~mission(Location|Address)</EM4> and strip an abandoned ship approved for salvage.\n\nOnce you've gathered the RMC, you'll deliver it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n> Requirements <\n     - Any class/size of salvage ship\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Trawler Scraper Module (Salvage Mod)\n- Abrade Scraper Module (Salvage Mod)\n- Cinch Scraper Module (Salvage Mod)\n
Adagio_Industrial_Component_Salvage_Universal_E_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent order, we are seeking contractors to help source Recycled Material Composite (RMC) and components by stripping abandoned ships and removing the requested parts by hand with a <EM4>tractor beam</EM4>. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100
Adagio_Industrial_Component_Salvage_Stanton_E_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent special order, we are seeking contractors to help source Recycled Material Composite (RMC) and components by stripping abandoned ships and removing the requested parts by hand with a <EM4>tractor beam</EM4>. \n\nWe recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager. This request probably won't be as easy to satisfy as our normal contracts, even with the amount of ships buzzing through a system as populated as Stanton, so don't be surprised if you have to put a bit more effort into hunting down what's needed.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100
Adagio_Industrial_Component_Salvage_Pyro_E_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent special order, we are seeking contractors to help source Recycled Material Composite (RMC) and components by stripping abandoned ships and removing the requested parts by hand with a <EM4>tractor beam</EM4>. \n\nWe recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager. This request probably won't be as easy to satisfy as our normal contracts, partly in thanks to how many outlaws are flying around in Pyro and partly because this request isn't for your average everyday component. But lucky for you, the extra effort will be rewarded.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100
Adagio_Industrial_Component_Salvage_Levski_E_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent special order, we are seeking contractors to help source Recycled Material Composite (RMC) and components by stripping abandoned ships and removing the requested parts by hand with a <EM4>tractor beam</EM4>. \n\nWe recommend searching for wreckage at Lagrange points, maybe in one of Nyx's asteroid belts, or you could purchase a salvage claim from us in your Contract Manager. We advise extra caution since there have been Vanduul sightings in the system, especially with how long it might take for you to track down this specific order.  \n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100
Adagio_Industrial_Salvage_Universal_E_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent small-scale order, we are seeking contractors to help source Recycled Material Composite (RMC) by  stripping abandoned ships. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Trawler Scraper Module (Salvage Mod)\n- Abrade Scraper Module (Salvage Mod)\n- Cinch Scraper Module (Salvage Mod)\n
Adagio_Industrial_Salvage_Universal_E_Desc_002=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent small-scale order, we are seeking contractors to help source Recycled Material Composite (RMC) and Construction Materials by stripping and fracturing abandoned ships. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Trawler Scraper Module (Salvage Mod)\n- Abrade Scraper Module (Salvage Mod)\n- Cinch Scraper Module (Salvage Mod)\n
Adagio_Industrial_Salvage_Universal_M_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent average-sized order, we are seeking contractors to help source Recycled Material Composite (RMC) by stripping abandoned ships. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Trawler Scraper Module (Salvage Mod)\n- Abrade Scraper Module (Salvage Mod)\n- Cinch Scraper Module (Salvage Mod)\n
Adagio_Industrial_Component_Salvage_Universal_M_Desc_001=Adagio Holdings\nA Proud Equal Opportunity Employer\n\n> About the job <\nTo help satisfy a recent order,we are seeking contractors to help source Recycled Material Composite (RMC), unrefined Construction Materials (Rubble, Pieces, or Salvage), and components by stripping and fracturing abandoned ships; removing the requested parts by hand with a <EM4>tractor beam</EM4>. We recommend searching for wreckage at Lagrange points or you could purchase a salvage claim from us in your Contract Manager.\n\nOnce acquired, deliver the materials to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nFor advice on salvaging, consult <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n     - A handheld tractor beam\n\n> Disclaimer <\nContractors are responsible for ensuring that they are collecting materials from vehicles that are considered fair salvage under the pursuant UEE laws. Adagio Holdings is in no way liable for any crimes or misdemeanors committed by contractors and will offer no compensation or reparation for any persons affected by these actions.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Trawler Scraper Module (Salvage Mod)\n- Abrade Scraper Module (Salvage Mod)\n- Cinch Scraper Module (Salvage Mod)\n
