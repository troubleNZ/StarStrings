Shubin_Industrial_HandMining_Stanton_VH_Solar_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTERMS*: \nShubin Interstellar is currently looking to fulfil another purchase order for rare materials. We appreciate your help in this matter.\n\nThere are only a few known locations where these materials can be sourced, mainly from now defunct Hathor Group sites on <EM4>Daymar and Aberdeen</EM4>. Our suggestion would be to head to the Platform Alignment Facilities (PAF) and attempt to reactivate their Orbital Laser Platform (OLP) to access the materials below the planet's surface.\n\nReminder, since this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nOnce you’re ready to sell us the required materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n\n<EM4>Potential Blueprints</EM4>\n- Arclight "Midnight" Pistol\n- Strata Arms\n- Strata Core\n- Strata Legs\n- Strata Helmet Shooting Star\n- Arclight Pistol Battery (30 cap)\n
