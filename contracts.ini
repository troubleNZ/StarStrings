bhg_bounty_desc_Rockcracker_Power_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Nyx\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: Claw Salamanders\nNOTES: These old, abandoned QV Breaker Stations should be approached with caution. Not only are they are in a state of significant disrepair, but they are frequently inhabited by dangerous fauna and outlaws, like the target's associate gang members.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_VLRT_desc_001=It seems one of the routes that we had thought relatively safe has proven otherwise. Outlaws have attacked one of our pilots over at ~mission(Location|Address) and they won't make it much longer without support. \n\nI'd appreciate it if you could fly there as quickly as possible and help them deal with these attackers.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_LRT_desc_001=One of our pilots had just picked up a shipment of supplies near ~mission(Location|Address) when they were attacked by some vicious shipjackers. \n\nWe just received their distress beacon and I'm hoping you can go provide them combat support.\n\nAny assistance you could give would make all the difference.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_MRT_desc_001=A Citizens for Prosperity affiliated ship was attempting to deliver some supplies to ~mission(Location|Address) when they were attacked by the recipients who didn't want to pay for their purchase and chose violence instead.\n\nI'll instruct our traders to be more careful about who they deal with in the future, but for now, I would really appreciate you lending them a hand in fighting off these attackers. \n\nAppreciated,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Nyx Only)</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_HRT_desc_001=We just received word that a convoy of Citizen for Prosperity affiliated ships have been targeted by outlaws and that our people are in dire need of assistance. \n\nIf you are available, we need combat ready pilots at ~mission(Location|Address) to defend our people. Note that at this dire time, we cannot afford even a single lost ship and expect with your assistance for all of our people make it out alive.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_VHRT_desc_001=A Citizens for Prosperity convoy on a resupply run dropped a distress beacon near <EM4>~mission(Location|Address)</EM4>. They’re not answering any comms, so I assume the situation is serious. That convoy has some skilled pilots, so if they’re not responding then they definitely need the help.\n\nWe’ll compensate you to support that convoy.  \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_defendship_multi_SRT_desc_001=I’m getting reports that a Citizens for Prosperity convoy carrying vital supplies is currently under attack at <EM4>~mission(Location|Address)</EM4>. It’d be a big blow to our operations if we lost that cargo. \n\nIf you’ve got the combat skills to go up against highly aggressive hostiles, we’re more than willing to pay for your help. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
cfp_sabotage_servers_M_HH_desc_001=The Headhunters recently attacked one of our transports and were sadly able to get their hands on some secure data. Although the encryption on it is strong, its only a matter of time before they'll be able to access it.\n\nBefore that happens, we need you to go to ~mission(Location|Address) and destroy all traces of the information from their servers.\n\nYou'd really be helping Citizens for Prosperity out if you can pull this off.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-ROTH, Pyro I, Patch City Clinic</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Vuur, RAB-HELIO, Cluster DLO-486</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_generators_M_desc_001=We have gotten word that the outlaws at ~mission(Location|Address) have begun recruiting with the hopes of launching a raid against Citizens for Prosperity. \n\nIn order to deescalate the situation before it gets out of hand, we would like you to disable their power generators and halt their expansion. \n\nPull this off and it could save a lot of lives.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_VH_desc_001=Citizens for Prosperity have been monitoring a very dangerous outlaw group at ~mission(Location|Address) and we believe that they are in midst of planning a major attack which could throw the whole system into upheaval.\n\nIn order to protect all the progress we've made here, we would like you to raid their compound and destroy all the servers housing their plans. \n\nThis should at least provide us with enough of a reprieve for them to reconsider their offensive.\n\nThank you,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_servers_H_XT_desc_001=We got a bit of a problem that I'm hoping you can solve for me. One of our informers has revealed that XenoThreat has been amassing data on Citizens for Prosperity operations throughout the system. \n\nThis information, if used correctly, could put our people at serious risk. The best solution is for you to completely destroy the servers where the data is being stored at ~mission(Location|Address).\n\nWith their trove of information wiped out, it should give our people a fighting chance.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-CHARLIE, Cluster BGR-560, Orbituary</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: Cluster LHB-976, Ruin Station, Cluster EMM-567</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_generators_VE_desc_001=Following a series of raids against Citizens for Prosperity aligned settlements, we believe we have traced those responsible back to ~mission(Location|Address).\n\nAttacking them directly will pose too great of a risk and most likely encourage aggressive reprisals. Instead, we believe that if their power generators were to be disable it could force them to settle somewhere else.\n\nDo you think you could handle it for us?\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-ALPHA, Checkmate Clinic, RAB-TUNG</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: RAB-ULTRA, RAB-SIERRA, Ignis</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_bombingrun_E_desc_001=We've been having escalating issues with the outlaws at ~mission(Location|Address) and can no longer stand by and watch as their aggressive actions hurt our community. \n\nWe are wary of launching a full scale assault, but believe that if their fuel stores are wiped out, it would deter them from further hostile actions. \n\nIf you're able, I'd appreciate you handling the destruction of the fuel personally. A ship capable of launching missiles would probably make the most sense, but I leave that up to you.\n\nThanks,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-YORK, Starlight Service Station, Checkmate</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n\n<EM4>[Regional Variants] example locations: RAB-LYNX, Gaslight, Cluster GRP-839</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_sabotage_servers_VH_XT_desc_001=One of the Citizens for Prosperity members who have been serving as a XenoThreat informer has let us know that the data servers located at ~mission(Location|Address) our housing a trove of information vital to the gang's operation. \n\nIf you were able to destroy these servers on our behalf it would be a huge win for the security of the entire system.\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- FS-9 LMG\n- BR-2 Shotgun\n- Gallant Rifle\n- ADP Arms Woodland\n- ADP Core\n- ADP Legs Woodland\n- Balor HCH Helmet\n- ADP-mk4 Arms Woodland\n- ADP-mk4 Legs Woodland\n- ADP-mk4 Core Woodland\n- ADP-mk4 Helmet Woodland\n- FS-9 Magazine (75 cap)\n- BR-2 Shotgun Magazine (12 cap)\n- Gallant Rifle Battery (45 cap)\n
cfp_sabotage_server_elimiatespecific_HH_desc_001=We're just putting the full picture together now, but so far we've learned that a Headhunter by the name of ~mission(TargetName) recently stole some sensitive data that if exposed will be detrimental to Citizens for Prosperity's cause. \n\nWe need to ensure that all traces of the stolen data are eradicated. This means taking out all the Headhunter servers at ~mission(Location|Address) as well as tracking down ~mission(TargetName|Last) to stop them from further disseminating the information.\n\nYour help is much appreciated,\n \nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P6-LR Sniper Rifle\n- A03 Sniper Rifle\n- CBH-3 Helmet Base\n- PAB-1 Arms Woodland\n- PAB-1 Core Woodland\n- PAB-1 Legs Woodland\n- TrueDef-Pro Arms Base\n- TrueDef-Pro Core Base\n- Argus Helmet Base\n- TrueDef-Pro Legs Base\n- A03 Sniper Rifle Magazine (15 cap)\n- P6-LR Magazine (8 cap)\n
cfp_defend_cave_Generic_desc_001=We received a distress call from ~mission(Location|Address) saying that they're being robbed by a small group of outlaws. ~mission(Location|CaveSize) Though remote, this outpost is a crucial piece of CFP's infrastructure in the area so we need to take it back.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-criminals_desc_001=We learned that ~mission(Location|Address) is under threat of attack by outlaws and has asked for assistance. We need someone to protect them and drive away the outlaws. \n\nMake sure you stay close after their initial attack. Too often, outlaws win fights just by sending more bodies than anyone can reasonably defend against, so make sure you fight off any reinforcements before leaving the area. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-WHISKEY, RAB-MAT, Starlight Service Station</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n\n<EM4>outpost_regionab</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend_regionshift_desc_001=We've received a distress call from ~mission(Location|Address). A group of unknown assailants have launched an attack. There have been multiple deaths reported and we need to reclaim the outpost.\n\nI know this is far from your current position, but we're desperate to secure the area and get the outpost back and running again.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: RAB-ION, Ruin Clinic, RAB-MAT</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: RAB-ULTRA, Monox, Rat's Nest Clinic</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: RAB-HELIO, Cluster GRP-839, Cluster RSC-340</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_hh_E_desc_001=Citizens for Prosperity is looking for security personnel to take a former CFP outpost that's currently serving as a hideout for Headhunters to launch attacks throughout the system. \n\nLocated near ~mission(Location|Address), reclaiming this outpost will allow CFP to provide greater support to local efforts to build stability.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_XT_E_desc_001=Despite our efforts to promote non-violence, local outlaw groups continue to attack our organization. XenoThreat recently assaulted ~mission(Location|Address) and chased out our volunteers that had been working there.\n\nWe're looking to enlist combat personnel to retake the outpost. Ideally we could work something out to encourage them to move on, but XenoThreat quickly resorts to violence to solve all their issues so there will undoubtedly be a fight.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_hh_M_desc_001=We received an emergency comm from ~mission(Location|Address) reporting that they are currently under attack by a group of Headhunters. We know our presence in the system has upset the Headhunters, but it hardly excuses this unprovoked attack.\n\nIf available, please gather your gear and head out. Just understand that Headhunters are experienced fighters and will not back down easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Cluster FSN-704, RAB-ECHO, Cluster RSC-340</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n\n<EM4>[Regional Variants] example locations: RAB-MAT, RAB-ION, Ruin Station</EM4>\n- Karna "Rager" Rifle\n- Artimex Core Wildwood\n- Artimex Arms Wildwood\n- Artimex Legs Wildwood\n- Artimex Helmet Wildwood\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_XT_M_desc_001=XenoThreat forces launched an unprovoked attack near ~mission(Location|Address). We're looking for any available combat operators to go and provide support. \n\nIf you haven't dealt with them before, it's important to know that XenoThreat are trained fighters so this will not be an easy fight, but it's a necessary one.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints (Pyro IV/V Area Only)</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_eliminateall_fromCFP_Gen_E_desc_001=Citizens for Prosperity is looking for any available combat operators to ~mission(Location|Address). A group of outlaws have launched an unprovoked attack and our security personnel are desperately in need of support.\n\nPlease dispatch to ~mission(Location) with all urgency and good luck.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
cfp_defend_headhunters_H_desc_001=A distress call just came in from ~mission(Location|Address) claiming that a large Headhunter force has just attacked our outpost there. There have been multiple deaths and injuries from those who managed to flee the scene. We're looking for any available security personnel to head there and retake the outpost.\n\nWitness accounts identified the attackers as elite Headhunter enforcers, so watch yourself out there and bring help if you can. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend_headhunters_M_desc_001=Headhunters have launched an unprovoked attack against ~mission(Location|Address). Although we don't support the use of violence, Citizens for Prosperity won't let innocent people die. We need qualified security personnel to retake the outpost.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_003=Urgent!\n\nXenoThreat is mobilizing for a massive incursion to wipe ~mission(Location|Address) off the map. You’re their only hope of enduring this assault and protecting them from XenoThreat’s cruelty.\n\nI know I’m asking you to put yourself in the line of fire, but this system won’t change unless people like you are brave enough to take on these dangers. No amount of credits could measure up to how much good you’d be doing by stepping in.\n\nIf you’re willing and able to take on this mission, make sure to take some allies with you. XenoThreat will certainly send in stronger reinforcements once they realize they’re taking losses.\n\nWe believe in you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_002=Urgent!\n\nXenoThreat is targeting ~mission(Location|Address) to send a message to other settlers about what happens if they accept our support. \n\nIf you’re able to fend off the attackers, I’m sure they’ll send additional forces, so you’ll need to dig in for multiple assaults. Since XenoThreat has a lot of resources at their disposal, you should think about recruiting others to help you keep everyone safe.\n\nWe’re all counting on you.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Arms\n- Artimex Core\n- Artimex Legs\n- Artimex Helmet\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_HHAttack_M_desc_001=We just received a frantic comm from ~mission(Location|Address) and are looking for any available combat specialists to help repel a Headhunter attack. There are still hostiles on site and there are reports of several casualties so we need this handled quickly.\n\nI will provide all relevant data upon acceptance. Thank you for your assistance.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_defend-xenothreat_desc_001=We’ve learned that XenoThreat is about to launch an attack on ~mission(Location|Address). If they are successful, the number of casualties is expected to be high. I’m hoping that with your aid in defending them, we can make sure that doesn’t happen.\n \nWe know from past encounters that XenoThreat sends several raiding parties to carry out their attacks, so make sure you don’t leave the outpost until you’ve fought off all the reinforcements. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_ElimSpec_GenAttack_E_desc_001=We need any available security personnel to report to ~mission(Location|Address). A group of armed individuals have attacked one of our outpost clusters and we're in desperate need of help. Although the group seems to be unaffiliated with any of the known gangs, we've received word that their leader is ~mission(TargetName), a local outlaw with a vicious reputation.\n\nPlease head out as soon as you can and secure the area by taking out the outlaws and ~mission(TargetName|Last).\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_GenAttack_M_desc_001=Several CFP clusters near ~mission(Location|Address) just got hit by a group of outlaws led by ~mission(TargetName). We're looking for any available combat specialists to help retake the outposts.\n\nI can provide the locations upon acceptance but we need to clear out the main outpost and satellite installations from all hostile forces and take out ~mission(TargetName|Last) as it's unlikely that they will not cease their hostilities if they escape.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_GenAttack_M_desc_001=The outlaw presence here has become much bolder of late and a lot of people are getting hurt. We've recently lost several clusters around ~mission(Location|Address). While we don't like to have to resort to violence, the board has acknowledged that these locations are crucial to establishing stability in the system and authorized the use of a security detail to retake them.\n\nWe're also aware that the embedded hostiles are being led by ~mission(TargetName) who's had a history of attacking CFP interests. The board would like ~mission(TargetName|Last) dealt with to prevent future attacks.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_1C_ElimSpec_HHAttack_M_desc_001=We are currently looking for any qualified and available security operatives to head out to ~mission(Location|Address) and reclaim a CFP installation that had been taken by Headhunters. \n\nThe group that's currently occupying the outpost is being led by ~mission(TargetName), a Headhunter of some note who's had a history of aggression against locals and CFP volunteers.\n\nWe need all Headhunters secured and ~mission(TargetName|Last) taken out.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_HHAttack_H_desc_001=Citizens for Prosperity is looking for any available security operatives to retake several former CFP installations near ~mission(Location|Address) from Headhunter control. These clusters were violently taken from us by ~mission(TargetName) and resulted in the deaths of many volunteers.\n\nBringing these outposts back under our control will help provide more stability to the system. Reports indicate that ~mission(TargetName|Last) tends to hide behind their rank and file, so they will likely appear once you've cleared out most of the hostiles.\n\nXenoThreat are trained and motivated so they will not give up easily.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_HHAttack_VH_desc_001=Citizens for Prosperity's board just authorized funds to hire security personnel to retake several clusters near ~mission(Location|Address) that have since fallen into the hands of the Headhunters. While we tried to just accept the loss, it's become apparent that they are crucial to our ongoing operations in the system.\n\nYou'll need to clear out each of the locations that will be provided but more importantly, you'll also need to take out ~mission(TargetName), who's in charge of the hostiles on site.\n\nThese Headhunters are heavily embedded and have a history of violence, so you should prepare accordingly. \n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_2C_ElimSpec_XTAttack_H_desc_001=Looking for any available security personnel to reclaim several clusters previously lost to XenoThreat aggressors. Located near ~mission(Location|Address), they had been seized in brutal attacks led by ~mission(TargetName), a notorious XenoThreat lieutenant.\n\nWe're looking to take these clusters back so we can reestablish operations and continue our good work. You'll need to clear all the hostiles still on-site as well as ~mission(TargetName|Last).\n\nJust a reminder, that XenoThreat are highly trained and quick to fight, so prepare accordingly.\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Brimstone" Rifle\n- Artimex Core Lodestone\n- Artimex Arms Lodestone\n- Artimex Legs Lodestone\n- Artimex Helmet Lodestone\n- Karna Rifle Battery (35 cap)\n
cfp_ChainElimAll_3C_ElimSpec_XTAttack_VH_desc_001=Although Citizens for Prosperity is committed to change through non-violent means, it's become apparent that exceptions might have to be made. CFP safe zones near ~mission(Location|Address) were recently and violently taken by XenoThreat forces under the command of ~mission(TargetName).\n\nWe're looking for any available combat operatives to help take these outposts back. This will undoubtedly be a difficult endeavor as XenoThreat are highly trained and eager to fight, so you should prepare accordingly.\n\nAside from clearing each cluster of XenoThreat forces, you will need to take out ~mission(TargetName|Last), who's loss will certainly make the system safer.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna "Fate" Rifle\n- Artimex Core (Modified)\n- Artimex Arms (Modified)\n- Karna Rifle Battery (35 cap)\n
cfp_defend_boss_Generic_desc_001=We just received reports of a massive attack against ~mission(Location) by a large group of armed individuals led by ~mission(TargetName), a notorious outlaw who has been threatening Citizens for Prosperity personnel for months. Details are still yet to be confirmed but we know there have been multiple casualties.\n\nCitizens for Prosperity is looking for any qualified security personnel to go and retake the outposts from these hostile elements. Our understanding is that ~mission(TargetName|Last) tends to hide behind their soldiers, but will emerge if you take enough of the rank-and-file out.\n\nWhile we don't like to resort to violence, management can see no other way of resolving this situation and continuing our good work in the system.\n\nGood luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- Karna Rifle\n- Artimex Core Canuto\n- Artimex Arms Canuto\n- Artimex Legs Canuto\n- Artimex Helmet Canuto\n- Karna Rifle Battery (35 cap)\n
CFP_RecoverCargo_Easy_Description=Life is tough on the frontier, and every delivery to our settlers is important. We really can't afford to lose any more this year.\n\nOne of our key suppliers has been hit by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and gone silent on us. I fear the worst, but if we can still recover the supplies they were transporting, it could make a huge difference.\n\nChances are the outlaws who attacked them are still lurking around there so be on your guard. Once you've dealt with them, grab the cargo and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. Make sure you're flying a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and bring a <EM4>heavy-duty tractor beam</EM4> too.\n\nFly safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Medium_Description=A Citizens for Prosperity ship has been ambushed by a group of outlaws over at <EM4>~mission(Location|Address)</EM4> and we need a skilled pilot to help them out.\n\nWe lost contact with them mid comms, but it sounded like they were taking heavy fire. It may be too late for them, but the vital supplies they were carrying could still be put to good use. Fly over there, take out any hostiles, and recover the shipment. You'll need a ship that can support <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to transport the supplies onto your ship.\n\nTake them to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll guarantee they'll be put to good use.\n\nBe safe out there,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Hard_Description=We were in the process of delivering an urgent shipment to the folks over at <EM4>~mission(Destination|Address)</EM4> when our pilot ran into a group of outlaws. They tried to run, but it was already too late.\n\nThere is silver lining though. The trackers are showing the cargo is still intact, located at <EM4>~mission(Location|Address)</EM4>. There's a good chance the outlaws are guarding it while they locate a ship big enough to transport everything. While I don't want to risk losing another pilot, the need of the cargo aboard is desperate enough that it justifies the decision to send someone to recover it.\n\nThis won't be easy, these outlaws showed our pilot no mercy. You'll need to take them out first before getting the cargo back. Bring a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> for the moving. Deliver it to the freight elevator at <EM4>~mission(Destination)</EM4>  and let's make this right.\n\nFly safe,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_VeryHard_Description=More and more CFP ships are being targeted lately, and despite our best efforts to keep our trading routes quiet, we're still losing haulers to outlaw attacks.\n\nOur pilot over at <EM4>~mission(Location|Address)</EM4> is the latest casualty. It pains me to think about how much we've lost, but as long as there are people who need our help, we have to keep on fighting.\n\nIf you have a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>, we need you to head to the above location and recover that cargo.\n\nThis won't be easy, the pilot was one of our best and wouldn't go down without a fight. Let's not underestimate these outlaws, bring a trustworthy crew and watch each other's backs.\n\nOnce you've got the cargo, deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll get it processed.\n\nGood luck and take care,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
CFP_RecoverCargo_Super_Description=I wouldn't normally ask someone to do something so risky, but these are exceptional circumstances.\n\nOur pilot was transporting some vital cargo when they were targeted by a group of outlaws. Under no circumstances can we allow them to get their hands on the cargo.\n\nWith the size of the hostile force who attacked, you won't be able to do this on your own, you'll need to bring a skilled crew with you to  <EM4>~mission(Location|Address)</EM4> in order to  take out these outlaws and get the cargo back. Make sure at least one of you has a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4>.\n\nIf by some miracle you can get that cargo back, take it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nIt's a lot to ask, but if you can pull this off you'll have my and the whole organizations appreciation.\n\nBest of luck,\n\nLima Endicott\nLead Dispatcher\nCitizens for Prosperity\n\n<EM4>Potential Blueprints</EM4>\n- P8-SC SMG\n- C54 SMG\n- S71 Rifle\n- ORC-mkX Arms Woodland\n- ORC-mkX Legs Woodland\n- ORC-mkX Core Woodland\n- ORC-mkX Helmet Woodland\n- ORC-mkV Arms Woodland\n- ORC-mkV Legs Woodland\n- ORC-mkV Core Woodland\n- G-2 Helmet Woodland\n- P8-SC SMG Magazine (45 cap)\n- C54 SMG Magazine (50 cap)\n- S71 Rifle Magazine (30 cap)\n
eckhart_defendship_VLRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA client is reporting trouble near <EM4>~mission(Location|Address)</EM4>. Based on their comms, it doesn’t sound like an organized, professional attack. Still, we’re paid to provide protection and it’s been requested. \n\nNeed a contractor to fly there and secure the situation.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_LRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of our clients got the brilliant idea to test their dogfighting skills in a real world scenario. Doesn’t sound like it’s going well, because they comm’d us asking for some support. \n\nHead to <EM4>~mission(Location|Address)</EM4> and help clean up the mess they created.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_MRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA high-profile client decided to tour Nyx system but got jumped by hostile ships around <EM4>~mission(Location|Address)</EM4>. \n\nSounds like they’re overwhelmed. Any chance you could head to their location and provide support? \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_multi_HRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nRecently, we recommended that a client use a specific route to cross Nyx safely. Turns out it wasn’t as secure as we assumed, because a group ambushed our client’s ship. We need to get this cleaned up ASAP. Are you available to help? \n\nIntel from the client indicates a well-organized attack, so you better be equipped to deal with experienced hostiles on this one. Hurry to <EM4>~mission(Location|Address)</EM4>, help them survive this, and we’ll pay you well for your trouble.\n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_multi_VHRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nDespite our warnings, a client decided to fly to <EM4>~mission(Location|Address)</EM4>. Unsurprisingly, they just dropped a rescue beacon in the area, so we’re looking for a contractor to get on site, assess the situation, and hopefully rescue the client.\n\nWe warned them that extremely dangerous and well-equipped outlaws often strike ships there. That’s exactly what I assume happened here, so make sure you plan accordingly.  \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
eckhart_defendship_multi_SRT_desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Defend Ship\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe have a client currently under attack at <EM4>~mission(Location|Address)</EM4>. We have a long history with this client and know that they’re a skilled dogfighter. If they’re struggling to survive, then this situation must be dire.\n \nWe’re looking for a top-tier dogfighter to head out there and provide support. If you’re available, then this client could really use your help. \n\nPayment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Eckhart_EscortShips_VE_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA client has requested a contractor with immediate availability to provide extra support to a number of ships leaving an asteroid base located at <EM4>~mission(Location|Address)</EM4>). Once you’ve accepted, rendezvous there and await further instructions. In this instance, your job is to provide support for their safe passage. Hostiles may be present, but they shouldn’t be too challenging to deal with.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Potential Blueprints</EM4>\n- Shimmer (Shield)\n- Obscura (Shield)\n- M3A Cannon\n- M4A Cannon\n- M5A Cannon\n
Eckhart_EscortShips_E_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA group of ships located at <EM4>~mission(Location|Address)</EM4> are requesting an escort. If you accept, head to the location immediately and await instructions. The client claims that this escort is purely a precautionary measure, but that doesn’t mean you should drop your guard. Expect some hostile forces and deal with them appropriately.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Potential Blueprints</EM4>\n- Shimmer (Shield)\n- Obscura (Shield)\n- M3A Cannon\n- M4A Cannon\n- M5A Cannon\n
Eckhart_EscortShips_M_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of my clients needs an immediate escort through dangerous space. Rendezvous at <EM4>~mission(Location|Address)</EM4> and they’ll meet you after they launch. Reports indicate increased outlaw activity in the area, so don’t let your guard down.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Shimmer (Shield)\n- Obscura (Shield)\n- M3A Cannon\n- M4A Cannon\n- M5A Cannon\n\n<EM4>Pool 2</EM4>\n- Veil (Shield)\n- Sheut (Shield)\n- Suckerpunch Cannon\n- Suckerpunch-L Cannon\n- Suckerpunch-XL Cannon\n
Eckhart_EscortShips_H_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nIn need of a contractor who can report in now. A client has found themselves in hot water over at <EM4>~mission(Location|Address)</EM4> and a protection detail to get away from an asteroid base. They’ve reported multiple, well-armed hostile ships meaning you’ll need a crew of your own to deal with them. Based on the client’s account, these attackers seem highly motivated so they will likely not back down easily.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Shimmer (Shield)\n- Obscura (Shield)\n- M3A Cannon\n- M4A Cannon\n- M5A Cannon\n\n<EM4>Pool 2</EM4>\n- Havoc Scattergun\n- Hellion Scattergun\n- Predator Scattergun\n- Mirage (Shield)\n- Umbra (Shield)\n- Quarreler Cannon\n\n<EM4>Pool 3</EM4>\n- Veil (Shield)\n- Sheut (Shield)\n- Suckerpunch Cannon\n- Suckerpunch-L Cannon\n- Suckerpunch-XL Cannon\n
Eckhart_EscortShips_VH_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nI’m in need of a highly competent pilot who can gather a crew of equally capable pilots for an escort mission. The mining base at <EM4>~mission(Location|Address)</EM4> is currently under attack from a group of outlaws and the crew there is unable to leave without assistance. Our scouts have reported that the attackers are armed with exceptional weaponry and ships.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Shimmer (Shield)\n- Obscura (Shield)\n- M3A Cannon\n- M4A Cannon\n- M5A Cannon\n\n<EM4>Pool 2</EM4>\n- Havoc Scattergun\n- Hellion Scattergun\n- Predator Scattergun\n- Mirage (Shield)\n- Umbra (Shield)\n- Quarreler Cannon\n\n<EM4>Pool 3</EM4>\n- Veil (Shield)\n- Sheut (Shield)\n- Suckerpunch Cannon\n- Suckerpunch-L Cannon\n- Suckerpunch-XL Cannon\n
Eckhart_EscortShips_S_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Escort Ship\nApproval code: = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nThis contract should only be considered by the most capable of pilots. A highly valued client is currently under attack at <EM4>~mission(Location|Address)</EM4> and requires immediate extraction. They’re sitting in the hangar ready to leave, but are unable to move until the hostile ships in the area have been neutralized. \n\nI don’t see the outlaws stopping any time soon and our client’s reporting they’re packing high-grade weaponry on their ships. This will be a test of your skill as much as your endurance. Assemble whoever you need and head there immediately to assist them.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Shimmer (Shield)\n- Obscura (Shield)\n- M3A Cannon\n- M4A Cannon\n- M5A Cannon\n\n<EM4>Pool 2</EM4>\n- Havoc Scattergun\n- Hellion Scattergun\n- Predator Scattergun\n- Mirage (Shield)\n- Umbra (Shield)\n- Quarreler Cannon\n\n<EM4>Pool 3</EM4>\n- Veil (Shield)\n- Sheut (Shield)\n- Suckerpunch Cannon\n- Suckerpunch-L Cannon\n- Suckerpunch-XL Cannon\n
EckhartSecurity_EliminateBoss_DC_Desc_001=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Bounty\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe’ve received actionable intelligence on a dangerous bounty, who’s turned out to be extremely elusive. <EM4>~mission(TargetName)</EM4> was spotted with a dedicated contingent of known associates at <EM4>~mission(Location|Address)</EM4>. We’re looking for a contractor ready and willing to execute this bounty before they disappear again.\n\nBased on previous attempts to apprehend this criminal, there’s a good chance that <EM4>~mission(TargetName|Last)</EM4> will try to avoid a direct confrontation, and instead send their allies to confront you. We believe that neutralizing these protective forces, and shredding the safety net they provide, is the best way to draw out <EM4>~mission(TargetName|Last)</EM4> to face you directly. \n\nExpect to confront a significant and skilled force. We advise that you plan accordingly. Payment will be issued upon successful completion of contract.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Fierell Cascade (Powerplant)\n- UltraFlux (Powerplant)\n- MegaFlux (Powerplant)\n- C-788 Cannon\n- Tigerstrike T-19P\n- Revenant Gatling\n- Draugar Gatling\n
Eckhart_ShipAmbush_Intro_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nWe’re looking for contractors with combat experience who are willing to get their hands dirty so to speak. A client of ours was double-crossed by a <EM4>~mission(AmbushTarget)</EM4> and we’ve been waiting for an opportunity to deal with the issue. After tracking them for several weeks, we’ve identified <EM4>~mission(Location|Address)</EM4> as the ideal spot to intercept them. It features an <EM4>emission cloud</EM4> where you can hide and power down your ship while waiting for the <EM4>~mission(AmbushTarget)</EM4>.\n\nIntel suggests that they may travel with an escort. If they do, you’ll have to deal with them too. Since this is your first contract, we will have other contractors in the area who can lend a hand once you strike.\n\nPayment will be issued upon successful completion of contract. There’s a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in this for the main contractor too.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n
Eckhart_ShipAmbush_VE_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nOne of our clients has been the victim of consistent harassment so the time has come to send a clear cease-and-desist message by taking out their prized <EM4>~mission(AmbushTarget)</EM4>.  The lowlife in question follows a fairly predictable routine making them susceptible to an ambush. We’ve identified <EM4>~mission(Location|Address)</EM4> as the ideal spot. It features an <EM4>emission cloud</EM4> where you can hide and power down your ship while waiting. \n\nBy the way, the <EM4>~mission(AmbushTarget)</EM4> often flies alone but is sometimes joined by a friend in a single-seat ship. Neither should give you too much trouble, but we have other contractors in the area who can lend a hand once you strike.\n\nPayment will be issued upon successful completion of contract. There’s a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in this for the main contractor too.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Potential Blueprints</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n
Eckhart_ShipAmbush_E_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA client of ours has been receiving anonymous threats in an attempt to blackmail them, and after a bit of leg work on our part, we’ve managed to trace it back to an individual who pilots a particular <EM4>~mission(AmbushTarget)</EM4>. The client wants us to take care of this blackmailer before they have a chance to make good. \n\nBased on our assessment, the target shouldn’t be too difficult to handle. They fly by <EM4>~mission(Location|Address)</EM4> on the regular, which has an <EM4>emission cloud</EM4> that’s an ideal spot to power down your ship and lie in wait. Sometimes the target is alone but they often travel with other single-seat ships as protection. Best be strategic when you launch your ambush or the <EM4>~mission(AmbushTarget)</EM4> could have a chance to get away. We don’t want to lose this one. We’ll alert other contractors in the area of the ambush so they can come help once it pops off.     \n\nPayment will be issued upon successful completion of contract. The client has also added a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n\n<EM4>Potential Blueprints</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n
Eckhart_ShipAmbush_M_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nNeed someone to take out a <EM4>~mission(AmbushTarget)</EM4> and deal with the escort ships protecting it. They’ve already interfered with several of our ongoing operations and have become a real problem across several of Eckhart Security cases. Not sure what their endgame is, but it won’t matter once you deal with them.\n\nWe’ve let slip that we will be working a job over at <EM4>~mission(Location|Address)</EM4> which should serve as bait to draw them out. The spot is ideal for an ambush because of the <EM4>emission cloud</EM4> that’s a perfect place to power down and hide until you’re ready to strike. If you’re available, the <EM4>~mission(AmbushTarget)</EM4> and its escorts should be passing through soon.   \n\nPayment will be issued upon successful completion of contract. The main contractor will also receive a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Eckhart_ShipAmbush_H_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nLooking for a competent contractor who can recruit a wingman to help execute an ambush. The target is a <EM4>~mission(AmbushTarget)</EM4> which has been involved in several operations against one of our most important clients. By neutralizing it once and for all, it’ll make our client’s life a hell of a lot easier. While the ~mission(AmbushTarget) is our focus, they usually don’t fly anywhere without a sizable escort, including large craft. \n\nWe’ve gotten word that this group will be passing by <EM4>~mission(Location|Address)</EM4> soon. Any chance you could hurry and beat them there? That spot has an <EM4>emission cloud</EM4> that you can power down your ship and hide in. Then when they pass, you should have the upper hand.  \n\nPayment will be issued upon successful completion of contract. The client knows this one will be tough, so they threw in a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> that’ll go to the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- Slipstream (Powerplant)\n- Eclipse (Powerplant)\n- Lightstrike IV Cannon\n- Lightstrike V Cannon\n- Lightstrike VI Cannon\n\n<EM4>Pool 3</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Eckhart_ShipAmbush_VH_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nA high profile client recently lost an important shipment when a pilot double-crossed them and ran off with their product. After weeks of hunting we’ve discovered that they were connected with an outlaw pack, so the client is looking to us to deter similar future issues from arising. The ultimate target is the pilot of a <EM4>~mission(AmbushTarget)</EM4>, who leads the crew responsible. This won’t be easy. They don’t go anywhere without escort fighters and sub-capital ships. That’s why we highly recommend that you find a trusted friend or two who can handle this with you.  \n  \nIntel gathered by our analysts indicates that they frequently fly by an <EM4>emission cloud</EM4> near <EM4>~mission(Location|Address)</EM4> which would provide an excellent area to stage a surprise strike.\n\nPayment will be issued upon successful completion of contract. We’re also adding a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> that’ll go to the main contractor.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- Slipstream (Powerplant)\n- Eclipse (Powerplant)\n- Lightstrike IV Cannon\n- Lightstrike V Cannon\n- Lightstrike VI Cannon\n\n<EM4>Pool 3</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Eckhart_ShipAmbush_S_desc=ECKHART SECURITY, LLC.\nCONTRACTS & DISPATCH\n\nCONTRACT TYPE: Ship Ambush\nAPPROVAL CODE = ~mission(ApprovalCode)\n\nFOR IMMEDIATE PROCESSING\n\nRecently, we sent a contractor after a <EM4>~mission(AmbushTarget)</EM4>, who was leading a crew targeting the operations of an extremely important client. Unfortunately, it was a trap and we lost some good people. We can’t let the target get away again, so we’ve decided the best course of action is to give them a dose of their own medicine.  \n\nAmbushing this target seems like the safest course of action, and we’ve identified a good spot for such an attack. There’s an <EM4>emission cloud</EM4> near <EM4>~mission(Location|Address)</EM4> that the target and their crew frequently fly by. You can power down your ship and hide there until you’re ready to strike. This crew is ruthless and extremely skilled. Don’t make the same mistake as the previous contractor and go this alone. It would be best for you to bring a few trusted friends to help handle this crew.    \n\nPayment will be issued upon successful completion of contract. Plus, we’ll throw in a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor for taking care of this.\n\nThis contract is non-negotiable.\n\nThis message may contain confidential, proprietary, privileged and/or private information. The information is intended to be for the use of the individual or entity designated above.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- SonicLite (Powerplant)\n- Cirrus (Powerplant)\n- Lightstrike I Cannon\n- Lightstrike II Cannon\n- Lightstrike III Cannon\n\n<EM4>Pool 2</EM4>\n- Slipstream (Powerplant)\n- Eclipse (Powerplant)\n- Lightstrike IV Cannon\n- Lightstrike V Cannon\n- Lightstrike VI Cannon\n\n<EM4>Pool 3</EM4>\n- DeltaMax (Powerplant)\n- GammaMax (Powerplant)\n- FL-11 Cannon\n- FL-22 Cannon\n- FL-33 Cannon\n
Foxwell_bombingrun_VE_desc_001=A bunch of outlaws have been harassing our client and recently things have taken a turn for the worse. They've taken over their property and we've exhausted all other options.\n\nWe need a decent pilot to head to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you can cut off their supplies, you can pave the way for the client to take back their property.\n\nThis shouldn't be a tough one. You might run into a ship or two and maybe a few turrets, but you've been authorized to use lethal force. All we need for you to do is get in there, get the fuel tanks, and get out.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_E_desc_001=We've just received the location of an outlaw outpost where some up-and-coming criminals have been hanging out. Now, our client says there's no reason to engage these folks directly. Instead you will be targeting their supply lines.\n\nFly on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel stores while dealing with any minimal resistance they may put up. It will be your call on how much you engage with the hostile forces, just don't forget that your main objective is ensuring those fuel tanks are out of action.\n\nThis is a yellow level contract so pay will be proportionate.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_M_desc_001=We're in need of a sharp contractor for a hit and run operation. Client says some local thugs have been congregating in concerning numbers and we have been tasked with disrupting their base of operations.\n\nGet on over to <EM4>~mission(Location|Address)</EM4> and take out their fuel tanks. If you're successful we can set these folks plans back a while, and most importantly, without having to deal with them directly.\n\nReports are showing there's a couple of ships buzzing around the area and some defense turrets. Just focus on the fuel tanks and you should be alright.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_H_desc_001=An opportunity has presented itself for a client to take action against a group of criminals who have been harassing their business.\n\nAccording to reports, this group of outlaws are currently laying low at <EM4>~mission(Location|Address)</EM4>. The client thinks this is a good time to catch them off guard and bring them to justice. The job is to take out their fuel tanks and putting an end to their smuggling operations once and for all.\n\nThese folks are not to be underestimated. You better bring some backup and fly low to avoid the turrets. Priority as always is the fuel tanks.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_VH_desc_001=Foxwell have been hired by a client to take part in a multi-stage operation on a known outlaw base at <EM4>~mission(Location|Address)</EM4> and need a strong pilot to play their part in this.\n\nYou, and whatever additional support ships you arrange, will be tasked with taking out the fuel tanks located there to set the stage for the rest of the operation to follow. \n\nUnfortunately, this place is swarming with ships and anti-air turrets. So make sure you and your people are ready, and remember, the fuel tanks are your priority. No need to be a hero.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_bombingrun_S_desc_001=We are looking for a highly competent mercenary team to assist with a challenging demolition for a VIP client.\n\nThe outlaws operating at <EM4>~mission(Location|Address)</EM4> has been identified as a threat of growing concern in the area and to help deal with this situation your team is being tasked with taking out the fuel tanks at the location. \n\nHowever, it won't be as easy as just slipping in and out - expect to deal with multiple hostiles and turrets that will be expecting you. The stronger your crew the better your chances at completing this operation successfully.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_E_desc_001=Foxwell is looking for an available combat pilot to provide immediate assistance to a ~mission(Ship) under attack over by ~mission(Location|Address). We have not identified the perpetrators in the attack, but have been assured it is a small force.\n\nPlease dispatch quickly and clear out all hostiles. We need the client to make it through this as they haven't paid us yet.\n\nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_M_desc_001=Got an orange level contract for any available combat pilots. A ~mission(Ship) is under attack around ~mission(Location|Address) and is in desperate need for assistance. We're not sure how many perpetrators there are, but they seem motivated and dangerous so exercise caution.\n\nOnce on site, engage and destroy any hostiles you encounter and protect the client. Once they've transferred the credits, we'll route you your payment.\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
foxwell_DefendShip_H_desc_001=An emergency contract just came in about a fight near ~mission(Location|Address). Apparently a group of ships were ambushed by outlaws led by ~mission(TargetName), who's been wanted on multiple planets for murder and ship theft. Foxwell's looking for top tier combat pilots to go and protect the clients against them.\n\nThis one's been flagged as a red level contract so it's really dangerous. If you have people you could bring, you probably should. If you do, you should also let them know about Foxwell's hiring policies. \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_Mercenary_Rehire_desc_001=Due to a corporate restructuring, Foxwell has some new vacancies that need to be filled immediately. Foxwell knows you’ve previously expressed interest in this line of work, and we’re wondering if you would want to take another crack at a contract.\n\nOne of our clients needs support at <EM4>~mission(Location|Address)</EM4> where their security forces are struggling to handle an outlaw incursion. Head there and help the local forces get rid of the problem before it’s too late. \n\nSuccessfully complete this contract, and Foxwell would be happy to send more work your way.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_Allies_desc_001=Got word that outlaws are attempting to overrun <EM4>~mission(Location|Address)</EM4>. There’s local security forces there, but they’re struggling to stop that attack.\n\nNeed a contractor to hustle there and help take care of the aggressors. Bring plenty of gear, and be careful when engaging targets. Don’t want to hear about any security team members getting caught in your crossfire.    \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_NonHostiles_desc_001=We’ve been contracted to take care of a delicate situation. A gang has settled into <EM4>~mission(Location|Address)</EM4> that we need to get cleared out. Only issue is that there’s still some civilians there too. \n\nLooking for someone with the skills and good trigger sense to get rid of those outlaws without harming any innocent people. If that’s you, grab your gear and get over there. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_desc_001=Looking for someone willing to take out the trash at <EM4>~mission(Location|Address)</EM4>. Guess a gang has settled in without the permission of the owners. So they’ve hired us to get them out whatever way we see fit. \n\nI’d bring plenty of ammo, if I were you. Doubt they’ll want to leave willingly. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateSpecific_desc_001=Looking to execute a bounty on <EM4>~mission(TargetName)</EM4>. We’ve learned that they’re currently hiding out with some confederates at <EM4>~mission(Location|Address)</EM4>. \n\nI’d be prepared to deal with the lowlifes hanging around <EM4>~mission(TargetName|Last)</EM4>, but our only real concern is that you land the target. \n    \n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateSpecific_NonHostiles_desc_001=Got a line on a bounty named <EM4>~mission(TargetName)</EM4>. Someone spotted them along with known criminal accomplices at <EM4>~mission(Location|Address)</EM4>. Need you to get there before they get going. \n\n<EM4>~mission(TargetName|Last)</EM4> has a reputation for only showing their face in places with civs. Really need you to take down this bounty without there being any civilian collateral damage. Foxwell can’t afford to be caught in the shitstorm that would erupt over the loss of innocent life. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_E_desc_001=Some folks will do anything for a few creds. There’s a group of upstart outlaws over at <EM4>~mission(Location|Address)</EM4> that have decided to start manufacturing drugs. Turns out they’re not too good at it, or maybe a little too good. The junk they’re pumping out is stronger than the normal stuff and a real danger to anyone who uses it. \n\nWe’ve been hired to knock out their operation and destroy whatever drugs stashes are on site. Armed guards are protecting the place, but they don’t seem too skilled. Our surveillance teams observed one of them almost shoot himself in the foot. Can’t say for certain, but odds are they won’t give a pro like you too many problems.  \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_M_desc_001=We’ve been contracted to take care of a problem at <EM4>~mission(Location|Address)</EM4>. There’s been a recent surge of activity in the area tied to the drug trade. It appears to be a well-run operation and there’s a growing concern that it’ll expand wider if not stopped. Any chance you’re available to make sure that doesn’t happen?   \n\nJob is pretty straightforward. Head to the site and destroy their stash of drugs. That way they won’t have the creds to expand their operations any further. I wouldn’t expect them to make this easy on you though. Armed guards are regularly seen around the facility, so be sure you’ve got enough gear to deal with them too. \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_DestroyNarcotics_H_desc_001=Reports of a spike in drug overdoses around Stanton has security services worried. Seems like some two-bit crew is juicing their profits by cutting their stuff with toxic chemicals. Shutting down this crew and stopping the distribution of their drugs has become a top priority.\n\nA Foxwell informant has revealed that part of this crew has currently set up shop at <EM4>~mission(Location|Address)</EM4>. Hiring a contractor to hustle over there and destroy whatever drugs they’ve got stashed before they’re spread across the system. Better be careful though, word is this crew is armed to the teeth and determined to profit off that poison no matter what.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_PAF_M_desc_001=We’ve been tracking a group of outlaws who’ve been causing trouble for one of our clients. Seems they’ve taken up residence at an old Hathor facility. Don’t know what their plans with that old facility are but our client is eager to have them taken care of.\n\nLooking for someone to go to <EM4>~mission(Location|Address)</EM4> and neutralize these targets.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_EliminateAll_OLP_M_desc_001=We’ve been following a group of outlaws on behalf of a client, and it looks like they’ve taken a permanent pit stop on an old orbital platform. \n\nWe’re looking for a contractor who can head over to <EM4>~mission(Location|Address)</EM4> and neutralize the targets. The platform is crawling with a bunch of armed and dangerous thugs, so we’ve designated this a yellow level contract.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
destroyprobelegal_desc=~mission(Contractor|DestroyProbeDescription)\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_MultiToSingle_desc_01=Something weird is going on at the old Hathor mining facilities. Both the platform alignment facilities and orbital laser platforms have been abandoned and gathering dust for decades, but outlaws have started using them as a base of operations.\n\nWe’ve been hired by a concerned party who’s recently lost a lot of important cargo to one such gang. Currently, their stuff is stashed at <EM4>~mission(Location1|Address)</EM4> and <EM4>~mission(Location2|Address)</EM4>, but there’s a growing fear that the gang may be offloading their goods soon. That’s why we’ve been hired to hit both of those Hathor facilities, retrieve the cargo from the freight elevators, and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>. \n\nHere’s the specifics on what to grab from each location. Doesn’t matter in what order you do this, as long as it all gets collected and delivered. Just be sure to bring a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.  It also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n~mission(MultiToSingleToken)\n\nFoxwell hasn’t been able to scout these locations, but if I were you, I’d expect to face some serious armed resistance. Best bring a bunch of gear and some friends.\n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_AToB_PAF_desc_01=A crew recently raided a distribution center and made off with <EM4>~mission(CargoGradeToken) load of cargo</EM4>. Foxwell has been hired to get all those goods back. We’re getting reports of these outlaws using old Hathor facilities as stash houses and we believe the stolen items are currently at <EM4>~mission(Location|Address)</EM4>.\n\nIf interested, you’ll need a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. Doubt you’ll be able to slip in and out of that PAF without being noticed either, so best be prepared to clear the location. Once safe, grab the goods from the freight elevator and deliver them to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_HaulCargo_AToB_OLP_desc_01=Looking for a contractor with the right skills and ship for an important mission. Outlaws ambushed a Hull C carrying a <EM4>~mission(CargoGradeToken)</EM4> load of cargo and took it to <EM4>~mission(Location|Address)</EM4>. We’ve been hired to get it all back.  \n\nThe cargo is being stored somewhere at a defunct Hathor facility. The place is big and crawling with outlaws. Need someone to retrieve the goods from the freight elevator there and deliver it all back to the <EM4>freight elevator at ~mission(Destination|Address)</EM4>. Don’t think this will be a walk in the park. Bring lots of ammo and a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n\nIt also wouldn't hurt to bring a <EM4>handheld tractor beam</EM4> with you.   \n\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Antium Helmet Jet\n- Antium Core Maroon\n- Antium Legs Maroon\n- Antium Helmet Maroon\n- Antium Helmet Moss Camo\n- Antium Arms Moss Camo\n- Antium Core Moss Camo\n- Antium Legs Moss Camo\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_VE_001=There's a small group of criminals that have been marking their territory, striking out any freighters that get close enough. They got a little too greedy though, because now someone's paying us to go deal with them.\n\nOnce you and whoever you're bringing are ready, go to ~mission(Location|Address) and engage with these criminals. Since they like to fly in separate packs, be sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_E_001=Okay, this might be a bit of stretch to do on your own, so if you got any favors to call in, it could be good to cash those chits now. There's a group of desperados striking delivery ships up and down this sector and we've been tasked with cleaning them up. \n\nOnce your crew is ready, head over to ~mission(Location|Address) and take the hostiles there down. Now, these bastards are a bit clever so they tend to split up into smaller packs. Make sure you wait around to clear every last one of them out.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_M_001=A splinter group of outlaws have broken off from one of the main gangs in the system and have been trying to strike out on their own. With the amount of trouble they've been causing its clear they're looking to establish a name for themselves as quickly as they can. It's going to be up to you and your support crew to put a stop to them.\n\nOnce your crew is ready, head over to ~mission(Location|Address) and engage with the gang. Not all of them will just be waiting there on site. Expect reinforcements to arrive once you begin your assault. Just be sure to stay until every last one of them has been take care of.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives."\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipWaveAttack_ClearHostiles_Desc_H_001=It seems that a couple of different small-time gangs have decided to pool their resources and start doing coordinated attacks. Alone, they weren't much, but all together they're proving to be a serious threat that has to be dealt with.\n\nRecruit some backup you can rely on and the fly over to ~mission(Location|Address). Once you attack the initial gang members you find there, the other groups will arrive to support them. Make sure you wait around to take out all of them.\n \nGood luck,\n\nMarcus Clenn\nFoxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_VE_desc_001=Care to help us ghost a bad guy? \n\nWe’ve been hired to hunt down an outlaw flying a <EM4>~mission(AmbushTarget)</EM4>. Shouldn’t be too hard since they take the same flightpath each day. That makes them a prime target for an ambush if I ever saw one. I’ve analyzed the route and determined that <EM4>~mission(Location|Address)</EM4> is the ideal spot to strike. There’s an emission cloud there that’ll be perfect to hide your ship’s signature while you wait.   \n\nJob is simple if you’re interested. Head to the location, hide out, power down, and then wait for them to fly by. Sometimes they roll alone but they often have other single-seat ships with them. Shouldn’t be too hard to handle for a pro. Plus, we’ll still have reinforcements nearby and ready to deploy once it pops off.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_E_desc_001=An outlaw who’s been on the run finally returned to the system. Seems like they hoped that disappearing for a bit would make us forget about them. They’re not even trying to hide their identity or vary their routine which means we know exactly where they’re going to be.\n\nLatest intel indicates that they’re flying a <EM4>~mission(AmbushTarget)</EM4> and will be passing by <EM4>~mission(Location|Address)</EM4> soon. I’ve already scoped out an emission cloud that’s a perfect place for you to find cover, power down your ship, and wait. Only real variable is if they’ll be alone or not. We’ve heard they sometimes roll with friends that all fly single-seaters. Landing that first surprise strike will be important as this crew is battle-tested, but we’ll have reinforcements at the ready to provide support if you need them.\n\nGet this done and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_M_desc_001=Foxwell has been tracking a <EM4>~mission(AmbushTarget)</EM4> used by outlaws and discovered a pattern to its movements. The ship should be passing by <EM4>~mission(Location|Address)</EM4> soon.\n\nLooking for a contractor willing to hustle there, hide in the emission cloud, and then spring the trap when the time is right. There’s usually escort ships with the <EM4>~mission(AmbushTarget)</EM4>. Careful not to jump the gun and blow your cover. The element of surprise is crucial from what I’ve read.\n\nPull this off and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_H_desc_001=Recently, a <EM4>~mission(AmbushTarget)</EM4> baited Foxwell forces with a bogus rescue beacon. By the time our forces realized what was happening, a squad of ships unleashed a devastating attack and only one Foxwell contractor survived. Their scan logs identified the bait ship, and we’ve had scouts monitoring them ever since.\n\nOur surveillance has revealed the squad has a regular flight pattern that we think we can exploit. There’s a sizable emission cloud at <EM4>~mission(Location|Address)</EM4> that makes it an ideal spot to post up. Think you have what it takes to handle this for us? \n\nIt’ll be you against the <EM4>~mission(AmbushTarget)</EM4>, other large craft, and a sizable escort. Wish I could be more specific than that but this crew regularly rotates ships in and out of the squad. Would be smart to bring some support, so you don’t get overwhelmed by their numbers.   \n\nComplete the job and we'll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_VH_desc_001=Foxwell got word from an important client that outlaws have put together a squad that’s been stalking the system with sub-capital ships and escort fighters. Our client is concerned that if left unchecked, outlaws will create more of these attack squads and destabilize system security. We’ve been hired to wipe out this group before that happens. \n\nWe need a confident and skilled contractor for this task. Good news is that we have a plan in place. One of the ships used by this squad, a <EM4>~mission(AmbushTarget)</EM4>, was stolen from our client, who’s still able to track its movements. They’ve shared the location data with us and we’ve discovered that this squad often goes by <EM4>~mission(Location|Address)</EM4>. We’ve scouted the location and discovered a large emission cloud makes an ideal spot for an ambush.  \n\nNot going to lie, this isn’t going to be easy. We don’t have any additional forces available to deploy, so it would be good to bring your own support. \n\nYou manage to pull this off, I've arranged for a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_ShipAmbush_S_desc_001=We’ve received a handful of comms about recent attacks undertaken by an <EM4>~mission(AmbushTarget)</EM4> and its escort ships. After opening a file, we started tracking the ship’s movements and noticed that it frequently passes an emission cloud near <EM4>~mission(Location|Address)</EM4>. We want to use that to our advantage to launch a surprise attack. \n\nOnce on site, you should hide in the emission cloud to cloak your signature enough to allow you to make the first strike. Unfortunately, Foxwell can’t provide additional reinforcements for this operation, so you’ll be responsible for bringing any support forces. You might need the help too. The crew of the ~mission(AmbushTarget) is aggressive and battle hardened.        \n\nYou get this taken care of for us and there's a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> in it for the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sunstone" Energy Assault Rifle\n- Antium Arms Jet\n- Antium Core Jet\n- Antium Legs Jet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_VE_Desc_001=Calling all pilots – one of our clients is looking for some protection for their <EM4>~mission(Objects)</EM4>, based in <EM4>~mission(Location|Address)</EM4>. From what we’ve gathered, the attackers are a group of wannabe outlaw pests who probably haven’t realized the value of the assets they’re trying to destroy, just wreaking havoc for the sake of it. Still, the client’s property is important, so should be kept as intact as possible.\n\nIf you take care of them to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_E_Desc_001=Any willing pilots in the area? Need some protection around <EM4>~mission(Location|Address)</EM4> for a client. A band of outlaws has been targeting their <EM4>~mission(Objects)</EM4>, and if nothing's done about it they'll do some real damage. Need someone to protect the client’s property as much as possible and deal with the thugs.\n\nFrom the intel we’ve managed to gather, these thugs are small-time but can cause some pain if you’re not careful. So, if you manage to nail this to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_M_Desc_001=I'm hoping that you'll be able to provide protection services at <EM4>~mission(Location|Address)</EM4>. One of our high priority clients is having some real trouble with a band of outlaws targeting their ~mission(Objects). Need to be able to keep the assets as safe and intact as possible. Client’s expecting the service they pay for, so don’t mess this up or we might lose a loyal customer.\n\nFor now, we’re still a little in the dark when it comes to these outlaws, but if you manage to nail this to the Foxwell standards, we’re offering  <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_H_Desc_001=One of our high priority clients is under attack from a criminal gang targeting their <EM4>~mission(Objects)</EM4> in <EM4>~mission(Location|Address)</EM4>. The client’s assets are valuable, so we need to keep those safe at all costs, but I won’t kid – it’ll be a challenge and a half with these thugs determined to do some real damage. \n\nIf it were me, I wouldn’t hesitate to <EM>bring backup</EM4> to deal with them. They’re no joke, so we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor who deals with these guys successfully. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_VH_Desc_001=Urgent ship support needed at <EM4>~mission(Location|Address)</EM4>. A known destructive criminal organization has been testing the waters with one of our clients’ property for months, and has now raised hell by targeting the client’s <EM4>~mission(Objects)</EM4>. These assets are highly valuable, so need to keep those safe at all costs – though we know it’ll be no easy feat.\n\nI cannot stress enough how dangerous these guys are, so I wouldn’t hesitate to <EM>bring backup</EM> to deal with them. If you and the assets make it out intact, we’re offering a well-earned <EM4>~mission(ScripAmount) MG Scrip</EM4>  to the main contractor. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendDestructibleEntites_S_Desc_001=An emergency contract just came through about a gang of violent thugs wreaking havoc on one of our VIP clients’ infrastructures. If available, we need you to rush to <EM4>~mission(Location|Address)</EM4> and defend the client’s extremely valuable <EM4>~mission(Objects)</EM4> at all costs. \n\nFoxwell is extremely aware of this group, so believe me when I say these pilots are not to be taken lightly. I strongly recommend that you arrange a <EM> highly competent backup force</EM> to fly with you to the site.\n\nIf you manage to survive the encounter with the client’s property intact, we’re adding  <EM4>~mission(ScripAmount) MG Scrip</EM4> any main contractor brave enough to take this job on. \n\nStay safe, and good luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints (Repeat Only)</EM4>\n- Parallax Energy Assault Rifle\n- Antium Arms\n- Antium Core\n- Antium Legs\n- Antium Helmet\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_VE_Desc_001=Outlaw ships are harassing anyone attempting to land or leave our client’s operations at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. Need someone to fly there to defend the site and protect our client’s ships before the situation gets out of control. Get there, get after those aggressors, and I'll keep you updated on the situation. \n\nHelp take care of this and we'll pass along a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_E_Desc_001=Ships coming and going from <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are being targeted by hostile forces. The folks there have hired us to deal with this problem immediately.\n\nNeed someone to get there pronto and start fighting off these ships. The situation appears to be constantly evolving, so I’ll keep you updated on where you’re needed most. \n\nFor the hustle and effort, we’ll also be paying a bonus of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor for dealing with this.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_M_Desc_001=We’ve got clients reporting outlaw attacks on ships around <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4>. They got locked down tight and anybody heading in or out is a target. Any attempts to solve the issue have just been met with more outlaw reinforcements appearing. \n\nThe client is desperate for a solution, so we’re hiring a contractor to go and restore peace in the area. If any other issues flare up once you're there, I’ll comm you directions on how to help.  \n\nReally need someone on this fast. So to sweeten the pot, the main contractor will also get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_H_Desc_001=The folks at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> are under attack and need our support. Their ships in the wider area are being targeted and there’s a growing concern that this is only a precursor to something bigger.  \n\nThe situation is evolving, but I’m being fed constant updates on what’s going on and will keep you informed as the contract progresses. \n\nAre you available to come to their aid? Would be smart to recruit some friends to help. These are important clients and we can’t afford to fail them. The main contractor will earn a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if you get the job done.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_VH_Desc_001=Ship support is needed at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> immediately. Our client’s interests in the area are under fierce attack by outlaw forces. Looking for someone who can grab their gear, a few support ships they can trust, and deploy before it’s too late. Once you arrive, I’ll send any sitrep updates your way.  \n\nDon’t mess this up. These clients are paying for and expecting top tier protection. If anything goes wrong, we could lose this contract. That’s why we’ll give the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> if all goes down without a hitch.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendLocation_S_Desc_001=Looking for a consummate professional to handle a high-stakes job. We’ve got VIP clients at <EM4>~mission(DefendLocationWrapperLocation|Address)</EM4> who are facing extremely aggressive and motivated outlaws targeting ships around their location. Exact details on the attack are still rolling in, but it appears to be a wide ranging, multi-pronged operation. \n\nIf you’re available, I highly recommend that you bring additional combat support ships, plenty of supplies, and your A-game. Get this right, and we’ll reward the main contractor with a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4>.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Shock Trooper" Energy Assault Rifle\n- Antium Arms Storm\n- Antium Core Storm\n- Antium Legs Storm\n- Antium Helmet Storm\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_VE_Desc_001=Time to knock out a routine patrol for one of our long-term clients. The route is a series of waypoints that need to be visited and scanned to confirm everything’s as expected. Should be simple enough.  \n\nIf interested, please accept and head to the <EM4>location marker</EM4> on your HUD to start. Pull this off and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_E_Desc_001=Need someone to knock out a security patrol. You’ll need to go to the <EM4>location marker</EM4> on your HUD and then scan several designated waypoints ensuring that they’re safe and secure. \n\nSatellites in that region have been acting up recently. Not exactly sure what’s going on out there, but best be prepared in case there’s any trouble.\n\nComplete this contract and the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_M_Desc_001=A client is concerned about activity near some of their interests. We’ve been contracted to patrol the area and run scans at several locations. Interested? If so, head to the <EM4>location marker</EM4> on your HUD to start the patrol.\n\nThe client wasn’t specific about the threats, but they don’t think everything’s on the level out there. Hopefully we’ll be able to bring them some peace of mind.\n\nAdditionally, the client arranged for us to offer a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor.\n\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_H_Desc_001=Several unknown ships have been spotted in areas frequented by haulers delivering goods for our client. They’re worried these ships are monitoring their haulers in preparation for an ambush, so they’ve hired us to patrol the area. \n\nStart by going to the <EM4>location marker</EM4> on your HUD and scan it to ensure it’s clear. After that, we’ll send you to some other areas to scan for potential threats. We recommend that you bring a <EM4>wingman</EM4> and plenty of supplies to be ready to handle whatever might come your way.     \n\nAlso know that successfully completing this contract will earn the main contractor a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_VH_Desc_001=A client needs our help. Outlaws are roaming certain sectors where they do business and attacking anyone they come across. Our client has already lost several ships and can’t afford to lose anymore. \n\nWe need someone to patrol those areas and draw out any hostile forces. The job begins with you heading to the <EM4>location marker</EM4> on your HUD and scanning. Then we’ll share a handful of other patrol points for you to scan. \n\nFrom the sound of it, these packs of ships feature skilled and aggressive pilots. Best be ready to rumble if you run into any of them. Would be good to have at least <EM4>two trusted pilots</EM4> by your side for this one.\n\nAt the end of a successful patrol, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip.</EM4>\n\nStay chilly,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_SecurityPatrol_S_Desc_001=Need a battle-hardened pilot for an important patrol. A prominent client is fed up with outlaws targeting their ships and satellites. We’ve been hired to scan the areas in question and deal with any hostile forces. The patrol begins at the <EM4>location marker</EM4> on your HUD before moving to a number of other locations we’ll expect you to clear.\n\nNot sure what you’ll run into out there, but based on intel shared by the client, they’re frequently seeing fighter groups of five to seven ships roaming the region. Some even have larger ships leading the charge. That means you better be ready for a serious fight. If you can, try to recruit at least <EM4>three friends</EM4> to the cause. Even a seasoned pilot will need all the help they can get against this crew.   \n\nSince this is going to be a tough one, the main contractor will get a bonus payment of <EM4>~mission(ScripAmount) MG Scrip</EM4> at the end of the patrol.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n\n<EM4>Potential Blueprints</EM4>\n- Parallax "Sanguine" Energy Assault Rifle\n- Antium Arms Sand\n- Antium Core Sand\n- Antium Legs Sand\n- Antium Helmet Sand\n- Parallax Rifle Battery (80 Cap)\n
Foxwell_DefendEntitesAndEscort_VE_Desc=For any pilots in the area – a group of bandits is targeting one of our clients at <EM4>~mission(Location|Address)</EM4>, specifically their <EM4>~mission(Objects)</EM4> and the maintenance ships that manage them. From our intel, it's only a few outlaws trying to make some quick credits, but they're also the type to cause some real damage if you get in their way.\n\nIf you take care of them and relocate the client's ship and crew safely, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx System, Nyx I, Nyx</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: RAB-FOXTROT, Monox, RAB-BRAVO</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBlossom (Powerplant)\n- MagnaBloom (Powerplant)\n- FullForce (Powerplant)\n- IonSurge (Powerplant)\n- DayBreak (Powerplant)\n- Radiance (Powerplant)\n- FullForce Pro (Powerplant)\n- IonSurge Pro (Powerplant)\n- Celestial (Powerplant)\n- NewDawn (Powerplant)\n\n<EM4>[Regional Variants] example locations: Aberdeen, Magda, Hurston</EM4>\n- 7SA (Shield)\n- INK (Shield)\n- 7MA 'Lorica' (Shield)\n- RPEL (Shield)\n- 7CA 'Nargun' (Shield)\n- HAVEN (Shield)\n
Foxwell_DefendEntitesAndEscort_E_Desc=We need a contractor to provide convoy and protection services at <EM4>~mission(Location|Address)</EM4>. One of our elite clients' are under attack from a band of outlaws targeting their <EM4>~mission(Objects) and ships</EM4>. You'll need to keep the crew safe as they traverse the area, as well as make sure the assets stay as intact. These thugs look like they can do some real damage, so be sure you engage them with caution or the client might not be the only one to take heavy losses.\n\nIf you manage to nail this to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> as compensation to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.\n<EM4>Potential Blueprints</EM4>\n<EM4>[Regional Variants] example locations: Nyx II, Nyx System, Nyx III</EM4>\n- Frost-Star SL (Cooler)\n- Fridan (Cooler)\n- Tepilo (Cooler)\n- Frost-Star (Cooler)\n- ArcticStorm (Cooler)\n- Berian (Cooler)\n- Gelid (Cooler)\n- Frost-Star EX (Cooler)\n- ColdSnap (Cooler)\n- Aufeis (Cooler)\n- Graupel (Cooler)\n- Frost-Star XL (Cooler)\n- FrostBurn (Cooler)\n- Draug (Cooler)\n- Elsen (Cooler)\n- Kragen (Cooler)\n\n<EM4>[Regional Variants] example locations: RAB-ALPHA, Patch City, RAB-KILO</EM4>\n- IonWave (Powerplant)\n- Radix (Powerplant)\n- IonBurst (Powerplant)\n- PowerBolt (Powerplant)\n- LightBlossom (Powerplant)\n- MagnaBloom (Powerplant)\n- FullForce (Powerplant)\n- IonSurge (Powerplant)\n- DayBreak (Powerplant)\n- Radiance (Powerplant)\n- FullForce Pro (Powerplant)\n- IonSurge Pro (Powerplant)\n- Celestial (Powerplant)\n- NewDawn (Powerplant)\n\n<EM4>[Regional Variants] example locations: Ita, Magda, Arial</EM4>\n- 7SA (Shie