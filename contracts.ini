shubin_rockcracker_solo_desc_01=CONTRACT: Mining Rights Transfer\nLOCATION: Nyx\n\nDETAILS:\nShubin Interstellar prospectors have recently discovered the location of an abandoned QV Planetary Service Breaker Station near the Keeger belt. These stations were originally used by the defunct company to harvest valuable resources from inside asteroids but knowledge of their exact locations has been lost over the years. \n\nWhile this particular station is offline, our scout team believes that it could be made functional again with the necessary repairs. Additionally, if it was brought back online, there's already a resource-heavy asteroid in place ready to be cracked by the station's mining laser. \n\nUnfortunately, with all the various challenges that come with operating in Nyx, Shubin doesn't currently have the available bandwidth to handle the aforementioned repairs ourselves. This however has created an opportunity for an interested independent mining operation such as yourself. \n\n<EM4>TERMS*: </EM4>\nWe are making available the <EM4>exclusive mining rights</EM4> to this QV Breaker Station. Upon purchase, we will provide the coordinates of the station to only you and your crew. Your team will then be free to head there with a <EM4>mining vessel</EM4>, restore the <EM4>station's mining laser</EM4> to an operational status, crack the asteroid, and <EM4>harvest the resources</EM4> inside. \n\nPlease note that while we guarantee that these coordinates will be exclusive to you, we cannot assure that other interested parties, such as outlaws, may not discover the station's location on their own. Caution is advised. \n\n\n<EM4>Potential Blueprints</EM4>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- Monde Arms Delta Camo\n- Monde Legs Delta Camo\n- Monde Core Delta Camo\n- Monde Helmet Delta Camo\n- Monde Helmet Hemlock Camo\n- Monde Legs Hemlock Camo\n- Monde Core Hemlock Camo\n- Monde Arms Hemlock Camo\n- R97 Shotgun Magazine (18 cap)\n
shubin_rockcracker_pvp_desc_01=CONTRACT: Mining Rights Transfer\nLOCATION: Nyx\n\nDETAILS: \nShubin Interstellar prospectors have recently discovered the location of an abandoned QV Planetary Service Breaker Station near the Keeger belt. These stations were originally used by the defunct company to harvest valuable resources from inside asteroids but knowledge of their exact locations has been lost over the years. \n\nWhile this particular station is offline, our scout team believes that it could be made functional again with the necessary repairs. Additionally, if it was brought back online, there's already a resource-heavy asteroid in place ready to be cracked by the station's mining laser. \n\nUnfortunately, with all the various challenges that come with operating in Nyx, Shubin doesn't currently have the available bandwidth to handle the aforementioned repairs ourselves. This however has created an opportunity for an interested independent mining operation such as yourself. \n\n<EM4>TERMS*:</EM4>\nWe are making available the <EM4>shared mining rights</EM4> to this QV Breaker Station. Upon purchase, we will provide the coordinates of the station to you and your crew. (Remember, any other interested parties who purchase the mining rights will get access to the station as well.) Your crew will then be free to head there with a <EM4>mining vessel</EM4>, restore the <EM4>station's mining laser</EM4> to an operational status, crack the asteroid, and <EM4>harvest the resources</EM4> inside. \n\nPlease note that since this is a shared contract we are able to offer these mining rights at a reduced prices, but the resources in the asteroid will be available on a <EM4>first come, first serve</EM4> basis with any other mining crews at the site. Also, there is also a chance that other interested parties, such as outlaws, may discover the station's location on their own. Caution is advised. \n\n\n<EM4>Potential Blueprints</EM4>\n- R97 "Kismet" Shotgun\n- R97 "Righteous" Shotgun\n- Monde Arms Delta Camo\n- Monde Legs Delta Camo\n- Monde Core Delta Camo\n- Monde Helmet Delta Camo\n- Monde Helmet Hemlock Camo\n- Monde Legs Hemlock Camo\n- Monde Core Hemlock Camo\n- Monde Arms Hemlock Camo\n- R97 Shotgun Magazine (18 cap)\n
Shubin_Industrial_HandMining_Intro_Local_Desc_001=POSTING: Purchase Order\nLOCATION: <EM4>~mission(System) </EM4>\n\nTECH PREVIEW TESTING:\nComplete this mission to get blueprints for Volt weapons. For this test, these blueprints have some slots that accepting different materials for varying stat adjustments.\n\n~mission(Hint_Location) For a comprehensive list of where to find these minerals, consult <EM4>Mining Fundamentals #2: Where to Mine</EM4> in your mobiGlas Journal. While you're there, feel free to read the first part <EM4>Mining Fundamentals #1: Basic Overview</EM4> if you want a refresher on how to get the materials.\n\nSince this is a purchase order and not a mining contract, you are expected to provide your own equipment, such as a <EM4>~mission(Hint_Tool)</EM4>.\n\nOnce you’re ready to sell us the required materials, deposit them in the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\n\n<EM4>Reputation Awarded:</EM4> 100\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n<EM4>[Regional Variants] example locations: Patch City Clinic, PYAM-FARSTAT-1-3, Checkmate Clinic</EM4>\n- Arclight "Herrero" Pistol\n- Arclight "Desert Shadow" Pistol\n- Pembroke Exploration Suit\n- Pembroke Helmet\n- Novikov Exploration Suit\n- Novikov Helmet\n- Arclight Pistol Battery (30 cap)\n\n<EM4>[Regional Variants] example locations: Magda, Hurston, Ita</EM4>\n- Arclight "Midnight" Pistol\n- Strata Arms\n- Strata Core\n- Strata Legs\n- Strata Helmet Shooting Star\n- Arclight Pistol Battery (30 cap)\n
