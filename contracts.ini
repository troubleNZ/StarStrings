Firesale_HH_Description_01=Kicking the crap out of those Frontier Fighter bastards seriously depleted our supplies and now our stash of detatrine is practically out of stock. \n\nThat’s why you’re going to do a detatrine resupply run to<EM4> ~mission(Destination|Address). </EM4>\n\nNot sure if you’re familiar with it, but the chemical’s what we use to make our batches of sludge. We can’t really afford to let our sales of the stuff dry up right now. Not when we need credits so bad.\n\nThe good news is that <EM4>depots</EM4> across the system are offering detatrine and rock-bottom prices. Hell if I know why they’re doing it, all I know is that everyone with a lick of sense is trying to get their hands on the stuff so be ready for fierce competition. \n\nI’m trustin’ you to get it done,\nStows  \n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> -190,500 / 400 / 2,400
