Hockrow_FacilityDelve_P3M1_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nAll your digging around Onyx has paid off. I’ve been able to confirm that Jorrit has been operating an off-the-record lab in the facility’s Site-B in order to conduct an experiment he calls “Project Hyperion.” I’ll send his <EM4>lab notes to your mobiGlas journal</EM4> once you’re underway, but the long and short of it is the bastard is trying to make Humans evolve or some nonsense like that.\n\nThe client wants the experimental data, so you’re going back to Onyx and do everything needed to get Project Hyperion up and running. \n\nContract Investigator Actions:\nPrep the experiment by collecting a <EM4>Reagent code from the Engineering wing</EM4> and a <EM4>Catalyst code from the Research wing</EM4>.\n\nOnce you have those, head down to the <EM4>Lab in Site-B</EM4> and <EM4>run the experiment</EM4> so you can <EM4>upload the results</EM4>.\n\nAdditional Notes:\nSince this is an active lab, there might be ASD security on-site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\n<EM4>Multiple Blueprint Pools (Repeat Only)</EM4>\n<EM4>Pool 1</EM4>\n- Zenith "Darkwave" Laser Sniper Rifle\n- Fresnel "Molten" Energy LMG\n- Geist Armor Arms ASD Edition\n- Geist Armor Core ASD Edition\n- Geist Armor Legs ASD Edition\n- Geist Armor Helmet ASD Edition\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n\n<EM4>Pool 2</EM4>\n- DynaFlux (Powerplant)\n- Bolide (Powerplant)\n- Fulgur (Powerplant)\n
Hockrow_FacilityDelve_P2M1_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nIt would be helpful to have the most recent energy anomaly data so that we can compare it to what you delivered last time. Any difference between the two data sets could prove useful.\n\nContract Investigator Actions:\nExplore the <EM4>Engineering</EM4> wing and <EM4>retrieve the Energy Anomaly data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Fresnel Energy LMG\n- Zenith Laser Sniper Rifle\n- Geist Armor Arms Forest\n- Geist Armor Core Forest\n- Geist Armor Legs Forest\n- Geist Armor Helmet Forest\n- Corbel Arms Mire\n- Corbel Core Mire\n- Corbel Legs Mire\n- Corbel Helmet Mire\n- Fresnel Energy LMG Battery (165 Cap)\n- Novikov Backpack Mire\n\n<EM4>Pool 2</EM4>\n- Fresnel "Icebox" Energy LMG\n- Geist Armor Arms Rogue\n- Geist Armor Core Rogue\n- Geist Armor Legs Rogue\n- Geist Armor Helmet Rogue\n- Geist Armor Arms Whiteout\n- Geist Armor Core Whiteout\n- Geist Armor Legs Whiteout\n- Geist Armor Helmet Whiteout\n- Corbel Arms Smolder\n- Corbel Core Smolder\n- Corbel Legs Smolder\n- Corbel Helmet Smolder\n- Fresnel Energy LMG Battery (165 Cap)\n- Novikov Backpack Smolder\n
Hockrow_FacilityDelve_P2M2_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOut of an over-abundance of caution, it would be good to see if the security systems have picked up anything new since the last batch of data you delivered. That way we can make sure we’re up-to-date on what’s been happening down there.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Security data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site. \n\nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n- Fresnel "Rockfall" Energy LMG\n- Zenith "Landslide" Laser Sniper Rifle\n- Geist Armor Arms\n- Geist Armor Core\n- Geist Armor Legs\n- Geist Armor Helmet\n- Corbel Arms Patina\n- Corbel Core Patina\n- Corbel Legs Patina\n- Corbel Helmet Patina\n- Fresnel Energy LMG Battery (165 Cap)\n- Novikov Backpack Patina\n
Hockrow_FacilityDelve_P2M3_Repeat_desc=Hockrow Agency \nCase File #JD10285\nLead Investigator: Arken Mallor\n\nCase Update: \nOne of the biggest issue when it comes to ongoing investigations is intel growing stale. To help alleviate that, I’m going to have you head back into Onyx and grab the latest seismic sensor data. Would be good to see what the latest readings say.\n\nContract Investigator Actions:\nExplore the <EM4>Research</EM4> wing and <EM4>retrieve the Seismic data</EM4> and deliver it to <EM4>~mission(Destination|Address)</EM4>.\n\nAdditional Notes:\nBe wary of possible hostile forces on site.\n \nTravel to Onyx in a vehicle that can be stored in a large hangar.\n\nOnce you hand off this data, I'll send you a <EM4>ASD Secure Drive</EM4> that you can collect at your home location.\n\n<EM4>Potential Blueprints</EM4>\n- Zenith "Thunderstrike" Laser Sniper Rifle\n- Geist Armor Helmet Desert\n- Geist Armor Arms Desert\n- Geist Armor Core Desert\n- Geist Armor Legs Desert\n- Geist Armor Arms Whiteout\n- Geist Armor Core Whiteout\n- Geist Armor Legs Whiteout\n- Geist Armor Helmet Whiteout\n- Corbel Arms Halcyon\n- Corbel Core Halcyon\n- Corbel Legs Halcyon\n- Corbel Helmet Halcyon\n- Zenith Laser Sniper Rifle Battery (22 Cap)\n- Novikov Backpack Halcyon\n
