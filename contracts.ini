LocationRush_HH_Salvage_Description=Kicking the crap out of those Frontier Fighter bastards seriously depleted our supplies and now our stash is practically out of stock. \n\nThat’s why you’re going to do a resupply run to<EM4> ~mission(Destination|Address) and bring them the salvaged materials. </EM4>\n\nScrap it yourself or take it off some unsuspecting scav. Should be able to find some wrecks orbiting around most planets. Your call. Either way, as soon as we get the supplies, we’ll put it to good use building back up everything we lost.\n\nI’m trustin’ you to get it done,\nStows  \n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> -190,500 / 400 / 2,400
