LingFamily_HaulCargo_AToB_Intro_desc=Hi,  \n \nThis is Petra Ling, and I’m proud to offer you a new and exciting opportunity to partner with Ling Family Hauling. When my parents started this company, their goal was to provide fast and reliable courier deliveries around the greater Crusader area. It quickly became a success, and as our reputation grew, so did our operations.  \n \nNow, under my stewardship, Ling Family Hauling is taking the next big step – cargo hauling. Demand for this new service is growing faster than I expected, and that’s great news for both of us.   \n \nIf you’ve ever wanted to be a hauler, then I can make your dreams come true. Best way to learn something is by doing it, and I’ve got a haul of <EM4>~mission(Item)</EM4> that needs to go from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>.  \n\nNo prior experience is necessary, but here’s a few things to keep in mind. All pick-ups and deliveries must be done at a freight elevator or autoloaded. You will need a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and a <EM4>handheld tractor beam</EM4> to move them around. \n \nUpon successful completion of this delivery, you will be promoted to a ‘trusted contractor’ status and more hauls will become available to you.     \n\n \nSincerely,  \nPetra Ling  \nManaging Director of Cargo Operations \nLing Family Hauling \n\n \n\n \n\n \n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Trainee level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_MultiToSingle_desc_Party=Hi, \n\nGuess the folks at <EM4>~mission(Destination|Address)</EM4> are planning a party and need help acquiring everything in a timely manner. You’ll need to make multiple pick-ups for this one, including one in Nyx to grab some Jynx gin. Not sure if you’ve ever had the stuff, but it’s a Nyx specialty. Some folks can’t get past that it glows pink, but I love it. Got a truly unique kick to it.\n\nHere are the pick ups:  \n\nPICK UP LOCATIONS (ANY ORDER) \n\n~mission(MultiToSingleToken)     \n\nPlease remember to bring a <EM4>handheld tractor beam</EM4>, as you’ll be handling cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4>.  \n\n  \nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_MultiToSingle_desc_CFPAmenities=Hey, \n \nAny chance you’d be willing to do a haul into Pyro? I know it can get dangerous there but this is for a good cause. A group of new CFP members have moved to <EM4>~mission(Destination|Address)</EM4> and had a tough time adjusting to life in the system. They all left stuff behind in Stanton, because their transporter didn’t have room, so we’ve been hired to pick it all up and bring it to them.      \n\nHere are the pick ups:   \n\nPICK UP LOCATIONS (ANY ORDER)   \n\n~mission(MultiToSingleToken) \n\nCFP leaders hope that bringing them this stuff will make the system feel more like home. Let’s make sure this one goes down smoothly. Remember to equip your <EM4>handheld tractor beam</EM4>, and a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n \n\nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Rookie level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_AToB_desc_Fruit_Timed=Hi, \n \nNormally Reyes schedules our hauls, but she’s gone for the day, and I just got a comm inquiring about a simple, direct run from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. The cargo is a load of fruit that will lose its value if it spoils. We don't want to anger this client, so would appreciate it if you knocked this out in a timely manner.  \n\nHere’s some other details you should know. The largest container used is <EM4>~mission(MissionMaxSCUSize)</EM4>, so don’t forget your <EM4>handheld tractor beam</EM4>. \n\n \nSincerely,  \nPetra Ling  \nManaging Director of Cargo Operations \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Rookie level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_AToB_desc_Party_Timed=Hi, \n\nGuess the folks at <EM4>~mission(Destination|Address)</EM4> are planning a party and need help acquiring everything in a timely manner. You’ll need to make multiple pick-ups for this one, including one in Nyx to grab some Jynx gin. Not sure if you’ve ever had the stuff, but it’s a Nyx specialty. Some folks can’t get past that it glows pink, but I love it. Got a truly unique kick to it.\n\nHere are the pick ups:  \n\nPICK UP LOCATIONS (ANY ORDER) \n\n~mission(MultiToSingleToken)     \n\nPlease remember to bring a <EM4>handheld tractor beam</EM4>, as you’ll be handling cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4>.  \n\n  \nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Rookie level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_RecoverCargo_VeryEasy_Description=Hey,\n\nHere's the thing: one of our haulers has run into some trouble over at <EM4>~mission(Location|Address)</EM4> and had to ditch their ship. Could you head over there and help us finish the delivery?\n\nNot a huge job by any means, but you'll still need a <EM4>heavy-duty tractor beam</EM4> and a ship with enough space to store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n \nDrop the cargo off at the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we'll send you the creds.\n\nThanks,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 50
LingFamily_RecoverCargo_Easy_Description=Hello,\n\nLooking for a quick job? Got a client who's waiting on a shipment but our hauler ran into some engine trouble. Can't seem to get them up and running so we need someone to take over.\n\nFly out to <EM4>~mission(Location|Address)</EM4> and you'll spot their ship. You can't miss it - it's the one that's sitting still in the middle of space. Make sure you bring a <EM4>heavy-duty tractor beam</EM4> along with a decent ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nOnce you've picked up the goods take them to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nThanks,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100
LingFamily_RecoverCargo_Medium_Description=Hi,\n\nGot a relatively straightforward one for you if you're interested.\n\nOne of our pilot ignored a maintenance warning and sure enough, a couple of hours later their ship broke down over at <EM4>~mission(Location|Address)</EM4>. They're on their way back to the office now but we could do with a reliable hauler whose got a ship big enough to transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> to complete the haul for us.\n\nThink you could help us out? You just need to pick up the stranded shipment and deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.  And I probably don't have to say this, but a <EM4>heavy-duty tractor beam</EM4> would probably be handy to have along.\n\nThanks,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 150
LingFamily_RecoverCargo_Hard_Description=Hello,\n\nSome sad news. Unfortunately our hauler ran into some trouble and had to abandoned the cargo they were due to deliver. We haven't heard anything back from them so we're assuming the worse.\n\nWe're in the process of contacting their family and are conscious this is a very sensitive time, but also can't afford to leave a job incomplete. Our trackers show the cargo is still intact over at <EM4>~mission(Location|Address)</EM4>.\n\nIf you could finish the delivery we would be really grateful. We're not picking up on any nearby ships so it should be safe for you to collect. Bring a <EM4>heavy-duty tractor beam</EM4> and a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nDeliver the cargo to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we'll take care of the rest.\n\nThanks,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 200
LingFamily_RecoverCargo_VeryHard_Description=Hey,\n\nNeed a reliable contractor to help us out with a bit of a situation.\n\nOur of our haulers has dropped out mid-contract and now our client's cargo is stuck in transit. Think they were trying to negotiate a better rate with us, but that's not how Ling does business. Anyway, they're done and we desperately need the shipment finished.\n\nPetra and I have been working with this client for years now and have built up a good rapport. Be a shame to throw that all a way because of an unreliable hauler. Can you head to <EM4>~mission(Location|Address)</EM4> and collect the shipment? You'll need a <EM4>heavy-duty tractor beam</EM4> and a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nTake the shipment to the freight elevator over at <EM4>~mission(Destination|Address)</EM4> and we'll get you paid as soon as. We'd really appreciate your help with this and I'm sure our client would too.\n\nThanks,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
LingFamily_RecoverCargo_Super_Description=Hey,\n\nJust our luck that we land one of the biggest contracts of our life and our hauler's engines seize up. They've tried their best to fix it but seems like it's just not happening.\n\nCan you fly out to <EM4>~mission(Location|Address)</EM4> and grab the cargo for us? It's really important that we show our client that we're just as reliable as the other big players out there.\n\nJust so you know this is a large shipment. You'll need a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to move it all. Once you've transferred it to your ship, deliver it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we'll send confirmation to the client.\n\nConsidering the circumstances, we're paying above market rates to whoever can complete this.\n\nThanks,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling \n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 300
RedWind_HaulCargo_SingleToMulti_desc_RevenantTreePollen=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nRed Wind needs an experienced pilot to transport a large shipment of raw revenant tree pollen from <EM4>~mission(Location|Address)</EM4> to these locations:\n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nThis might seems self-evident, but the rep from CFP asked us to assure you that it's okay under UEE law to transport revenant tree pollen as long as it hasn't been processed. \n\nBe sure that your ship can carry up to <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> before you accept the contract. And buy a <EM4>handheld tractor beam</EM4> if you don't have one already to make loading and unloading as painless as possible.\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_HaulCargo_SingleToMulti_desc_ToCFP_Danger_Timed=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nCFP has an urgent request for a pilot with combat experience. A few of their settlements are under immediate threat and may soon be under attack, so they need supplies ASAP. \n\nIf you're confident that you can navigate a potential combat zone, please head to <EM4>~mission(Location|Address)</EM4>, grab the cargo, and bring it to these locations:\n\nDROP OFF LOCATIONS (ANY ORDER)\n\n~mission(SingleToMultiToken)\n\nYou'll need enough room for <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and your own <EM4>handheld tractor beam</EM4> to get everything loaded and unloaded.\n\nKeep in mind that it's always best to run if someone tries to ambush you. But if you get cornered, don't hesitate to defend yourself.\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_HaulCargo_AToB_desc_ToPyro_Danger=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nHave a run here that could become a lucrative regular thing if we can pull it off.  This’ll take you into Pyro, so you’ll have to be ready to tangle with some of the locals. \n\nYou’ll need to grab the stuff from <EM4>~mission(Location|Address)</EM4>, make the jump to Pyro, and then get to <EM4>~mission(Destination|Address)</EM4>. \n\nAll you need to do is bring a ship with space for <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, a <EM4>handheld tractor beam</EM4>, and be ready to do some damage if someone picks a fight with you.\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_HaulCargo_AToB_desc_FromPyro_Danger=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGuess some companies see danger when offered a run in Pyro. We see profits. Got one here that starts in the system at <EM4>~mission(Location|Address)</EM4> and then goes to <EM4>~mission(Destination|Address)</EM4>.  \n\nThe client warned us that outlaws in Pyro regularly target this run, which has scared other hauling concerns. Be sure your ship is all geared up and can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. And don't forget to bring a <EM4>handheld tractor beam</EM4>.  \n\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_HaulCargo_MultiToSingle_desc_RantaDung=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a request from a farmer in Pyro for specialized agricultural supplies - namely, ranta dung. Apparently, normal fertilizers aren't cutting it. They've put in orders from multiple distributors and need someone to bring everything back to <EM4>~mission(Destination|Address)</EM4>.\n\nHere are all the places you can collect the dung:\n\nPICK UP LOCATIONS (ANY ORDER)\n\n ~mission(MultiToSingleToken)\n\nThe client says your ship needs to be able to carry at least <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. Don't forget to bring your own <EM4>handheld tractor beam</EM4> for loading and unloading.\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_HaulCargo_AToB_desc_LuxuryGoods_Danger_Timed=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a contract from a major client who needs a skilled pilot to move a large load of luxury items from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. \n\nYou'll need room for at least <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> in your hold. You'll also need a <EM4>handheld tractor beam</EM4> to get everything loaded and unloaded. \n\nAnd as a fair warning, the things you'll be carrying are pricey enough that you might attract some unwanted attention. <EM4>Be ready to defend yourself</EM4> if you can't evade.\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_HaulCargo_AToB_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------  \n\nNeed a pilot for a straightforward haul going from the freight elevator at <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Should be easy enough as long as you got a ship that can handle containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. \n\nCredits don't come much easier than this. Just be careful as the route's not exactly in the safest of sectors. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100 / 250 / 1,000
RedWind_HaulCargo_AToB_waste_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------  \n\nNeed a pilot for a waste material transfer going from the freight elevator at <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. Should be easy enough as long as you got a ship that can handle containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size. Wouldn't bring your cleanest ship either.\n\nOn the bright side though, most likely outlaws will leave you alone when they see what you're carrying. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 250 / 1,000
RedWind_HaulCargo_MultiToSingle_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nJust got off a comm with a client. They got cargo (<EM4>~mission(MissionMaxSCUSize)</EM4> or smaller) at a few different locations ready to be taken over to a freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nPICK UP LOCATIONS (ANY ORDER)  \n~mission(MultiToSingleToken)  \n\nI'd recommend taking a few minutes to plan your route before taking off. Might save you a bit of fuel. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 250 / 500 / 1,000 / 2,000 / 4,000
RedWind_HaulCargo_MultiToSingle_waste_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nGot a bunch of comms this morning. Seems one of the local trash collectors' ship is busted and we're gonna be picking up the slack.\n\nI got a bunch of trash (<EM4>~mission(MissionMaxSCUSize)</EM4> or smaller) at a few different locations ready to be taken over to a freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nPICK UP LOCATIONS (ANY ORDER)  \n~mission(MultiToSingleToken)\n\nAnd don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 250 / 500 / 2,000 / 4,000
RedWind_HaulCargo_SingleToMulti_waste_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------   \n\nThey're doing a clean out at <EM4>~mission(Location|Address)</EM4> and have a bunch of <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller waste containers that needs to be hauled out to a few different spots. (Don't ask me why. They're paying us is all I know.)\n\nDROP OFF LOCATIONS (ANY ORDER)  \n~mission(SingleToMultiToken)\n\nAnd don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 500 / 1,000 / 2,000 / 4,000
RedWind_HaulCargo_SingleToMulti_desc_01=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------   \n\nOne of the folks over at <EM4>~mission(Location|Address)</EM4> just hit me up about a pile of cargo, <EM4>~mission(MissionMaxSCUSize)</EM4> or smaller, that needs to be hauled out to a few different spots.   \n\nDROP OFF LOCATIONS (ANY ORDER)  \n~mission(SingleToMultiToken)  \n\nI'm trusting you to set your own route here, so don't mess it up. And try to stay away from anywhere too dangerous. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 100 / 250 / 500
RedWind_HaulCargo_AToB_ASD_Desc=RED WIND LINEHAUL \n'YOUR GOODS IN GOOD HANDS' \n----------------------------    \n\nASD reached out to us as it seems one of their old labs, <EM4>~mission(Location|Address)</EM4>, still has some cargo being stored there they want to get their hands on.\n\nYou would fly there in a ship that can handle containers up to <EM4>~mission(MissionMaxSCUSize)</EM4> in size, land in the hangar, load up from the freight elevator, and then transport it all back to <EM4>~mission(Destination|Address)</EM4>. \n\nJust be sure to keep your head on swivel while you’re at the facility and try not to let your curiosity get the better of you Abandoned sites like this can be home to all sort of nastiness.  And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\nBE YOUR BEST – Take pride in the work you do and you’ll do work to be proud of.\n\n\n<EM4>Reputation Awarded:</EM4> 50
RedWind_HaulCargo_desc_intro=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nRed Wind is looking to bolster our roster of haulers. Need someone who can keep their wits about them and keep quiet. If you check those boxes, and have a ship that can handle <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, then give this trial run a shot.  \n\nPICK UP\nFreight elevator at <EM4>~mission(Location|Address)</EM4>. \n\nDROP OFF\nFreight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nComplete this contract and we’ll send more hauling opportunities your way. And don't forget to pack a <EM4>handheld tractor beam</EM4> to bring along. \n\n\n<EM4>Reputation Awarded:</EM4> 100
RedWind_RecoverCargo_Easy_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nOne of our haulers ran into some engine trouble whilst transporting some cargo for us and was forced to abandon their ship. Looking for a contractor who can recover the cargo and complete the delivery. You’ll need to bring your own <EM4>heavy-duty tractor beam</EM4> to transport the cargo to your ship. Details below.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nBe advised, the recovery location hasn’t been verified as safe. You might find an opportunistic outlaw trying to take the cargo for themselves, so be on alert.\n\nTAKE PRIDE IN YOUR WORK – Even as a contractor you are representing Red Wind Linehaul. Do not intentionally do anything to harm the company’s reputation.\n\n<EM4>Reputation Awarded:</EM4> 100
RedWind_RecoverCargo_Medium_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nA Red Wind hauler has been ambushed by some outlaws and now our clients’ cargo is sitting still whilst they prepare to steal it. We need a pilot with a <EM4>heavy-duty tractor beam</EM4> and a combat ready ship to head to the location below and recover the cargo before it’s gone for good.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nThe pilot reported multiple hostiles so make sure you take this seriously. \n\nEVERY OPPORTUNITY COUNTS – Make the most of what’s given to you, show us that you can handle more work.\n\n\n<EM4>Reputation Awarded:</EM4> 150
RedWind_RecoverCargo_Hard_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nWe’re having trouble completing a hauling mission and need a reliable contractor who has experience working in dangerous environments to complete the job. Just as a heads up, the cargo is in an abandoned ship surrounded by multiple, highly dangerous outlaws. We strongly advise you bring some backup with you and <EM4>heavy-duty tractor beam</EM4> to retrieve the client’s goods. Details follow:\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nSince this is a bit risky, we’re offering proportionate pay. I’ll leave it up to you to decide how to distribute it to your crew.\n\nTAKE PRIDE IN YOUR WORK – Even as a contractor you are representing Red Wind Linehaul. Do not intentionally do anything to harm the company’s reputation.\n\n<EM4>Reputation Awarded:</EM4> 200
RedWind_RecoverCargo_VeryHard_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nPutting out a call for a highly skilled pilot who can recover our client’s cargo. Please only accept this contract if you have experience dealing with extremely hostile situations involving multiple combatants. Additional crew members and a <EM4>heavy-duty tractor beam</EM4> are highly recommended.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nThe cargo should be in the bay of the abandoned ship. The client has already expressed frustration regarding the cargo’s delay so please work quickly and efficiently.\n\nBE RESILIENT – Life is hard and sometimes you have to roll with the punches. Keep going and don’t let it bring you down.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
RedWind_RecoverCargo_Super_Description=RED WIND LINEHAUL\n'YOUR GOODS IN GOOD HANDS'\n----------------------------\n\nWe have a special assignment for only the most competent contractors. One of our haulers who is sadly no longer with us failed to complete their last job. The cargo they were supposed to deliver is sitting stationary in their former ship in the location listed below.\n\nRECOVERY LOCATION\n     · <EM4>~mission(Location|Address)</EM4>\n\nDROP OFF LOCATION\n     · Freight elevator at <EM4>~mission(Destination|Address)</EM4>\n\nI’m not going dance around the issue, this is an extremely challenging job. You’ll need to bring a strong team of skilled pilots with you to deal with the outlaws that killed the previous contractor and a <EM4>heavy-duty tractor beam</EM4> to retrieve the client’s cargo. That said, if you take on this contract, we will make it worth your time.\n\nHOW DID WE DO – Complete our short feedback survey on our Spectrum page for a chance to enter our monthly prize draw.\n\n<EM4>Reputation Awarded:</EM4> 300
bhg_bounty_desc_FPS_intro=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: This preliminary bounty is being offered to you as a formal evaluation of your skills. Successful completion of this contract will lead to additional bounty work being made available. \n\nIt is believed that the target will be on foot and well armed, so be prepared to engage in a firefight. Additionally, there may be other hostiles forces at the site, while they should not be your primary focus, you may have to engage with them while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50
bhg_bounty_desc_ASD_Research_001=--------------------------------------------------------\n----------------- BOUNTY CONTRACT -----------------\n--------------------------------------------------------\n\nBOUNTY HUNTERS GUILD\nPROCESSING & DISTRIBUTION\n\nThe Bounty Hunters Guild has authorized an official bounty.\n\nNAME: ~mission(TargetName) \nSYSTEM: Stanton\nRISK ASSESSMENT: Medium\nLAST KNOWN LOCATION:  ~mission(Location|Address)\nKNOWN AFFILIATIONS: <None>\nNOTES: We have tracked this bounty target to the <EM4>Research wing</EM4> of an abandoned Associated Science and Development facility. While shuttered, various scavengers and other unsavory types are known to frequent the area.\n\nThe facility itself might also pose a risk as the nature of the research being conducted there is unknown. Be on the lookout for potential environmental hazards while in pursuit of the target.\n\n\nBOUNTY HUNTERS GUILD\nIn Pursuit of Justice\n\nThe Bounty Hunters Guild is a security service sanctioned by the Mercenary Guild and authorized to operate in both the UEE and beyond in accordance with Xenotrade Authority Acts.\n\n<EM4>Reputation Awarded:</EM4> 50\n\n<EM4>Potential Blueprints</EM4>\n- Palatino Arms Metropolis\n- Palatino Core Metropolis\n- Palatino Legs Metropolis\n- Palatino Helmet Metropolis\n- Palatino Arms Daystar\n- Palatino Core Daystar\n- Palatino Legs Daystar\n- Palatino Helmet Daystar\n
